<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart of Steel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #game {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
  // ===== CONSTANTS & CONFIG =====
  const GAME_W = 400;
  const GAME_H = 240;
  const TICK_RATE = 1 / 60;
  const MAX_FRAME_TIME = 0.25;
  const INPUT_BUFFER_SIZE = 6;
  const GROUND_Y = 192;
  const STAGE_LEFT = 24;
  const STAGE_RIGHT = 376;
  const CHARGE_THRESHOLD = 12;

  // HUD layout constants
  const HUD_H = 30;

  // ===== CANVAS SETUP =====
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false });

  canvas.width = GAME_W;
  canvas.height = GAME_H;
  ctx.imageSmoothingEnabled = false;

  function resizeCanvas() {
    const scale = Math.min(
      window.innerWidth / GAME_W,
      window.innerHeight / GAME_H
    );
    canvas.style.width = Math.floor(GAME_W * scale) + 'px';
    canvas.style.height = Math.floor(GAME_H * scale) + 'px';
  }
  window.addEventListener('resize', resizeCanvas);

  // ===== UTILITY FUNCTIONS =====
  function aabbOverlap(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
  }

  function clamp(val, min, max) {
    return val < min ? min : val > max ? max : val;
  }

  function drawText(ctx, text, x, y, color, size, align) {
    const sz = size || 8;
    const al = align || 'left';
    ctx.font = sz + 'px monospace';
    ctx.textAlign = al;
    ctx.textBaseline = 'top';
    // Shadow
    ctx.fillStyle = '#000000';
    ctx.fillText(text, Math.floor(x) + 1, Math.floor(y) + 1);
    // Text
    ctx.fillStyle = color || '#FFFFFF';
    ctx.fillText(text, Math.floor(x), Math.floor(y));
  }

  // ===== INPUT SYSTEM =====
  const keys = {};
  const inputBuffer = [];
  let attackHeldFrames = 0;
  let prevAttack = false;
  let prevEscape = false;

  window.addEventListener('keydown', event => {
    keys[event.key] = true;
    // Prevent default for game keys to stop page scrolling
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(event.key)) {
      event.preventDefault();
    }
  });
  window.addEventListener('keyup', event => {
    keys[event.key] = false;
  });

  function readInput() {
    const input = {
      left:    !!(keys['a'] || keys['ArrowLeft']),
      right:   !!(keys['d'] || keys['ArrowRight']),
      up:      !!(keys['w'] || keys['ArrowUp']),
      down:    !!(keys['s'] || keys['ArrowDown']),
      attack:  !!(keys['j'] || keys['z'] || keys['J'] || keys['Z']),
      block:   !!(keys['k'] || keys['x'] || keys['K'] || keys['X']),
      ultimate:!!(keys['l'] || keys['c'] || keys['L'] || keys['C']),
      enter:   !!(keys['Enter']),
      escape:  !!(keys['Escape'])
    };

    // Push to circular buffer
    inputBuffer.push({ ...input });
    if (inputBuffer.length > INPUT_BUFFER_SIZE) inputBuffer.shift();

    // Edge detection
    input.attackPressed  = input.attack && !prevAttack;
    input.attackReleased = !input.attack && prevAttack;
    prevAttack = input.attack;
    input.escapePressed = input.escape && !prevEscape;
    prevEscape = input.escape;

    // Check if attack was buffered in recent frames (for combo chains)
    input.attackBuffered = inputBuffer.some(f => f.attack);

    return input;
  }

  function updateChargeDetection(input) {
    if (input.attack) {
      attackHeldFrames++;
      return null; // Still held
    } else {
      if (input.attackReleased) {
        const frames = attackHeldFrames;
        attackHeldFrames = 0;
        if (frames >= CHARGE_THRESHOLD) return 'power';
        if (frames > 0) return 'fast';
      }
      return null;
    }
  }

  // ===== AUDIO SYSTEM =====
  let audioCtx = null;
  let bgMusicNodes = [];
  let bgMusicPlaying = false;

  function initAudio() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      audioCtx = null;
    }
  }

  function playSFX(type) {
    if (!audioCtx) return;
    try {
      const now = audioCtx.currentTime;
      const gain = audioCtx.createGain();
      gain.connect(audioCtx.destination);

      if (type === 'punch') {
        const osc = audioCtx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.connect(gain);
        osc.start(now); osc.stop(now + 0.08);
      } else if (type === 'powerHit') {
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.connect(gain);
        osc.start(now); osc.stop(now + 0.2);
      } else if (type === 'block') {
        const osc = audioCtx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.setValueAtTime(250, now + 0.02);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        osc.connect(gain);
        osc.start(now); osc.stop(now + 0.06);
      } else if (type === 'guardBreak') {
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
        gain.gain.setValueAtTime(0.6, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(gain);
        osc.start(now); osc.stop(now + 0.3);
      } else if (type === 'wallBreak') {
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(60, now);
        osc.frequency.exponentialRampToValueAtTime(20, now + 0.4);
        gain.gain.setValueAtTime(0.7, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.connect(gain);
        osc.start(now); osc.stop(now + 0.4);
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'square';
        osc2.frequency.setValueAtTime(800, now);
        osc2.frequency.exponentialRampToValueAtTime(200, now + 0.1);
        const g2 = audioCtx.createGain();
        g2.gain.setValueAtTime(0.4, now); g2.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc2.connect(g2); g2.connect(audioCtx.destination);
        osc2.start(now); osc2.stop(now + 0.1);
      } else if (type === 'ko') {
        const osc = audioCtx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.exponentialRampToValueAtTime(55, now + 0.6);
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.connect(gain);
        osc.start(now); osc.stop(now + 0.6);
      } else if (type === 'ultimate') {
        const osc = audioCtx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(110, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.5);
        gain.gain.setValueAtTime(0.0, now);
        gain.gain.linearRampToValueAtTime(0.5, now + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.connect(gain);
        osc.start(now); osc.stop(now + 0.5);
      }
    } catch(e) {}
  }

  function startBGMusic(stageKey) {
    stopBGMusic();
    if (!audioCtx) return;
    const roots = { 'white-house': 262, 'greek-island': 294, 'mar-a-lago': 330, 'golf-course': 247 };
    const root = roots[stageKey] || 262;
    const melody = [0, 4, 7, 12, 7, 4, 0, 5, 9, 12, 9, 5, 3, 7, 10, 15];
    let step = 0;
    const bpm = 140;
    const stepDur = 60 / bpm / 2;
    function playNote() {
      if (!audioCtx || !bgMusicPlaying) return;
      try {
        const freq = root * Math.pow(2, melody[step % melody.length] / 12);
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.08, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + stepDur * 0.8);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + stepDur);
        step++;
      } catch(e) {}
    }
    bgMusicPlaying = true;
    const intervalId = setInterval(playNote, stepDur * 1000);
    bgMusicNodes = [intervalId];
  }

  function stopBGMusic() {
    bgMusicPlaying = false;
    bgMusicNodes.forEach(id => clearInterval(id));
    bgMusicNodes = [];
  }

  // ===== GAME LOOP =====
  let accumulator = 0;
  let lastTime = 0;
  let frameCounter = 0;

  function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);

    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > MAX_FRAME_TIME) dt = MAX_FRAME_TIME;

    accumulator += dt;
    while (accumulator >= TICK_RATE) {
      update();
      accumulator -= TICK_RATE;
    }
    render();
  }

  function update() {
    frameCounter++;
    const input = readInput();
    const result = scenes[currentScene].update(input);
    if (result && result !== currentScene) {
      currentScene = result;
      if (scenes[currentScene].enter) scenes[currentScene].enter();
    }
  }

  function render() {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    // When paused, draw the fight scene first as background, then the pause overlay
    if (currentScene === 'pause') {
      scenes[pauseMenuScene._fromScene] && scenes[pauseMenuScene._fromScene].render(ctx);
    }
    scenes[currentScene].render(ctx);
  }

  // ===== SPRITE CACHE INFRASTRUCTURE =====
  const spriteCache = {};

  function initSpriteCache(fighterDefs) {
    for (const def of fighterDefs) {
      spriteCache[def.name] = {};
      for (const [state, frames] of Object.entries(def.sprites)) {
        spriteCache[def.name][state] = frames.map((drawFn) => {
          const oc = document.createElement('canvas');
          oc.width = def.spriteWidth || 64;
          oc.height = def.spriteHeight || 56;
          const octx = oc.getContext('2d');
          octx.imageSmoothingEnabled = false;
          drawFn(octx);
          return oc;
        });
      }
    }
  }

  function renderFighter(ctx, fighter) {
    const stateFrames = spriteCache[fighter.def.name] &&
                        spriteCache[fighter.def.name][fighter.state];
    if (!stateFrames || stateFrames.length === 0) return;

    const frame = stateFrames[Math.floor(fighter.currentFrame) % stateFrames.length];
    const fx = Math.floor(fighter.x);
    const fy = Math.floor(fighter.y);

    // Flash white on hit
    if (fighter.flashFrames > 0) {
      ctx.save();
      if (fighter.facing === -1) {
        ctx.translate(fx, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(frame, -Math.floor(frame.width / 2), fy - frame.height);
      } else {
        ctx.drawImage(frame, fx - Math.floor(frame.width / 2), fy - frame.height);
      }
      // White overlay
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = '#FFFFFF';
      if (fighter.facing === -1) {
        ctx.fillRect(-Math.floor(frame.width / 2), fy - frame.height, frame.width, frame.height);
      } else {
        ctx.fillRect(fx - Math.floor(frame.width / 2), fy - frame.height, frame.width, frame.height);
      }
      ctx.restore();
      fighter.flashFrames--;
    } else {
      ctx.save();
      if (fighter.facing === -1) {
        ctx.translate(fx, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(frame, -Math.floor(frame.width / 2), fy - frame.height);
      } else {
        ctx.drawImage(frame, fx - Math.floor(frame.width / 2), fy - frame.height);
      }
      ctx.restore();
    }
  }

  // ===== SCENE MANAGER =====
  let currentScene = 'title';

  // ===== TITLE SCENE =====
  // Draws the "HEART OF STEEL" logo using fillRect pixel art
  function drawLogoLetter(octx, letter, ox, oy, color) {
    octx.fillStyle = color;
    // 5x7 pixel font patterns for each letter (stored as row bitmasks)
    const glyphs = {
      'H': [0b10001,0b10001,0b10001,0b11111,0b10001,0b10001,0b10001],
      'E': [0b11111,0b10000,0b10000,0b11110,0b10000,0b10000,0b11111],
      'A': [0b01110,0b10001,0b10001,0b11111,0b10001,0b10001,0b10001],
      'R': [0b11110,0b10001,0b10001,0b11110,0b10100,0b10010,0b10001],
      'T': [0b11111,0b00100,0b00100,0b00100,0b00100,0b00100,0b00100],
      'O': [0b01110,0b10001,0b10001,0b10001,0b10001,0b10001,0b01110],
      'F': [0b11111,0b10000,0b10000,0b11110,0b10000,0b10000,0b10000],
      'S': [0b01111,0b10000,0b10000,0b01110,0b00001,0b00001,0b11110],
      'L': [0b10000,0b10000,0b10000,0b10000,0b10000,0b10000,0b11111],
      ' ': [0b00000,0b00000,0b00000,0b00000,0b00000,0b00000,0b00000],
    };
    const rows = glyphs[letter];
    if (!rows) return 5; // default width
    for (let row = 0; row < 7; row++) {
      for (let col = 0; col < 5; col++) {
        if (rows[row] & (1 << (4 - col))) {
          octx.fillRect(ox + col * 2, oy + row * 2, 2, 2);
        }
      }
    }
    return 5 * 2 + 2; // 12px per char (5 pixels * 2 scale + 2 gap)
  }

  function drawLogoText(octx, text, startX, y, color) {
    let x = startX;
    for (const ch of text) {
      x += drawLogoLetter(octx, ch, x, y, color);
    }
    return x - startX;
  }

  // Pre-render title logo to offscreen canvas
  const logoCanvas = document.createElement('canvas');
  logoCanvas.width = GAME_W;
  logoCanvas.height = 60;
  const logoctx = logoCanvas.getContext('2d');
  logoctx.imageSmoothingEnabled = false;

  function buildLogo() {
    logoctx.clearRect(0, 0, logoCanvas.width, logoCanvas.height);

    const line1 = 'HEART OF';
    const line2 = 'STEEL';

    // Calculate widths for centering
    // Each char: 12px wide. Space: 12px.
    const charW = 12;
    const line1W = line1.length * charW - 2;
    const line2W = line2.length * charW - 2;

    const line1X = Math.floor((GAME_W - line1W) / 2);
    const line2X = Math.floor((GAME_W - line2W) / 2);

    // Draw gold shadow/outline slightly offset
    drawLogoText(logoctx, line1, line1X + 1, 1 + 1, '#DAA520');
    drawLogoText(logoctx, line1, line1X, 1, '#FFFFFF');

    drawLogoText(logoctx, line2, line2X + 1, 19 + 1, '#DAA520');
    drawLogoText(logoctx, line2, line2X, 19, '#FFCC00');
  }

  const titleScene = {
    _frameCount: 0,
    enter() {
      this._frameCount = 0;
    },
    update(input) {
      this._frameCount++;
      if (input.enter) return 'charSelect';
      return null;
    },
    render(ctx) {
      // Dark near-black blue background
      ctx.fillStyle = '#0A0A1A';
      ctx.fillRect(0, 0, GAME_W, GAME_H);

      // Subtle star field
      ctx.fillStyle = '#FFFFFF';
      const starSeeds = [7,23,41,59,83,101,137,163,191,211,239,257,283];
      for (let i = 0; i < starSeeds.length; i++) {
        const s = starSeeds[i];
        const sx = (s * 31) % GAME_W;
        const sy = (s * 17) % (GAME_H - 50) + 10;
        ctx.fillRect(sx, sy, 1, 1);
      }

      // Logo
      ctx.drawImage(logoCanvas, 0, 42);

      // "PRESS ENTER TO START" blinking every 30 frames
      const showPrompt = Math.floor(this._frameCount / 30) % 2 === 0;
      if (showPrompt) {
        drawText(ctx, 'PRESS ENTER TO START', 200, 190, '#FFFFFF', 8, 'center');
      }

      // Version text
      drawText(ctx, 'H.O.S v0.1', 200, 225, '#555555', 8, 'center');
    }
  };

  // ===== FIGHTER SPRITE DRAW FUNCTIONS =====

  // --- TRUMP SPRITE FUNCTIONS ---
  // Canvas is 64x56. Anchor: feet at y=56, center at x=32.
  // Sprite body occupies roughly x:8-56, y:8-56 (48px tall)

  function drawTrumpBase(c, offsetY, crouchFactor, armState, legState) {
    // armState: 0=sides, 1=up, 2=guard, 3=punch, 4=windup, 5=swing, 6=recoil
    // legState: 0=stand, 1=stride-a, 2=stride-b, 3=jump-tuck, 4=land, 5=crouch
    // offsetY: vertical offset (for idle bob)
    const oy = offsetY || 0;
    const cf = crouchFactor || 0; // 0=stand, 1=fully crouched

    // Compressed height: feet fixed at y=56, body compresses up
    const bodyBot = 56; // feet
    const standH = 48;
    const crouchH = 30;
    const bodyH = Math.floor(standH - (standH - crouchH) * cf);
    const bodyTop = bodyBot - bodyH + oy;

    // Proportions (normalized to bodyH)
    const headH = Math.floor(bodyH * 0.29);   // ~14px at stand
    const torsoH = Math.floor(bodyH * 0.35);  // ~17px at stand
    const legH = bodyH - headH - torsoH;       // rest

    const headTop = bodyTop;
    const torsoTop = headTop + headH;
    const legTop = torsoTop + torsoH;

    // Colors
    const hairPri = '#FFD700';
    const hairSec = '#DAA520';
    const skinPri = '#FFB366';
    const skinSec = '#E8944D';
    const suitPri = '#1A1A4E';
    const suitSec = '#0D0D2B';
    const shirt = '#FFFFFF';
    const tiePri = '#CC0000';
    const tieSec = '#990000';
    const shoe = '#1A1A1A';
    const outline = '#000000';

    // === SHOES / LEGS ===
    if (legState === 0) {
      // Standing
      c.fillStyle = suitPri;
      c.fillRect(22, legTop, 8, legH - 4);   // left leg
      c.fillRect(34, legTop, 8, legH - 4);   // right leg
      c.fillStyle = shoe;
      c.fillRect(20, legTop + legH - 4, 10, 4); // left shoe
      c.fillRect(34, legTop + legH - 4, 10, 4); // right shoe
    } else if (legState === 1) {
      // Stride A: left leg forward
      c.fillStyle = suitPri;
      c.fillRect(19, legTop, 8, legH - 4);
      c.fillRect(36, legTop + 2, 8, legH - 6);
      c.fillStyle = shoe;
      c.fillRect(17, legTop + legH - 4, 10, 4);
      c.fillRect(34, legTop + legH - 6, 10, 4);
    } else if (legState === 2) {
      // Stride B: right leg forward
      c.fillStyle = suitPri;
      c.fillRect(21, legTop + 2, 8, legH - 6);
      c.fillRect(34, legTop, 8, legH - 4);
      c.fillStyle = shoe;
      c.fillRect(19, legTop + legH - 6, 10, 4);
      c.fillRect(32, legTop + legH - 4, 10, 4);
    } else if (legState === 3) {
      // Jump tuck: knees up
      const tuck = Math.floor(legH * 0.4);
      c.fillStyle = suitPri;
      c.fillRect(20, legTop + tuck, 9, legH - tuck - 2);
      c.fillRect(34, legTop + tuck, 9, legH - tuck - 2);
      c.fillStyle = shoe;
      c.fillRect(19, legTop + legH - 2, 10, 3);
      c.fillRect(34, legTop + legH - 2, 10, 3);
    } else if (legState === 4) {
      // Land: legs wide
      c.fillStyle = suitPri;
      c.fillRect(18, legTop, 9, legH - 4);
      c.fillRect(36, legTop, 9, legH - 4);
      c.fillStyle = shoe;
      c.fillRect(16, legTop + legH - 4, 11, 4);
      c.fillRect(34, legTop + legH - 4, 11, 4);
    } else if (legState === 5) {
      // Crouch: short bent legs
      c.fillStyle = suitPri;
      c.fillRect(22, legTop, 8, legH - 2);
      c.fillRect(34, legTop, 8, legH - 2);
      c.fillStyle = shoe;
      c.fillRect(20, legTop + legH - 2, 10, 3);
      c.fillRect(34, legTop + legH - 2, 10, 3);
    }

    // === TORSO (suit) ===
    c.fillStyle = suitPri;
    c.fillRect(20, torsoTop, 24, torsoH);
    // Suit lapels (darker)
    c.fillStyle = suitSec;
    c.fillRect(20, torsoTop, 4, torsoH);
    c.fillRect(40, torsoTop, 4, torsoH);
    // Shirt/tie visible in center
    c.fillStyle = shirt;
    c.fillRect(28, torsoTop, 8, 4); // collar area
    // Tie
    c.fillStyle = tiePri;
    c.fillRect(30, torsoTop + 3, 4, Math.floor(torsoH * 0.6));
    c.fillStyle = tieSec;
    c.fillRect(31, torsoTop + 3, 2, Math.floor(torsoH * 0.6));

    // === ARMS ===
    if (armState === 0) {
      // At sides
      c.fillStyle = suitPri;
      c.fillRect(14, torsoTop + 2, 6, torsoH - 4);  // left arm
      c.fillRect(44, torsoTop + 2, 6, torsoH - 4);  // right arm
      c.fillStyle = skinPri;
      c.fillRect(14, torsoTop + torsoH - 6, 6, 6);  // left hand
      c.fillRect(44, torsoTop + torsoH - 6, 6, 6);  // right hand
    } else if (armState === 1) {
      // Arms up (jump)
      c.fillStyle = suitPri;
      c.fillRect(12, torsoTop - 6, 6, torsoH - 2);  // left arm up
      c.fillRect(46, torsoTop - 6, 6, torsoH - 2);  // right arm up
      c.fillStyle = skinPri;
      c.fillRect(12, torsoTop - 10, 6, 6);
      c.fillRect(46, torsoTop - 10, 6, 6);
    } else if (armState === 2) {
      // Guard (block): arms crossed in front
      c.fillStyle = suitPri;
      c.fillRect(16, torsoTop + 2, 8, 6);   // left arm across
      c.fillRect(40, torsoTop + 2, 8, 6);   // right arm across
      c.fillStyle = skinPri;
      c.fillRect(24, torsoTop + 2, 8, 6);   // left fist in front
      c.fillRect(32, torsoTop + 2, 8, 6);   // right fist in front

  function drawClintonBase(c, offsetY, crouchFactor, armState, legState) {
    const oy = offsetY || 0;
    const cf = crouchFactor || 0;

    const bodyBot = 56;
    const standH = 48;
    const crouchH = 30;
    const bodyH = Math.floor(standH - (standH - crouchH) * cf);
    const bodyTop = bodyBot - bodyH + oy;

    const headH = Math.floor(bodyH * 0.29);
    const torsoH = Math.floor(bodyH * 0.35);
    const legH = bodyH - headH - torsoH;

    const headTop = bodyTop;
    const torsoTop = headTop + headH;
    const legTop = torsoTop + torsoH;

    // Clinton color palette
    const skinPri = '#FFB888';
    const skinSec = '#E89968';
    const suitPri = '#0D1A3A';
    const suitSec = '#060D20';
    const tiePri = '#2244AA';
    const tieSec = '#112288';
    const hairCol = '#E0E0E0';
    const shoe = '#1A1A1A';
    const outline = '#000000';

    // === SHOES / LEGS ===
    if (legState === 0) {
      c.fillStyle = suitPri;
      c.fillRect(22, legTop, 8, legH - 4);
      c.fillRect(34, legTop, 8, legH - 4);
      c.fillStyle = shoe;
      c.fillRect(20, legTop + legH - 4, 10, 4);
      c.fillRect(32, legTop + legH - 4, 10, 4);
    } else if (legState === 1) {
      c.fillStyle = suitPri;
      c.fillRect(19, legTop, 8, legH - 4);
      c.fillRect(35, legTop + 2, 8, legH - 6);
      c.fillStyle = shoe;
      c.fillRect(17, legTop + legH - 4, 10, 4);
      c.fillRect(33, legTop + legH - 6, 10, 4);
    } else if (legState === 2) {
      c.fillStyle = suitPri;
      c.fillRect(21, legTop + 2, 8, legH - 6);
      c.fillRect(35, legTop, 8, legH - 4);
      c.fillStyle = shoe;
      c.fillRect(19, legTop + legH - 6, 10, 4);
      c.fillRect(33, legTop + legH - 4, 10, 4);
    } else if (legState === 3) {
      const tuck = Math.floor(legH * 0.4);
      c.fillStyle = suitPri;
      c.fillRect(20, legTop + tuck, 9, legH - tuck - 2);
      c.fillRect(34, legTop + tuck, 9, legH - tuck - 2);
      c.fillStyle = shoe;
      c.fillRect(19, legTop + legH - 2, 10, 3);
      c.fillRect(33, legTop + legH - 2, 10, 3);
    } else if (legState === 4) {
      c.fillStyle = suitPri;
      c.fillRect(18, legTop, 9, legH - 4);
      c.fillRect(35, legTop, 9, legH - 4);
      c.fillStyle = shoe;
      c.fillRect(16, legTop + legH - 4, 11, 4);
      c.fillRect(33, legTop + legH - 4, 11, 4);
    } else if (legState === 5) {
      c.fillStyle = suitPri;
      c.fillRect(22, legTop, 8, legH - 2);
      c.fillRect(34, legTop, 8, legH - 2);
      c.fillStyle = shoe;
      c.fillRect(20, legTop + legH - 2, 10, 3);
      c.fillRect(32, legTop + legH - 2, 10, 3);
    }

    // === TORSO (suit) === (22px wide)
    c.fillStyle = suitPri;
    c.fillRect(21, torsoTop, 22, torsoH);
    // Suit lapels
    c.fillStyle = suitSec;
    c.fillRect(21, torsoTop, 4, torsoH);
    c.fillRect(39, torsoTop, 4, torsoH);
    // Shirt
    c.fillStyle = '#FFFFFF';
    c.fillRect(29, torsoTop, 6, 4);
    // Tie (blue)
    c.fillStyle = tiePri;
    c.fillRect(30, torsoTop + 3, 4, Math.floor(torsoH * 0.6));
    c.fillStyle = tieSec;
    c.fillRect(31, torsoTop + 3, 2, Math.floor(torsoH * 0.6));

    // === ARMS ===
    if (armState === 0) {
      c.fillStyle = suitPri;
      c.fillRect(14, torsoTop + 2, 6, torsoH - 4);
      c.fillRect(44, torsoTop + 2, 6, torsoH - 4);
      c.fillStyle = skinPri;
      c.fillRect(14, torsoTop + torsoH - 6, 6, 6);
      c.fillRect(44, torsoTop + torsoH - 6, 6, 6);
    } else if (armState === 1) {
      c.fillStyle = suitPri;
      c.fillRect(12, torsoTop - 6, 6, torsoH - 2);
      c.fillRect(46, torsoTop - 6, 6, torsoH - 2);
      c.fillStyle = skinPri;
      c.fillRect(12, torsoTop - 10, 6, 6);
      c.fillRect(46, torsoTop - 10, 6, 6);
    } else if (armState === 2) {
      c.fillStyle = suitPri;
      c.fillRect(16, torsoTop + 2, 8, 6);
      c.fillRect(40, torsoTop + 2, 8, 6);
      c.fillStyle = skinPri;
      c.fillRect(24, torsoTop + 2, 6, 6);
      c.fillRect(34, torsoTop + 2, 6, 6);
    } else if (armState === 3) {
      c.fillStyle = suitPri;
      c.fillRect(14, torsoTop + 2, 6, torsoH - 6);
      c.fillStyle = skinPri;
      c.fillRect(14, torsoTop + torsoH - 8, 6, 6);
      c.fillStyle = suitPri;
      c.fillRect(43, torsoTop + 4, 12, 6);
      c.fillStyle = skinPri;
      c.fillRect(53, torsoTop + 4, 7, 6);
    } else if (armState === 4) {
      c.fillStyle = suitPri;
      c.fillRect(10, torsoTop - 4, 6, torsoH);
      c.fillRect(10, torsoTop, 12, 6);
      c.fillStyle = skinPri;
      c.fillRect(10, torsoTop - 8, 6, 6);
      c.fillStyle = suitPri;
      c.fillRect(44, torsoTop - 2, 6, torsoH - 2);
      c.fillStyle = skinPri;
      c.fillRect(44, torsoTop - 6, 6, 6);
    } else if (armState === 5) {
      c.fillStyle = suitPri;
      c.fillRect(14, torsoTop + 2, 6, torsoH - 4);
      c.fillStyle = skinPri;
      c.fillRect(14, torsoTop + torsoH - 6, 6, 6);
      c.fillStyle = suitPri;
      c.fillRect(43, torsoTop, 14, 7);
      c.fillRect(55, torsoTop + 6, 8, 6);
      c.fillStyle = skinPri;
      c.fillRect(57, torsoTop + 10, 7, 6);
    } else if (armState === 6) {
      c.fillStyle = suitPri;
      c.fillRect(8, torsoTop, 8, 6);
      c.fillRect(48, torsoTop, 8, 6);
      c.fillStyle = skinPri;
      c.fillRect(6, torsoTop, 6, 6);
      c.fillRect(50, torsoTop, 6, 6);
    }

    // === HEAD === (wide jaw — headW+2 on lower portion)
    const headCX = 32;
    const headW = 18;
    c.fillStyle = outline;
    c.fillRect(headCX - headW/2 - 1, headTop - 1, headW + 2, headH + 2);

    c.fillStyle = skinPri;
    c.fillRect(headCX - headW/2, headTop, headW, headH);
    // Wide jaw area
    c.fillRect(headCX - headW/2 - 1, headTop + Math.floor(headH * 0.5), headW + 2, Math.floor(headH * 0.5));
    c.fillStyle = skinSec;
    c.fillRect(headCX + 2, headTop, headW/2 - 1, headH);

    // HAIR: silver, swept back (wider at back of head)
    c.fillStyle = hairCol;
    c.fillRect(headCX - headW/2 - 2, headTop - 3, headW + 4, 5);
    c.fillRect(headCX - headW/2 - 3, headTop - 1, 4, 4); // swept back left
    c.fillRect(headCX + headW/2 - 1, headTop - 2, 5, 5); // swept back right
    c.fillStyle = '#B8B8B8';
    c.fillRect(headCX - headW/2, headTop - 3, headW, 2);

    // EYES
    c.fillStyle = '#FFFFFF';
    c.fillRect(headCX - 6, headTop + 4, 5, 3);
    c.fillRect(headCX + 1, headTop + 4, 5, 3);
    c.fillStyle = '#3A2000';
    c.fillRect(headCX - 5, headTop + 5, 3, 2);
    c.fillRect(headCX + 2, headTop + 5, 3, 2);

    // Nose
    c.fillStyle = skinSec;
    c.fillRect(headCX - 1, headTop + 7, 3, 3);

    // Mouth (wide charismatic smile)
    c.fillStyle = '#CC8866';
    c.fillRect(headCX - 5, headTop + headH - 4, 11, 2);
    c.fillStyle = '#FFFFFF';
    c.fillRect(headCX - 3, headTop + headH - 3, 7, 1);
  }

  function transitionFighterState(fighter, newState) {
    if (fighter.state === newState) return;
    const oldState = fighter.state;
    if (FIGHTER_STATES[oldState] && FIGHTER_STATES[oldState].exit) {
      FIGHTER_STATES[oldState].exit(fighter);
    }
    fighter.prevState = oldState;
    fighter.state = newState;
    fighter.stateFrame = 0;
    if (FIGHTER_STATES[newState] && FIGHTER_STATES[newState].enter) {
      FIGHTER_STATES[newState].enter(fighter);
    }
  }

  const FIGHTER_STATES = {
    idle: {
      enter(fighter) {
        fighter.currentFrame = 0;
        fighter.attackPhase = null;
        fighter.currentAttackType = null;
        fighter.isBlocking = false;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Animate idle: advance every 15 ticks
        if (fighter.stateFrame % 15 === 0) {
          fighter.currentFrame = (fighter.currentFrame + 1) % 4;
        }
        // Input transitions
        if (input.up) return 'jumpRise';
        if (input.down) return 'crouch';
        // Walk: check facing vs direction key
        if (input.right) {
          return fighter.facing === 1 ? 'walkForward' : 'walkBack';
        }
        if (input.left) {
          return fighter.facing === -1 ? 'walkForward' : 'walkBack';
        }
        // Attack: charge detection
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        if (input.block) return 'block';
        return null;
      },
      exit(fighter) {}
    },

    walkForward: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Move forward
        const spd = fighter.def.stats.walkSpeed;
        fighter.x = clamp(fighter.x + spd * fighter.facing, STAGE_LEFT, STAGE_RIGHT);
        // Animate every 8 ticks
        if (fighter.stateFrame % 8 === 0) {
          fighter.currentFrame = (fighter.currentFrame + 1) % 4;
        }
        // Check if still moving forward
        const movingForward = (fighter.facing === 1 && input.right) ||
                              (fighter.facing === -1 && input.left);
        if (!movingForward) return 'idle';
        if (input.up) return 'jumpRise';
        if (input.down) return 'crouch';
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        if (input.block) return 'block';
        return null;
      },
      exit(fighter) {}
    },

    walkBack: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Move backward
        const spd = fighter.def.stats.walkSpeed;
        fighter.x = clamp(fighter.x - spd * fighter.facing, STAGE_LEFT, STAGE_RIGHT);
        // Animate every 8 ticks
        if (fighter.stateFrame % 8 === 0) {
          fighter.currentFrame = (fighter.currentFrame + 1) % 4;
        }
        // Check if still moving back
        const movingBack = (fighter.facing === 1 && input.left) ||
                           (fighter.facing === -1 && input.right);
        if (!movingBack) return 'idle';
        if (input.up) return 'jumpRise';
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        if (input.block) return 'block';
        return null;
      },
      exit(fighter) {}
    },

    jumpRise: {
      enter(fighter) {
        fighter.vy = fighter.def.stats.jumpForce;
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        fighter.vy += fighter.def.stats.gravity * (fighter.juggleGravityMul || 1.0);
        fighter.y += fighter.vy;
        // Map frame to rise phase
        fighter.currentFrame = Math.min(3, Math.floor(fighter.stateFrame / 4));
        if (fighter.vy >= 0) return 'jumpFall';
        return null;
      },
      exit(fighter) {}
    },

    jumpFall: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        fighter.vy += fighter.def.stats.gravity * (fighter.juggleGravityMul || 1.0);
        fighter.y += fighter.vy;
        fighter.currentFrame = Math.min(3, Math.floor(fighter.stateFrame / 4));
        // Landing check
        if (fighter.y >= GROUND_Y) {
          fighter.y = GROUND_Y;
          fighter.vy = 0;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {}
    },

    crouch: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Animate to frame 3 and hold
        if (fighter.currentFrame < 3 && fighter.stateFrame % 3 === 0) {
          fighter.currentFrame++;
        }
        if (!input.down) return 'idle';
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        return null;
      },
      exit(fighter) {}
    },

    fastAttack: {
      enter(fighter) {
        fighter.attackPhase = 'startup';
        fighter.currentAttackType = 'fast';
        fighter.hitThisAttack = false;
        fighter.comboCount = (fighter.comboCount || 0) + 1;
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        const fd = fighter.def.attacks.fast;
        const total = fd.startup + fd.active + fd.recovery;

        if (fighter.stateFrame <= fd.startup) {
          fighter.attackPhase = 'startup';
          // Map to frames 0-1
          fighter.currentFrame = Math.floor((fighter.stateFrame / fd.startup) * 2);
        } else if (fighter.stateFrame <= fd.startup + fd.active) {
          fighter.attackPhase = 'active';
          fighter.currentFrame = 2; // active = frame 2
        } else if (fighter.stateFrame <= total) {
          fighter.attackPhase = 'recovery';
          fighter.currentFrame = 3; // recovery = frame 3
          // Check for combo chain during recovery
          if (input.attackBuffered && fighter.comboCount < fd.maxChain) {
            return 'fastAttack';
          }
        } else {
          fighter.attackPhase = null;
          fighter.comboCount = 0;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.attackPhase = null;
        fighter.hitThisAttack = false;
      }
    },

    powerAttack: {
      enter(fighter) {
        fighter.attackPhase = 'startup';
        fighter.currentAttackType = 'power';
        fighter.hitThisAttack = false;
        fighter.comboCount = 0;
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        const fd = fighter.def.attacks.power;
        const total = fd.startup + fd.active + fd.recovery;

        if (fighter.stateFrame <= fd.startup) {
          fighter.attackPhase = 'startup';
          // Map to frames 0-2 (windup)
          fighter.currentFrame = Math.min(2, Math.floor((fighter.stateFrame / fd.startup) * 3));
        } else if (fighter.stateFrame <= fd.startup + fd.active) {
          fighter.attackPhase = 'active';
          fighter.currentFrame = 3; // active = frame 3 (the big swing)
        } else if (fighter.stateFrame <= total) {
          fighter.attackPhase = 'recovery';
          fighter.currentFrame = 0; // retracting
        } else {
          fighter.attackPhase = null;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.attackPhase = null;
        fighter.hitThisAttack = false;
      }
    },

    block: {
      enter(fighter) {
        fighter.isBlocking = true;
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Animate to frame 3 and hold
        if (fighter.currentFrame < 3 && fighter.stateFrame % 4 === 0) {
          fighter.currentFrame++;
        }
        if (!input.block) {
          fighter.isBlocking = false;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.isBlocking = false;
      }
    },

    hitstun: {
      enter(fighter) {
        fighter.currentFrame = 0;
        fighter.comboCount = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        fighter.currentFrame = Math.min(3, Math.floor(fighter.stateFrame / 3));
        if (fighter.hitstunRemaining > 0) {
          fighter.hitstunRemaining--;
          return null;
        }
        return 'idle';
      },
      exit(fighter) {
        fighter.hitstunRemaining = 0;
      }
    },

    knockdown: {
      enter(fighter) {
        fighter.currentFrame = 0;
        fighter.knockedDown = true;
        fighter.comboCount = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Play animation to frame 3 then hold
        if (fighter.currentFrame < 3 && fighter.stateFrame % 10 === 0) {
          fighter.currentFrame++;
        }
        // Get up after 60 frames
        if (fighter.stateFrame >= 60 && fighter.health > 0) {
          fighter.knockedDown = false;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.knockedDown = false;
      }
    }
  };

  // Per-fighter charge detection (each fighter has independent charge tracking)
  function updateFighterCharge(fighter, input) {
    const attackNow = input.attack;
    const wasAttack = fighter._prevAttack;
    fighter._prevAttack = attackNow;

    if (attackNow) {
      fighter._chargeFrames++;
      return null;
    } else {
      if (wasAttack) {
        // Key released
        const frames = fighter._chargeFrames;
        fighter._chargeFrames = 0;
        if (frames >= CHARGE_THRESHOLD) return 'power';
        if (frames > 0) return 'fast';
      } else {
        fighter._chargeFrames = 0;
      }
      return null;
    }
  }

  // ===== FIGHTER UPDATE =====
  function updateFighter(fighter, input, opponent) {
    // Guard break stun: freeze fighter regardless of input
    if (fighter.guardBreakStun > 0) {
      fighter.guardBreakStun--;
      fighter.flashFrames = 2;
      return;
    }

    // Guard regeneration when not blocking
    if (!fighter.isBlocking && fighter.guardMeter < 100) {
      fighter.guardMeter = Math.min(100, fighter.guardMeter + 0.4);
    }

    // Airborne tracking
    fighter.isAirborne = (fighter.y < GROUND_Y - 2);
    // Reset juggle on landing
    if (!fighter.isAirborne) {
      fighter.airHits = 0;
      fighter.juggleGravityMul = 1.0;
    }

    // Ultimate activation
    if (input.ultimate && fighter.ultimateMeter >= 100 && !fighter.ultimateActive && fighter.guardBreakStun === 0) {
      fighter.ultimateActive = true;
      fighter.ultimateFrame = 0;
      fighter.ultimateMeter = 0;
      playSFX('ultimate');
    }
    // Ultimate animation tick
    if (fighter.ultimateActive) {
      fighter.ultimateFrame++;
      if (fighter.ultimateFrame >= 90) {
        fighter.ultimateActive = false;
        fighter.ultimateFrame = 0;
      }
      return;
    }

    // Superstate: hitstun check
    if (fighter.hitstunRemaining > 0 && fighter.state !== 'knockdown') {
      if (fighter.state !== 'hitstun') {
        transitionFighterState(fighter, 'hitstun');
      }
    }

    // Run current state's update
    const stateHandler = FIGHTER_STATES[fighter.state];
    if (!stateHandler) return;

    const next = stateHandler.update(fighter, input, opponent);
    if (next) {
      transitionFighterState(fighter, next);
    }

    // Auto-facing: face opponent when not attacking/hitstun/knockdown
    const noFaceLock = ['fastAttack','powerAttack','hitstun','knockdown'];
    if (!noFaceLock.includes(fighter.state)) {
      if (opponent) {
        fighter.facing = opponent.x > fighter.x ? 1 : -1;
      }
    }

    // Apply gravity when airborne
    if (fighter.y < GROUND_Y && fighter.state !== 'jumpRise' && fighter.state !== 'jumpFall') {
      fighter.vy += fighter.def.stats.gravity;
      fighter.y += fighter.vy;
      if (fighter.y >= GROUND_Y) {
        fighter.y = GROUND_Y;
        fighter.vy = 0;
        if (fighter.state !== 'knockdown') {
          transitionFighterState(fighter, 'idle');
        }
      }
    }
  }

  // ===== PUSH-BACK COLLISION (prevent overlap) =====
  function resolveFighterOverlap(f1, f2) {
    const hw1 = f1.def.stats.hurtboxWidth / 2;
    const hw2 = f2.def.stats.hurtboxWidth / 2;
    const dist = Math.abs(f1.x - f2.x);
    const minDist = hw1 + hw2 - 4; // allow slight overlap
    if (dist < minDist) {
      const push = (minDist - dist) / 2;
      if (f1.x < f2.x) {
        f1.x = clamp(f1.x - push, STAGE_LEFT, STAGE_RIGHT);
        f2.x = clamp(f2.x + push, STAGE_LEFT, STAGE_RIGHT);
      } else {
        f1.x = clamp(f1.x + push, STAGE_LEFT, STAGE_RIGHT);
        f2.x = clamp(f2.x - push, STAGE_LEFT, STAGE_RIGHT);
      }
    }
  }

  // ===== HIT DETECTION & COMBAT SYSTEM =====
  let hitStopFramesRemaining = 0;

  function applyHitStop(frames) {
    hitStopFramesRemaining = frames;
  }

  function checkHit(attacker, defender) {
    if (attacker.attackPhase !== 'active') return false;
    if (attacker.hitThisAttack) return false;

    const atk = attacker.def.attacks[attacker.currentAttackType];
    if (!atk) return false;

    // Hitbox in world space (accounting for facing and reach)
    const reachMul = attacker.def.stats.reach;
    let hbX;
    if (attacker.facing === 1) {
      hbX = attacker.x + atk.hitbox.x * reachMul;
    } else {
      hbX = attacker.x - atk.hitbox.x * reachMul - Math.floor(atk.hitbox.w * reachMul);
    }
    const hitbox = {
      x: Math.floor(hbX),
      y: Math.floor(attacker.y + atk.hitbox.y),
      w: Math.floor(atk.hitbox.w * reachMul),
      h: atk.hitbox.h
    };

    // Defender hurtbox
    const hurtH = (defender.state === 'crouch')
      ? defender.def.stats.crouchHurtboxHeight
      : defender.def.stats.hurtboxHeight;
    const hurtbox = {
      x: Math.floor(defender.x - defender.def.stats.hurtboxWidth / 2),
      y: Math.floor(defender.y - hurtH),
      w: defender.def.stats.hurtboxWidth,
      h: hurtH
    };

    return aabbOverlap(hitbox, hurtbox);
  }

  function resolveHit(attacker, defender) {
    // Mark so multi-hit doesn't fire on same attack
    attacker.hitThisAttack = true;

    const atk = attacker.def.attacks[attacker.currentAttackType];

    // Base damage with attacker power multiplier
    const baseDamage = Math.floor(atk.damage * attacker.def.stats.power);

    // Juggle scaling: diminishing returns for air combos
    const juggleScale = Math.max(0.4, 1.0 - (defender.airHits * 0.10));
    const scaledDamage = Math.floor(baseDamage * juggleScale);

    // Apply block reduction or guard break
    let damage;
    if (defender.isBlocking) {
      damage = Math.floor(scaledDamage * 0.2);
      // Drain guard meter
      const guardDrain = Math.floor(scaledDamage * 0.5);
      defender.guardMeter = Math.max(0, defender.guardMeter - guardDrain);
      if (defender.guardMeter <= 0 && defender.guardBreakStun === 0) {
        // Guard break: stun + full damage
        defender.guardBreakStun = 60;
        defender.guardMeter = 100;
        damage = scaledDamage; // full damage on guard break
        defender.isBlocking = false;
        applyHitStop(8);
        playSFX('guardBreak');
      }
    } else {
      damage = scaledDamage;
    }

    // Play hit SFX
    playSFX(defender.isBlocking ? 'block' : (attacker.currentAttackType === 'power' ? 'powerHit' : 'punch'));

    // Apply damage
    defender.health = Math.max(0, defender.health - damage);

    // Ultimate meter gain
    attacker.ultimateMeter = Math.min(100, attacker.ultimateMeter + damage);
    defender.ultimateMeter = Math.min(100, defender.ultimateMeter + Math.floor(damage * 0.5));

    // Hit stop
    if (attacker.currentAttackType === 'power') {
      applyHitStop(5);
    } else {
      applyHitStop(3);
    }

    // Flash defender white
    defender.flashFrames = 2;

    // If not blocking: hitstun + knockback
    if (!defender.isBlocking) {
      if (defender.health <= 0) {
        transitionFighterState(defender, 'knockdown');
      } else {
        defender.hitstunRemaining = atk.hitstun;
        transitionFighterState(defender, 'hitstun');
      }
      // Knockback
      defender.x = clamp(defender.x + 8 * attacker.facing, STAGE_LEFT, STAGE_RIGHT);
      // Juggle launch: power attack launching near-grounded defender
      if (attacker.currentAttackType === 'power' && defender.airHits < 4) {
        defender.vy = -6 - (defender.airHits * 0.5);
        defender.airHits++;
        defender.juggleGravityMul = 1.0 + defender.airHits * 0.15;
      }
    } else {
      // Small pushback on block
      defender.x = clamp(defender.x + 3 * attacker.facing, STAGE_LEFT, STAGE_RIGHT);
    }
  }

  function applyUltimateDamage(attacker, defender) {
    const ult = attacker.def.ultimate;
    if (!ult) return;
    const damage = ult.damage;
    defender.health = Math.max(0, defender.health - damage);
    attacker.ultimateMeter = Math.min(100, attacker.ultimateMeter + damage * 0.2);
    defender.flashFrames = 8;
    if (ult.stunFrames) {
      defender.hitstunRemaining = ult.stunFrames;
      if (defender.state !== 'knockdown') transitionFighterState(defender, 'hitstun');
    }
    if (defender.health <= 0 && defender.state !== 'knockdown') {
      transitionFighterState(defender, 'knockdown');
    }
    applyHitStop(8);
    playSFX('ultimate');
  }

  function checkWallBreak(attacker, defender) {
    if (stageTier !== 1) return;
    if (wallBreakActive) return;           // already breaking — don't re-trigger
    if (attacker.currentAttackType !== 'power') return;
    if (attacker.attackPhase !== 'active') return;
    if (attacker.hitThisAttack) return;    // only on the hit frame
    if (defender.isBlocking) return;
    const nearLeft  = defender.x <= STAGE_LEFT + 8;
    const nearRight = defender.x >= STAGE_RIGHT - 8;
    if (!nearLeft && !nearRight) return;
    wallBreakActive = true;
    wallBreakTimer = 30;
    wallBreakSide = nearLeft ? 'left' : 'right';
    wallBreakVictim = (defender === cpu) ? 'cpu' : 'player'; // track who got hit
    playSFX('wallBreak');
    applyHitStop(15);
  }

  // ===== CPU AI =====
  const AI_STATE = {
    APPROACH: 'approach',
    PRESSURE: 'pressure',
    BACK_OFF: 'backOff',
    PUNISH: 'punish'
  };

  const AI_DIFFICULTIES = [
    { name: 'EASY',   reactionFrames: 15, blockChance: 0.20, comboChance: 0.10, approachDist: 70, pressureDist: 50, retreatHealth: 0.2, jumpChance: 0.005, powerAttackChance: 0.05 },
    { name: 'MEDIUM', reactionFrames: 9,  blockChance: 0.50, comboChance: 0.30, approachDist: 65, pressureDist: 45, retreatHealth: 0.3, jumpChance: 0.008, powerAttackChance: 0.10 },
    { name: 'HARD',   reactionFrames: 4,  blockChance: 0.80, comboChance: 0.60, approachDist: 55, pressureDist: 40, retreatHealth: 0.4, jumpChance: 0.012, powerAttackChance: 0.15 }
  ];

  function createAIController(difficulty) {
    const cfg = AI_DIFFICULTIES[difficulty];
    return {
      state: AI_STATE.APPROACH,
      decisionCooldown: 0,
      attackSequenceFrames: 0,
      attackHoldFrames: 0,
      comboHitsRemaining: 0,
      isHolding: false,
      retreatFrames: 0,

      generateInput(cpu, player, frameCount) {
        const input = {
          left: false, right: false, up: false, down: false,
          attack: false, block: false, ultimate: false, enter: false,
          attackPressed: false, attackReleased: false, attackBuffered: false
        };

        // Don't act when knocked down
        if (cpu.knockedDown || cpu.state === 'knockdown') return input;

        const dist = Math.abs(cpu.x - player.x);
        const facingPlayer = (player.x > cpu.x) ? 1 : -1;
        const playerAttacking = (player.state === 'fastAttack' || player.state === 'powerAttack');
        const playerInRecovery = (player.attackPhase === 'recovery');
        const cpuHealthPct = cpu.health / cpu.def.stats.health;

        // === ATTACK SEQUENCE HANDLING ===
        // If in an attack sequence (combo or power), handle frame-by-frame
        if (this.comboHitsRemaining > 0) {
          this.attackSequenceFrames++;
          // Pattern: 2 frames attack=true, 1 frame attack=false (triggers fast attack)
          const cyclePos = this.attackSequenceFrames % 3;
          if (cyclePos < 2) {
            input.attack = true;
            input.attackBuffered = true;
          } else {
            input.attack = false;
            this.comboHitsRemaining--;
          }
          // Edge detection for fighter charge system
          input.attackPressed = (input.attack && cyclePos === 0);
          input.attackReleased = (!input.attack && cyclePos === 2);
          return input;
        }
        if (this.isHolding) {
          this.attackHoldFrames++;
          if (this.attackHoldFrames < 14) {
            input.attack = true;  // Hold for 14 frames (> 12 threshold)
          } else {
            input.attack = false;  // Release triggers power attack
            input.attackReleased = true;
            this.isHolding = false;
            this.attackHoldFrames = 0;
          }
          return input;
        }

        // === DECISION COOLDOWN (reaction delay) ===
        this.decisionCooldown = Math.max(0, this.decisionCooldown - 1);
        if (this.decisionCooldown > 0) {
          // Between decisions: maintain movement based on current state
          if (this.state === AI_STATE.APPROACH) {
            if (facingPlayer === 1) input.right = true; else input.left = true;
          } else if (this.state === AI_STATE.BACK_OFF) {
            if (facingPlayer === 1) input.left = true; else input.right = true;
          }
          return input;
        }

        // === STATE TRANSITIONS ===
        this.decisionCooldown = cfg.reactionFrames;

        // Back-off: low health and close
        if (cpuHealthPct < cfg.retreatHealth && dist < cfg.approachDist) {
          this.state = AI_STATE.BACK_OFF;
          this.retreatFrames = 30 + Math.floor(Math.random() * 30);
        }
        // Punish: player in recovery and close enough
        else if (playerInRecovery && dist < cfg.pressureDist + 20) {
          this.state = AI_STATE.PUNISH;
        }
        // Pressure: close enough to attack
        else if (dist < cfg.pressureDist) {
          this.state = AI_STATE.PRESSURE;
        }
        // Approach: too far
        else {
          this.state = AI_STATE.APPROACH;
        }

        // === BLOCKING (reactive, independent of state) ===
        if (playerAttacking && dist < 80 && Math.random() < cfg.blockChance) {
          input.block = true;
          return input;
        }

        // === BEHAVIOR BY STATE ===
        switch (this.state) {
          case AI_STATE.APPROACH:
            if (facingPlayer === 1) input.right = true; else input.left = true;
            // Occasional jump
            if (Math.random() < cfg.jumpChance) input.up = true;
            break;

          case AI_STATE.PRESSURE:
            // Decide: combo, power attack, or single attack
            if (Math.random() < cfg.powerAttackChance) {
              // Start power attack hold
              this.isHolding = true;
              this.attackHoldFrames = 0;
              input.attack = true;
              input.attackPressed = true;
            } else if (Math.random() < cfg.comboChance) {
              // Start combo chain (2-4 hits based on difficulty)
              const maxHits = cfg === AI_DIFFICULTIES[2] ? 4 : (cfg === AI_DIFFICULTIES[1] ? 3 : 2);
              this.comboHitsRemaining = 1 + Math.floor(Math.random() * maxHits);
              this.attackSequenceFrames = 0;
              input.attack = true;
              input.attackPressed = true;
              input.attackBuffered = true;
            } else {
              // Single fast attack
              input.attack = true;
              input.attackPressed = true;
              input.attackBuffered = true;
            }
            break;

          case AI_STATE.BACK_OFF:
            if (facingPlayer === 1) input.left = true; else input.right = true;
            this.retreatFrames--;
            if (this.retreatFrames <= 0) this.state = AI_STATE.APPROACH;
            // Block while retreating if player is attacking
            if (playerAttacking) input.block = true;
            break;

          case AI_STATE.PUNISH:
            // Rush in and attack during player recovery
            if (dist > cfg.pressureDist) {
              if (facingPlayer === 1) input.right = true; else input.left = true;
            } else {
              if (Math.random() < 0.5 && cfg.comboChance > 0.2) {
                this.comboHitsRemaining = 2;
                this.attackSequenceFrames = 0;
                input.attack = true;
                input.attackPressed = true;
                input.attackBuffered = true;
              } else {
                input.attack = true;
                input.attackPressed = true;
                input.attackBuffered = true;
              }
            }
            break;
        }

        // Use ultimate when meter full and player is close
        if (cpu.ultimateMeter >= 100 && dist < 100 && Math.random() < 0.05) {
          input.ultimate = true;
        }

        return input;
      }
    };
  }

  // ===== HUD RENDERING =====
  function drawHealthBar(ctx, x, y, w, h, current, max, isPlayer) {
    const pct = Math.max(0, current / max);
    // Border
    ctx.fillStyle = '#000000';
    ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
    // Background (empty health)
    ctx.fillStyle = '#333333';
    ctx.fillRect(x, y, w, h);
    // Fill color
    const fillW = Math.floor(w * pct);
    let color;
    if (pct > 0.5) color = '#00CC00';
    else if (pct > 0.25) color = '#FFCC00';
    else color = '#CC0000';
    ctx.fillStyle = color;
    if (isPlayer) {
      ctx.fillRect(x, y, fillW, h);
    } else {
      ctx.fillRect(x + w - fillW, y, fillW, h);
    }
    // Highlight line (3D bevel)
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    if (isPlayer) {
      if (fillW > 0) ctx.fillRect(x, y, fillW, 1);
    } else {
      if (fillW > 0) ctx.fillRect(x + w - fillW, y, fillW, 1);
    }
  }

  function drawRoundPips(ctx, x, y, winsCount) {
    // Draw 2 round win pips (4x4 filled squares)
    ctx.fillStyle = winsCount >= 1 ? '#FFCC00' : '#555555';
    ctx.fillRect(x, y, 4, 4);
    ctx.fillStyle = winsCount >= 2 ? '#FFCC00' : '#555555';
    ctx.fillRect(x + 8, y, 4, 4);
  }

  function drawHUD(ctx, player, cpu, roundTimer, p1Wins, p2Wins) {
    // HUD background strip
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, GAME_W, HUD_H);

    // P1 Name
    drawText(ctx, player.def.name.toUpperCase(), 16, 8, '#FFFFFF', 8, 'left');

    // P1 Health bar
    drawHealthBar(ctx, 48, 8, 128, 8, player.health, player.def.stats.health, true);

    // Timer label and value (centered)
    const timerColor = roundTimer < 600 ? '#CC0000' : '#FFFFFF';
    drawText(ctx, 'TIME', 200, 2, '#FFFFFF', 8, 'center');
    drawText(ctx, String(Math.ceil(roundTimer / 60)), 200, 12, timerColor, 8, 'center');

    // P2 Health bar (fills right-to-left)
    drawHealthBar(ctx, 224, 8, 128, 8, cpu.health, cpu.def.stats.health, false);

    // P2 Name (right-aligned)
    drawText(ctx, cpu.def.name.toUpperCase(), 360, 8, '#FFFFFF', 8, 'right');

    // Round win pips
    drawRoundPips(ctx, 120, 20, p1Wins);
    drawRoundPips(ctx, 268, 20, p2Wins);

    // P1 Guard meter (blue, thin bar below health)
    const p1Guard = Math.max(0, player.guardMeter) / 100;
    ctx.fillStyle = '#333333';
    ctx.fillRect(48, 18, 128, 4);
    ctx.fillStyle = player.guardBreakStun > 0 ? '#FF4444' : '#4488FF';
    ctx.fillRect(48, 18, Math.floor(128 * p1Guard), 4);

    // P2 Guard meter (fills right-to-left)
    const p2Guard = Math.max(0, cpu.guardMeter) / 100;
    ctx.fillStyle = '#333333';
    ctx.fillRect(224, 18, 128, 4);
    ctx.fillStyle = cpu.guardBreakStun > 0 ? '#FF4444' : '#4488FF';
    ctx.fillRect(224 + 128 - Math.floor(128 * p2Guard), 18, Math.floor(128 * p2Guard), 4);

    // P1 Ultimate meter (gold, small bar below guard)
    const p1Ult = player.ultimateMeter / 100;
    ctx.fillStyle = '#1A1A00';
    ctx.fillRect(48, 24, 128, 3);
    ctx.fillStyle = p1Ult >= 1.0 ? '#FFDD00' : '#AA8800';
    ctx.fillRect(48, 24, Math.floor(128 * p1Ult), 3);
    if (player.ultimateMeter >= 100 && Math.floor(frameCounter / 8) % 2 === 0) {
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(48, 24, 128, 3);
    }

    // P2 Ultimate meter (right-to-left)
    const p2Ult = cpu.ultimateMeter / 100;
    ctx.fillStyle = '#1A1A00';
    ctx.fillRect(224, 24, 128, 3);
    ctx.fillStyle = p2Ult >= 1.0 ? '#FFDD00' : '#AA8800';
    ctx.fillRect(224 + 128 - Math.floor(128 * p2Ult), 24, Math.floor(128 * p2Ult), 3);
    if (cpu.ultimateMeter >= 100 && Math.floor(frameCounter / 8) % 2 === 0) {
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(224, 24, 128, 3);
    }
  }

  // Keep renderHUD as an alias for backward compatibility
  function renderHUD(ctx, player, cpu, roundTimer) {
    drawHUD(ctx, player, cpu, roundTimer, p1Wins, p2Wins);
  }

  function renderUltimate(ctx, fighter, opponent) {
    if (!fighter.ultimateActive) return;
    const f = fighter.ultimateFrame;
    const ult = fighter.def.ultimate;
    if (!ult) return;
    const colors = ult.colors;

    // Screen flash at activation (first 10 frames)
    if (f < 10) {
      const alpha = (10 - f) / 10 * 0.7;
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fillRect(0, 0, GAME_W, GAME_H);
    }

    // Fighter-specific effects (frames 10-80)
    if (f >= 10 && f < 80) {
      const name = fighter.def.name;
      if (name === 'Trump') {
        const wallX = Math.floor((f - 10) / 70 * GAME_W);
        ctx.fillStyle = colors[0];
        ctx.fillRect(wallX - 20, 28, 20, GAME_H - 28);
        ctx.fillStyle = colors[1];
        ctx.fillRect(wallX - 16, 28, 4, GAME_H - 28);
        for (let i = 0; i < 3; i++) {
          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(wallX - 20 + i * 6, 28 + (f * 7 + i * 20) % (GAME_H - 40), 3, 3);
        }
      } else if (name === 'Biden') {
        const waveX = Math.floor((f - 10) / 70 * GAME_W);
        for (let iy = 40; iy < GAME_H; iy += 16) {
          ctx.fillStyle = colors[0]; ctx.fillRect(waveX - 24, iy, 10, 10);
          ctx.fillStyle = colors[1]; ctx.fillRect(waveX - 20, iy - 4, 6, 6);
        }
        if (f > 45) {
          ctx.fillStyle = 'rgba(100,180,255,0.3)';
          ctx.fillRect(opponent.x - 20, opponent.y - 50, 40, 50);
        }
      } else if (name === 'Obama') {
        if (f < 40) {
          const rx = opponent.x, ry = opponent.y - 25;
          const bs = Math.floor((f - 10) * 2);
          ctx.fillStyle = colors[1];
          ctx.fillRect(rx - bs, ry - 1, bs * 2, 2);
          ctx.fillRect(rx - 1, ry - bs, 2, bs * 2);
          ctx.fillRect(rx - bs, ry - bs, 8, 2); ctx.fillRect(rx - bs, ry - bs, 2, 8);
          ctx.fillRect(rx + bs - 8, ry - bs, 8, 2); ctx.fillRect(rx + bs - 2, ry - bs, 2, 8);
        } else {
          const missileCount = Math.min(5, Math.floor((f - 40) / 8));
          for (let m = 0; m < missileCount; m++) {
            const mx = opponent.x - 20 + m * 10;
            const my = 28 + Math.floor((f - 40 - m * 8) * 3);
            if (my > 0 && my < GAME_H) {
              ctx.fillStyle = colors[0]; ctx.fillRect(mx, my, 4, 10);
              ctx.fillStyle = '#FF4400'; ctx.fillRect(mx, my + 10, 4, 4);
            }
          }
        }
      } else if (name === 'Bush') {
        const ballProgress = (f - 10) / 70;
        const bx = STAGE_LEFT + ballProgress * (STAGE_RIGHT - STAGE_LEFT);
        const bouncePhase = (ballProgress * 3) % 1;
        const by = GROUND_Y - 20 - Math.abs(Math.sin(bouncePhase * Math.PI)) * 60;
        ctx.fillStyle = colors[0]; ctx.fillRect(Math.floor(bx) - 5, Math.floor(by) - 5, 10, 10);
        ctx.fillStyle = colors[1]; ctx.fillRect(Math.floor(bx) - 3, Math.floor(by) - 3, 6, 6);
        for (let ft = 1; ft <= 3; ft++) {
          const tbx = bx - ft * 8 * (fighter.facing);
          const tby = by + ft * 2;
          const alpha = 0.6 - ft * 0.15;
          ctx.fillStyle = 'rgba(255,' + (100 - ft * 30) + ',0,' + alpha + ')';
          ctx.fillRect(Math.floor(tbx) - 3, Math.floor(tby) - 3, 6, 6);
        }
      } else if (name === 'Clinton') {
        ctx.fillStyle = colors[0];
        const sx = fighter.x, sy = fighter.y - 30;
        ctx.fillRect(sx - 8, sy, 16, 24);
        ctx.fillRect(sx - 4, sy - 8, 8, 10);
        const noteCount = Math.floor((f - 10) / 10);
        for (let n = 0; n < Math.min(noteCount, 6); n++) {
          const nx = sx + (n % 2 === 0 ? -12 : 12) + Math.sin(f * 0.1 + n) * 4;
          const ny = sy - 20 - n * 12 - (f - 10) * 0.3;
          if (ny > 28) {
            ctx.fillStyle = colors[1];
            ctx.fillRect(Math.floor(nx), Math.floor(ny), 6, 6);
            ctx.fillRect(Math.floor(nx) + 6, Math.floor(ny) - 6, 2, 8);
          }
        }
        if (f > 30) {
          ctx.fillStyle = 'rgba(68,136,255,0.25)';
          ctx.fillRect(opponent.x - 22, opponent.y - 52, 44, 52);
        }
      }
    }
  }

  // ===== FIGHT SCENE =====
  let player = null;
  let cpu = null;
  let roundTimer = 3600;   // 60 seconds * 60 ticks per second
  let p1Wins = 0;
  let p2Wins = 0;
  let currentRound = 1;
  let koSplashTimer = 0;   // counts down from 90 when KO occurs
  let koTriggered = false;
  let roundWinner = null;  // 'player' or 'cpu'
  let matchOver = false;
  let winner = null;
  let aiController = null;
  let roundSplashTimer = 0;    // Total frames remaining in splash (90 = start, 0 = fighting)
  let roundSplashPhase = '';   // 'round' or 'fight'

  // Wall break state
  let wallBreakActive = false;
  let wallBreakTimer = 0;
  let wallBreakSide = null;       // 'left' or 'right'
  let wallBreakVictim = null;     // 'player' or 'cpu'
  let wallBreakSlowFrame = 0;     // alternating frame skip for slow-mo
  let stageTier = 1;

  // Selection state (set by charSelectScene)
  let selectedP1Def = null;
  let selectedP2Def = null;
  let selectedDifficulty = 1;  // 0=Easy, 1=Medium, 2=Hard
  let selectedStage = 'white-house';

  function resetRound() {
    // Reset fighters to starting positions with full health
    player.health = player.def.stats.health;
    cpu.health = cpu.def.stats.health;
    player.x = 100;
    player.y = GROUND_Y;
    player.vx = 0;
    player.vy = 0;
    cpu.x = 300;
    cpu.y = GROUND_Y;
    cpu.vx = 0;
    cpu.vy = 0;
    transitionFighterState(player, 'idle');
    transitionFighterState(cpu, 'idle');
    roundTimer = 3600;
    koTriggered = false;
    koSplashTimer = 0;
    roundWinner = null;
    hitStopFramesRemaining = 0;
    roundSplashTimer = 0;
    roundSplashPhase = '';
    // Guard meter reset
    player.guardMeter = 100;  player.guardBreakStun = 0;
    cpu.guardMeter = 100;     cpu.guardBreakStun = 0;
    // Ultimate reset
    player.ultimateMeter = 0;  player.ultimateActive = false;  player.ultimateFrame = 0;
    cpu.ultimateMeter = 0;     cpu.ultimateActive = false;     cpu.ultimateFrame = 0;
    // Wall break reset
    wallBreakActive = false;
    wallBreakTimer = 0;
    wallBreakSide = null;
    wallBreakVictim = null;
    wallBreakSlowFrame = 0;
    stageTier = 1;
    if (currentStage) initStage(STAGE_LOOKUP[selectedStage] || STAGES.whiteHouse);
  }

  // ===== CHARACTER SELECT SCENE =====
  const charSelectScene = {
    _cursorPos: 0,
    _difficulty: 1,
    _confirmed: false,
    _frameCount: 0,
    _availableFighters: [],
    _inputCooldown: 0,
    enter() {
      this._cursorPos = 0;
      this._difficulty = 1;
      this._confirmed = false;
      this._frameCount = 0;
      this._inputCooldown = 0;
      this._availableFighters = [TRUMP, BIDEN, OBAMA, BUSH, CLINTON];
      if (Object.keys(portraitCache).length === 0) {
        initPortraitCache([TRUMP, BIDEN, OBAMA, BUSH, CLINTON]);
      }
    },
    update(input) {
      this._frameCount++;
      if (this._confirmed) return null;
      if (this._inputCooldown > 0) this._inputCooldown--;

      if (this._inputCooldown === 0) {
        if (input.left && this._cursorPos > 0) {
          this._cursorPos--;
          this._inputCooldown = 12;
        } else if (input.right && this._cursorPos < 4) {
          this._cursorPos++;
          this._inputCooldown = 12;
        }
        if (input.up && this._difficulty > 0) {
          this._difficulty--;
          this._inputCooldown = 12;
        } else if (input.down && this._difficulty < 2) {
          this._difficulty++;
          this._inputCooldown = 12;
        }
      }

      if (input.enter) {
        selectedP1Def = this._availableFighters[this._cursorPos];
        const remaining = this._availableFighters.filter(function(f) { return f !== selectedP1Def; });
        selectedP2Def = remaining[Math.floor(Math.random() * remaining.length)];
        selectedDifficulty = this._difficulty;
        this._confirmed = true;
        return 'stageSelect';
      }

      if (keys['Escape']) {
        return 'title';
      }

      return null;
    },
    render(ctx) {
      // Background
      ctx.fillStyle = '#0A0A2A';
      ctx.fillRect(0, 0, 400, 240);

      // Heading
      drawText(ctx, 'SELECT FIGHTER', 200, 16, '#FFFFFF', 12, 'center');

      // Portrait cards
      const cardPositions = [
        { x: 80,  y: 40, name: 'Trump',   def: TRUMP,   locked: false },
        { x: 128, y: 40, name: 'Biden',   def: BIDEN,   locked: false },
        { x: 176, y: 40, name: 'Obama',   def: OBAMA,   locked: false },
        { x: 224, y: 40, name: 'Bush',    def: BUSH,    locked: false },
        { x: 272, y: 40, name: 'Clinton', def: CLINTON, locked: false }
      ];

      for (let i = 0; i < cardPositions.length; i++) {
        const card = cardPositions[i];
        const isSelected = (i === this._cursorPos);

        // Selection glow
        if (isSelected && !card.locked) {
          ctx.fillStyle = 'rgba(255,204,0,0.3)';
          ctx.fillRect(card.x - 4, card.y - 4, 48, 56);
        }

        // Card border
        if (card.locked) {
          ctx.fillStyle = '#333333';
        } else if (isSelected) {
          ctx.fillStyle = '#FFCC00';
        } else {
          ctx.fillStyle = '#444466';
        }
        ctx.fillRect(card.x - 2, card.y - 2, 44, 52);

        // Card background
        ctx.fillStyle = '#1A1A3A';
        ctx.fillRect(card.x, card.y, 40, 48);

        // Portrait or locked text
        if (card.locked) {
          drawText(ctx, '???', card.x + 20, card.y + 20, '#666666', 8, 'center');
        } else if (portraitCache[card.name]) {
          ctx.drawImage(portraitCache[card.name], card.x, card.y);
        }

        // Fighter name
        const nameCenterX = card.x + 20;
        drawText(ctx, card.name.toUpperCase(), nameCenterX, 96, '#FFFFFF', 8, 'center');
      }

      // P1 / CPU badges
      const p1CardX = cardPositions[this._cursorPos].x + 20;
      const cpuIdx = (this._cursorPos === 0) ? 1 : 0;
      const cpuCardX = cardPositions[cpuIdx].x + 20;
      drawText(ctx, 'P1', p1CardX, 36, '#00CC00', 8, 'center');
      drawText(ctx, 'CPU', cpuCardX, 36, '#CC0000', 8, 'center');

      // Difficulty section
      drawText(ctx, 'DIFFICULTY', 200, 128, '#FFFFFF', 8, 'center');

      const diffLabels = ['EASY', 'MEDIUM', 'HARD'];
      const diffXPositions = [136, 200, 264];
      for (let d = 0; d < 3; d++) {
        const color = (d === this._difficulty) ? '#FFCC00' : '#888888';
        drawText(ctx, diffLabels[d], diffXPositions[d], 140, color, 8, 'center');
      }
      drawText(ctx, '<', 120, 140, '#FFFFFF', 8, 'center');
      drawText(ctx, '>', 280, 140, '#FFFFFF', 8, 'center');

      // Blinking prompt
      const showPrompt = Math.floor(this._frameCount / 30) % 2 === 0;
      if (showPrompt) {
        drawText(ctx, 'PRESS ENTER TO FIGHT', 200, 220, '#FFFFFF', 8, 'center');
      }
    }
  };

  // ===== STAGE SELECT SCENE =====
  const stageSelectScene = {
    _cursorPos: 0,
    _frameCount: 0,
    _inputCooldown: 0,
    _thumbnails: null,
    _stageKeys:  ['white-house', 'greek-island', 'mar-a-lago', 'golf-course'],
    _stageNames: ['White House', 'Greek Island', 'Mar-a-Lago', 'Golf Course'],
    enter() {
      this._cursorPos = 0;
      this._frameCount = 0;
      this._inputCooldown = 0;
      if (!this._thumbnails) {
        this._thumbnails = {};
        for (let i = 0; i < this._stageKeys.length; i++) {
          const key = this._stageKeys[i];
          const stageDef = STAGE_LOOKUP[key];
          const tc = document.createElement('canvas');
          tc.width = 80; tc.height = 48;
          const tctx = tc.getContext('2d');
          tctx.imageSmoothingEnabled = false;
          tctx.save();
          tctx.scale(80 / GAME_W, 48 / GAME_H);
          stageDef.draw(tctx);
          tctx.restore();
          this._thumbnails[key] = tc;
        }
      }
    },
    update(input) {
      this._frameCount++;
      if (this._inputCooldown > 0) this._inputCooldown--;
      if (this._inputCooldown === 0) {
        if (input.left  && this._cursorPos > 0) { this._cursorPos--; this._inputCooldown = 12; }
        if (input.right && this._cursorPos < 3) { this._cursorPos++; this._inputCooldown = 12; }
      }
      if (input.enter) {
        selectedStage = this._stageKeys[this._cursorPos];
        return 'fight';
      }
      if (keys['Escape']) return 'charSelect';
      return null;
    },
    render(ctx) {
      ctx.fillStyle = '#0A0A2A';
      ctx.fillRect(0, 0, 400, 240);
      drawText(ctx, 'SELECT STAGE', 200, 14, '#FFFFFF', 12, 'center');
      for (let i = 0; i < 4; i++) {
        const key = this._stageKeys[i];
        const cx = 16 + i * 88;
        const cy = 60;
        const isSelected = (i === this._cursorPos);
        if (isSelected) {
          ctx.fillStyle = 'rgba(255,204,0,0.3)';
          ctx.fillRect(cx - 3, cy - 3, 86, 54);
        }
        ctx.fillStyle = isSelected ? '#FFCC00' : '#444466';
        ctx.fillRect(cx - 2, cy - 2, 84, 52);
        if (this._thumbnails && this._thumbnails[key]) {
          ctx.drawImage(this._thumbnails[key], cx, cy);
        } else {
          ctx.fillStyle = '#1A1A3A';
          ctx.fillRect(cx, cy, 80, 48);
        }
        drawText(ctx, this._stageNames[i], cx + 40, 118, isSelected ? '#FFCC00' : '#AAAAAA', 7, 'center');
      }
      drawText(ctx, this._stageNames[this._cursorPos], 200, 145, '#FFFFFF', 10, 'center');
      drawText(ctx, '< LEFT / RIGHT >', 200, 165, '#666688', 7, 'center');
      const showPrompt = Math.floor(this._frameCount / 30) % 2 === 0;
      if (showPrompt) drawText(ctx, 'PRESS ENTER TO CONFIRM', 200, 220, '#FFFFFF', 8, 'center');
    }
  };

  const fightScene = {
    enter() {
      player = createFighter(selectedP1Def || TRUMP, 100, 1);
      cpu = createFighter(selectedP2Def || BIDEN, 300, -1);
      roundTimer = 3600;
      p1Wins = 0;
      p2Wins = 0;
      currentRound = 1;
      koTriggered = false;
      koSplashTimer = 0;
      roundWinner = null;
      matchOver = false;
      winner = null;
      hitStopFramesRemaining = 0;
      attackHeldFrames = 0;
      prevAttack = false;
      inputBuffer.length = 0;
      initStage(STAGE_LOOKUP[selectedStage] || STAGES.whiteHouse);
      initSpriteCache([selectedP1Def || TRUMP, selectedP2Def || BIDEN]);
      aiController = createAIController(selectedDifficulty);
      roundSplashTimer = 90;
      roundSplashPhase = 'round';
      stageTier = 1;
      wallBreakActive = false;
      wallBreakTimer = 0;
      wallBreakSide = null;
      wallBreakVictim = null;
      wallBreakSlowFrame = 0;
      startBGMusic(selectedStage);
    },
    update(input) {
      // Wall break slow-mo: skip every other game tick for cinematic feel
      if (wallBreakActive && wallBreakTimer > 0) {
        wallBreakSlowFrame++;
        if (wallBreakSlowFrame % 2 === 0) {
          wallBreakTimer--;
          return null; // skip this tick
        }
      }

      // Round splash: block ALL input and game updates
      if (roundSplashTimer > 0) {
        roundSplashTimer--;
        if (roundSplashTimer === 30) {
          roundSplashPhase = 'fight';
        }
        return null;
      }

      // Match fully over: wait for Enter to go to victory scene
      if (matchOver) {
        if (input.enter) return 'victory';
        return null;
      }

      // KO splash: freeze fighters, count down timer, then handle round/match end
      if (koTriggered) {
        if (koSplashTimer > 0) {
          koSplashTimer--;
          return null;
        }
        // Splash done: tally win
        if (roundWinner === 'player') {
          p1Wins++;
        } else {
          p2Wins++;
        }
        // Check for match end (best-of-3: 2 wins)
        if (p1Wins >= 2 || p2Wins >= 2) {
          matchOver = true;
          winner = p1Wins >= 2 ? player.def.name.toUpperCase() : cpu.def.name.toUpperCase();
          koTriggered = false;
          return null;
        }
        // Start next round
        currentRound++;
        resetRound();
        roundSplashTimer = 90;
        roundSplashPhase = 'round';
        return null;
      }

      // Hit stop: freeze fighters, still decrement timer
      if (hitStopFramesRemaining > 0) {
        hitStopFramesRemaining--;
        roundTimer = Math.max(0, roundTimer - 1);
        return null;
      }

      // Pause menu
      if (input.escapePressed) {
        pauseMenuScene.enter('fight');
        return 'pause';
      }

      // Timer countdown
      roundTimer = Math.max(0, roundTimer - 1);

      // Update player state machine
      updateFighter(player, input, cpu);

      // CPU AI input
      const cpuInput = aiController.generateInput(cpu, player, frameCounter);
      updateFighter(cpu, cpuInput, player);

      // Push-back overlap resolution
      resolveFighterOverlap(player, cpu);

      // Hit detection (both directions -- allow trades)
      if (checkHit(player, cpu)) resolveHit(player, cpu);
      if (checkHit(cpu, player)) resolveHit(cpu, player);

      // Wall break detection
      checkWallBreak(player, cpu);
      checkWallBreak(cpu, player);

      // Ultimate damage at midpoint of animation
      if (player.ultimateActive && player.ultimateFrame === 45) {
        applyUltimateDamage(player, cpu);
      }
      if (cpu.ultimateActive && cpu.ultimateFrame === 45) {
        applyUltimateDamage(cpu, player);
      }

      // Wall break slow-mo and transition
      if (wallBreakActive) {
        if (wallBreakTimer > 0) {
          wallBreakTimer--;
        } else {
          wallBreakActive = false;
          stageTier = 2;
          initStageTier2(STAGE_LOOKUP[selectedStage] || STAGES.whiteHouse);
          playSFX('wallBreak');
          // Bonus 50 damage to the fighter who was knocked into the wall
          const victim = wallBreakVictim === 'cpu' ? cpu : player;
          victim.health = Math.max(0, victim.health - 50);
        }
      }

      // KO / round-end detection
      if (player.health <= 0) {
        koTriggered = true;
        koSplashTimer = 90;
        roundWinner = 'cpu';
        playSFX('ko');
        return null;
      }
      if (cpu.health <= 0) {
        koTriggered = true;
        koSplashTimer = 90;
        roundWinner = 'player';
        playSFX('ko');
        return null;
      }
      if (roundTimer <= 0) {
        // Time out: higher health percentage wins
        koTriggered = true;
        koSplashTimer = 90;
        roundWinner = (player.health / player.def.stats.health) >= (cpu.health / cpu.def.stats.health) ? 'player' : 'cpu';
        playSFX('ko');
        return null;
      }

      return null;
    },
    render(ctx) {
      // Draw cached stage background
      if (currentStage && currentStage.bgCanvas) {
        ctx.drawImage(currentStage.bgCanvas, 0, 0);
      }

      // Draw fighters
      if (player) renderFighter(ctx, player);
      if (cpu) renderFighter(ctx, cpu);

      // HUD overlay
      if (player && cpu) {
        drawHUD(ctx, player, cpu, roundTimer, p1Wins, p2Wins);
      }

      // Round splash overlay
      if (roundSplashTimer > 0) {
        if (roundSplashPhase === 'round') {
          // Semi-transparent backdrop band
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(0, 85, 400, 50);
          // "ROUND N" text
          drawText(ctx, 'ROUND ' + currentRound, 200, 100, '#FFFFFF', 16, 'center');
        } else if (roundSplashPhase === 'fight') {
          // Semi-transparent backdrop band (narrower for FIGHT)
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(0, 95, 400, 30);
          // "FIGHT!" text in gold
          drawText(ctx, 'FIGHT!', 200, 108, '#FFCC00', 16, 'center');
        }
      }

      // KO splash overlay (during 90-frame countdown)
      if (koTriggered && koSplashTimer > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(0, 85, GAME_W, 50);
        // Flash K.O.! text between white and red every 5 frames
        const koColor = Math.floor((90 - koSplashTimer) / 5) % 2 === 0 ? '#FFFFFF' : '#CC0000';
        drawText(ctx, 'K.O.!', 200, 100, koColor, 16, 'center');
      }

      // Match over overlay (after KO splash, waiting for Enter)
      if (matchOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 80, GAME_W, 80);
        drawText(ctx, 'K.O.!', 200, 90, '#FFFFFF', 16, 'center');
        drawText(ctx, winner + ' WINS!', 200, 115, '#FFCC00', 8, 'center');

        const showPrompt = Math.floor(frameCounter / 30) % 2 === 0;
        if (showPrompt) {
          drawText(ctx, 'PRESS ENTER TO CONTINUE', 200, 135, '#FFFFFF', 8, 'center');
        }
      }

      // Ultimate animations
      if (player && cpu) {
        renderUltimate(ctx, player, cpu);
        renderUltimate(ctx, cpu, player);
      }

      // Wall break effect: flash + crack overlay
      if (wallBreakActive && wallBreakTimer > 0) {
        const flashAlpha = (wallBreakTimer / 30) * 0.8;
        ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha + ')';
        ctx.fillRect(0, 0, GAME_W, GAME_H);
        const crackX = wallBreakSide === 'right' ? GAME_W : 0;
        ctx.fillStyle = '#000000';
        for (let i = 0; i < 5; i++) {
          const angle = (Math.PI / 6) * i - Math.PI / 3;
          const len = 30 + i * 15;
          const ex = Math.floor(crackX + Math.cos(angle) * len * (wallBreakSide === 'right' ? -1 : 1));
          const ey = Math.floor(GAME_H / 2 + Math.sin(angle) * len);
          ctx.fillRect(Math.min(crackX, ex), Math.min(GAME_H / 2, ey), Math.abs(crackX - ex) + 2, 2);
        }
      }
    }
  };

  // ===== VICTORY SCENE =====
  const victoryScene = {

    update(input) {
      this._frameCount++;
      if (input.enter && this._frameCount > 60) {
        // Reset all match state before returning to title

        p2Wins = 0;
        currentRound = 1;
        koTriggered = false;
        koSplashTimer = 0;

      const loserName = this._loserDef ? this._loserDef.name : 'Biden';
      const winFrameIdx = Math.floor(this._frameCount / 15) % 4;

      if (spriteCache[winnerName] && spriteCache[winnerName].idle) {
        const winFrame = spriteCache[winnerName].idle[winFrameIdx];
        if (winFrame) {

          const wx = 140 - Math.floor(winFrame.width * 1.5 / 2);
          const wy = 160 - Math.floor(winFrame.height * 1.5);

          ctx.drawImage(winFrame, wx, wy, Math.floor(winFrame.width * 1.5), Math.floor(winFrame.height * 1.5));

      }

      if (spriteCache[loserName] && spriteCache[loserName].knockdown) {

          const ly = 130 - Math.floor(loseFrame.height);
          ctx.drawImage(loseFrame, lx, ly);

  // ===== PAUSE MENU SCENE =====
  const pauseMenuScene = {

      this._frameCount++;
      if (this._inputCooldown > 0) { this._inputCooldown--; return null; }

      if (input.escapePressed) return this._fromScene;

      // Tab switch with left/right
      if (input.left  && this._tab > 0) { this._tab--; this._inputCooldown = 10; }
      if (input.right && this._tab < 1) { this._tab++; this._inputCooldown = 10; }

      // Menu item up/down
      if (input.up   && this._menuItem > 0) { this._menuItem--; this._inputCooldown = 10; }
      if (input.down && this._menuItem < 1) { this._menuItem++; this._inputCooldown = 10; }

      // Enter confirms selected menu item
      if (input.enter) {
        if (this._menuItem === 0) {
          // Resume
          return this._fromScene;

          // Return to char select — reset match state
          stopBGMusic();
          p1Wins = 0; p2Wins = 0; currentRound = 1;

  // ===== STAGE LOOKUP =====
  const STAGE_LOOKUP = {
    'white-house':  STAGES.whiteHouse,
    'greek-island': STAGES.greekIsland,
    'mar-a-lago':   STAGES.marALago,
    'golf-course':  STAGES.golfCourse
  };

  // ===== STAGE INIT =====
  let currentStage = null;

  function initStage(stageDef) {
    const oc = document.createElement('canvas');
    oc.width = GAME_W;
    oc.height = GAME_H;
    const octx = oc.getContext('2d');
    octx.imageSmoothingEnabled = false;
    stageDef.draw(octx);
    stageDef.bgCanvas = oc;
    currentStage = stageDef;
  }

  function initStageTier2(stageDef) {
    if (!stageDef || !stageDef.drawTier2) return;
    const oc = document.createElement('canvas');
    oc.width = GAME_W; oc.height = GAME_H;
    const octx = oc.getContext('2d');
    octx.imageSmoothingEnabled = false;
    stageDef.drawTier2(octx);
    stageDef.tier2Canvas = oc;
    // Swap bgCanvas to tier2 so the stage renders the new background
    stageDef.bgCanvas = oc;
    currentStage = stageDef;
  }

  // ===== INIT SEQUENCE =====
  window.addEventListener('load', () => {
    resizeCanvas();
    buildLogo();
    initStage(STAGES.whiteHouse);
    initAudio();
    // Sprite cache initialized in fightScene.enter() when fighters are created
    scenes[currentScene].enter();
    requestAnimationFrame(gameLoop);
  });

  document.addEventListener('keydown', function resumeAudio() {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  });

  </script>
