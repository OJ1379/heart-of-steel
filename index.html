  function drawStageSelectUsaMap(ctx, frame, selectedKey) {
    const mapScale = 0.96;
    const mapX = 36;
    const mapY = 118;
    const panelX = 16;
    const panelY = 116;
    const panelW = GAME_W - 32;
    const panelH = 112;
    const sweepX = ((frame * 2.4) % (panelW + 88)) - 44;
    const shimmer = 0.5 + 0.5 * Math.sin(frame * 0.05);
    const borderPulse = 0.5 + 0.5 * Math.sin(frame * 0.08);

    drawSelectPanel(ctx, panelX, panelY, panelW, panelH, '#8AD6B5');
    const radarCX = panelX + Math.floor(panelW * 0.52);
    const radarCY = panelY + Math.floor(panelH * 0.52);
    const sweepAngle = (frame * 0.035) % (Math.PI * 2);

    for (let y = panelY + 2; y < panelY + panelH - 2; y += 4) {
      const band = (y - panelY) / panelH;
      ctx.fillStyle = band < 0.18 ? '#081213' : band < 0.52 ? '#0D1718' : '#091113';
      ctx.fillRect(panelX + 2, y, panelW - 4, 4);
    }

    ctx.fillStyle = `rgba(186,228,210,${(0.04 + borderPulse * 0.04).toFixed(3)})`;
    ctx.fillRect(panelX + sweepX, panelY + 2, 16, panelH - 4);
    ctx.fillRect(panelX + sweepX + 22, panelY + 10, 7, panelH - 20);

    ctx.fillStyle = 'rgba(255,255,255,0.09)';
    for (let i = 0; i < 26; i++) {
      const starX = panelX + 10 + ((i * 31 + frame) % (panelW - 20));
      const starY = panelY + 10 + ((i * 17 + i * 5) % 28);
      ctx.fillRect(Math.floor(starX), Math.floor(starY), i % 4 === 0 ? 2 : 1, 1);
    }

    ctx.fillStyle = 'rgba(123,170,154,0.10)';
    for (let y = panelY + 18; y < panelY + panelH - 8; y += 12) {
      const drift = Math.floor(Math.sin(frame * 0.03 + y * 0.12) * 4);
      ctx.fillRect(panelX + 8 + drift, y, panelW - 16, 1);
    }
    ctx.fillStyle = 'rgba(68,112,104,0.14)';
    for (let x = panelX + 10; x < panelX + panelW - 8; x += 18) {
      ctx.fillRect(x, panelY + 8, 1, panelH - 16);
    }

    ctx.save();
    traceCharacterSelectUsaPath(ctx, mapX + 2, mapY + 3, mapScale);
    ctx.fillStyle = 'rgba(0,0,0,0.42)';
    ctx.fill();
    ctx.restore();

    ctx.save();
    traceCharacterSelectUsaPath(ctx, mapX, mapY, mapScale);
    ctx.fillStyle = '#1C2A27';
    ctx.fill();
    ctx.restore();

    ctx.save();
    traceCharacterSelectUsaPath(ctx, mapX, mapY, mapScale);
    ctx.clip();

    function inLake(tx, ty) {
      return (
        (tx >= 236 && tx <= 254 && ty >= 24 && ty <= 33) ||
        (tx >= 252 && tx <= 270 && ty >= 28 && ty <= 38) ||
        (tx >= 264 && tx <= 282 && ty >= 22 && ty <= 34) ||
        (tx >= 276 && tx <= 292 && ty >= 24 && ty <= 34) ||
        (tx >= 272 && tx <= 288 && ty >= 36 && ty <= 46)
      );
    }

    for (let ty = 0; ty < 104; ty += 4) {
      for (let tx = 0; tx < 340; tx += 4) {
        const nx = tx / 340;
        const ny = ty / 104;
        const noise = stageMapNoise(tx * 0.14, ty * 0.21, 2);
        const coarse = stageMapNoise(tx * 0.045, ty * 0.06, 7);
        const fine = stageMapNoise(tx * 0.29, ty * 0.33, 11);
        const ridge = Math.sin((tx + ty * 0.7) * 0.18) + Math.cos(ty * 0.25) + coarse * 0.8;
        const sierra = nx > 0.07 && nx < 0.16 && ny > 0.14 && ny < 0.62;
        const pacificNW = nx < 0.18 && ny < 0.38;
        const rockies = nx > 0.14 && nx < 0.34 && ny > 0.10 && ny < 0.82;
        const southwest = nx < 0.28 && ny > 0.48;
        const plains = nx >= 0.30 && nx < 0.60;
        const greatLakes = nx >= 0.58 && nx <= 0.76 && ny <= 0.46;
        const appalachia = nx > 0.64 && nx < 0.77 && ny > 0.18 && ny < 0.80;
        const southeast = nx >= 0.62 && ny > 0.56;
        const northeast = nx >= 0.74 && ny <= 0.56;
        const gulf = nx > 0.72 && ny > 0.78;
        const florida = nx > 0.80 && ny > 0.72;
        let color = '#6F845A';

        if (inLake(tx, ty)) {
          color = fine > 0.55 ? '#4D6E89' : '#6F97AC';
        } else if (gulf || florida) {
          color = fine > 0.45 ? '#5D8EA6' : '#78AAC2';
        } else if (southwest) {
          color = coarse > 0.62 ? '#A97B45' : (noise > 0.52 ? '#BF935C' : '#D1A36C');
        } else if (plains) {
          color = coarse > 0.58 ? '#A39A72' : (noise > 0.46 ? '#B4AA7E' : '#C3B58B');
        } else if (pacificNW || greatLakes) {
          color = coarse > 0.54 ? '#3E6541' : (noise > 0.48 ? '#4E754D' : '#628661');
        } else if (southeast) {
          color = coarse > 0.55 ? '#466A42' : (noise > 0.5 ? '#5A7D52' : '#6F9164');
        } else if (northeast) {
          color = coarse > 0.55 ? '#5B7051' : (noise > 0.48 ? '#6D7F60' : '#808E70');
        } else {
          color = coarse > 0.60 ? '#556A49' : (noise > 0.5 ? '#667A59' : '#788C6A');
        }

        if (rockies) {
          if (ridge > 1.25) color = '#F7F7F2';
          else if (ridge > 0.95) color = '#DDD7CB';
          else if (ridge > 0.56) color = '#8A765B';
          else if (ridge > 0.22) color = '#68704C';
        } else if (sierra) {
          if (ridge > 0.82) color = '#ECEAE1';
          else if (ridge > 0.44) color = '#8C7A60';
        } else if (appalachia) {
          const appRidge = Math.sin(tx * 0.28 - ty * 0.22) + fine * 0.6;
          if (appRidge > 0.92 && ny < 0.40) color = '#E1E6E0';
          else if (appRidge > 0.44) color = '#5F6D48';
        }

        if (greatLakes && coarse > 0.72 && !inLake(tx, ty)) color = '#4A6F52';

        ctx.fillStyle = color;
        ctx.fillRect(mapX + tx, mapY + ty, 4, 4);
      }
    }

    ctx.fillStyle = '#6E8FA8';
    ctx.fillRect(mapX + 236, mapY + 24, 20, 8);
    ctx.fillRect(mapX + 252, mapY + 28, 18, 10);
    ctx.fillRect(mapX + 264, mapY + 22, 18, 10);
    ctx.fillRect(mapX + 276, mapY + 24, 16, 8);
    ctx.fillRect(mapX + 272, mapY + 36, 16, 10);
    ctx.fillStyle = 'rgba(224,241,233,0.20)';
    ctx.fillRect(mapX + 240, mapY + 24, 10, 2);
    ctx.fillRect(mapX + 267, mapY + 22, 10, 2);

    ctx.fillStyle = '#5D7E8D';
    const rivers = [
      [188, 12], [186, 20], [190, 28], [192, 36], [194, 44], [196, 52], [198, 60], [202, 70], [206, 82], [210, 96],
      [86, 56], [80, 60], [74, 66], [70, 72], [66, 78], [62, 84],
      [34, 18], [30, 24], [28, 30], [24, 36]
    ];
    for (let i = 0; i < rivers.length; i++) {
      ctx.fillRect(mapX + rivers[i][0], mapY + rivers[i][1], i < 10 ? 3 : 2, 2);
    }

    const snowcaps = [
      [68, 18], [76, 22], [88, 26], [98, 32], [112, 38], [126, 44], [136, 50],
      [250, 24], [260, 28], [270, 26], [280, 28]
    ];
    ctx.fillStyle = '#F4F7F8';
    for (let i = 0; i < snowcaps.length; i++) ctx.fillRect(mapX + snowcaps[i][0], mapY + snowcaps[i][1], 6, 2);
    ctx.fillStyle = 'rgba(220,240,248,0.12)';
    ctx.fillRect(mapX + 2, mapY + 8, 6, 62);
    ctx.fillRect(mapX + 318, mapY + 18, 6, 54);

    ctx.strokeStyle = 'rgba(122,196,176,0.12)';
    ctx.lineWidth = 1;
    for (let lon = 0; lon < 6; lon++) {
      const gx = mapX + 46 + lon * 46 + Math.sin(frame * 0.015 + lon) * 2;
      ctx.beginPath();
      ctx.moveTo(gx, mapY + 8);
      ctx.quadraticCurveTo(gx + lon, mapY + 54, gx, mapY + 100);
      ctx.stroke();
    }
    for (let lat = 0; lat < 5; lat++) {
      const gy = mapY + 18 + lat * 18;
      ctx.beginPath();
      ctx.moveTo(mapX + 8, gy);
      ctx.quadraticCurveTo(mapX + 156, gy + (lat % 2 === 0 ? -3 : 3), mapX + 314, gy);
      ctx.stroke();
    }

    for (let tail = 8; tail >= 0; tail--) {
      const pct = 1 - tail / 8;
      const a0 = sweepAngle - tail * 0.05;
      const alpha = 0.018 + Math.pow(pct, 2.2) * 0.22;
      if (alpha <= 0) continue;
      ctx.fillStyle = `rgba(152,238,205,${alpha.toFixed(3)})`;
      ctx.beginPath();
      ctx.moveTo(radarCX, radarCY);
      ctx.lineTo(radarCX + Math.cos(a0 - (0.018 + pct * 0.034)) * 164, radarCY + Math.sin(a0 - (0.018 + pct * 0.034)) * 164);
      ctx.lineTo(radarCX + Math.cos(a0 + (0.018 + pct * 0.034)) * 164, radarCY + Math.sin(a0 + (0.018 + pct * 0.034)) * 164);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = `rgba(210,234,224,${(0.08 + shimmer * 0.08).toFixed(3)})`;
    ctx.fillRect(mapX + ((frame * 2) % 340) - 40, mapY - 2, 26, 108);
    ctx.fillRect(mapX + ((frame * 2) % 340) - 10, mapY + 8, 10, 88);

    ctx.strokeStyle = 'rgba(116,180,164,0.24)';
    ctx.lineWidth = 1;
    const stateLines = [
      [28, 8, 34, 88], [52, 8, 60, 90], [84, 20, 92, 88], [118, 18, 118, 92], [150, 8, 150, 92],
      [182, 6, 182, 94], [214, 16, 214, 96], [246, 22, 246, 98], [272, 26, 276, 94], [296, 18, 302, 92],
      [322, 16, 324, 72], [30, 28, 126, 28], [64, 46, 182, 46], [96, 62, 240, 62], [134, 78, 300, 78],
      [222, 38, 320, 38], [254, 52, 338, 52], [290, 66, 334, 66], [170, 32, 190, 52], [204, 48, 228, 64],
      [236, 60, 254, 76], [284, 74, 304, 96], [304, 82, 330, 100], [118, 68, 152, 88], [68, 60, 96, 88]
    ];
    for (const line of stateLines) {
      ctx.beginPath();
      ctx.moveTo(mapX + line[0] * mapScale, mapY + line[1] * mapScale);
      ctx.lineTo(mapX + line[2] * mapScale, mapY + line[3] * mapScale);
      ctx.stroke();
    }

    const iconKeys = ['camp-david', 'white-house', 'mar-a-lago', 'virgin-islands'];
    for (let i = 0; i < iconKeys.length; i++) {
      const info = getStageSelectInfo(iconKeys[i]);
      const mx = Math.floor(mapX + info.map.x * mapScale);
      const my = Math.floor(mapY + info.map.y * mapScale);
      const ang = Math.atan2(my - radarCY, mx - radarCX);
      let delta = Math.abs(ang - sweepAngle);
      if (delta > Math.PI) delta = Math.PI * 2 - delta;
      const lit = delta < 0.16;
      drawStageMapExteriorIcon(ctx, iconKeys[i], mx, my, iconKeys[i] === selectedKey, lit, frame);
    }

    for (let ring = 0; ring < 4; ring++) {
      const radius = ((frame * 1.6 + ring * 30) % 112) + 10;
      const alpha = 0.16 - ring * 0.03;
      ctx.strokeStyle = `rgba(160,224,200,${alpha.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(radarCX, radarCY, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    for (let tx = mapX; tx < mapX + 316; tx += 8) {
      for (let ty = mapY; ty < mapY + 100; ty += 8) {
        const pulse = Math.sin(frame * 0.04 + tx * 0.08 + ty * 0.04);
        if (pulse > 0.9) {
          ctx.fillStyle = 'rgba(156,220,196,0.12)';
          ctx.fillRect(tx, ty, 6, 6);
        }
      }
    }

    ctx.restore();

    ctx.save();
    traceCharacterSelectUsaPath(ctx, mapX, mapY, mapScale);
    ctx.strokeStyle = '#D8EFE6';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.strokeStyle = '#0B1423';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();

    ctx.strokeStyle = `rgba(210,238,226,${(0.16 + borderPulse * 0.08).toFixed(3)})`;
    ctx.lineWidth = 1;
    ctx.strokeRect(panelX + 6, panelY + 6, panelW - 12, panelH - 12);
  }

  function drawCharacterSelectSatellite(ctx, x, y, flip, bodyColor, panelColor) {
    ctx.save();
    ctx.translate(x, y);
    if (flip) ctx.scale(-1, 1);

    ctx.fillStyle = panelColor;
    ctx.fillRect(-18, 4, 12, 8);
    ctx.fillRect(10, 4, 12, 8);
    ctx.fillStyle = '#9FD7FF';
    ctx.fillRect(-16, 5, 8, 1);
    ctx.fillRect(12, 5, 8, 1);
    ctx.fillRect(-16, 8, 8, 1);
    ctx.fillRect(12, 8, 8, 1);

    ctx.fillStyle = bodyColor;
    ctx.fillRect(-4, 2, 12, 12);
    ctx.fillRect(-2, 0, 8, 2);
    ctx.fillStyle = '#DCEBFF';
    ctx.fillRect(-2, 4, 4, 3);
    ctx.fillRect(3, 5, 2, 2);

    ctx.fillStyle = '#6F7FA3';
    ctx.fillRect(-7, 6, 3, 2);
    ctx.fillRect(8, 6, 3, 2);

  function renderCharacterSelectBackdropBase(ctx, frame) {
    const stripeH = Math.ceil(GAME_H / 13);
    const cantonW = 162;
    const cantonH = stripeH * 7;
    ctx.fillStyle = '#07111C';
    ctx.fillRect(0, 0, GAME_W, GAME_H);

    for (let sx = 0; sx < GAME_W; sx += 4) {
      const ratio = sx / GAME_W;
      const waveA = Math.sin(frame * 0.05 + sx * 0.08) * 6;
      const waveB = Math.sin(frame * 0.025 + sx * 0.03) * 3;
      const fold = Math.cos(frame * 0.04 + sx * 0.055) * 2;
      const sliceY = Math.floor(waveA + waveB - fold);
      const shade = Math.sin(frame * 0.045 + sx * 0.11);

      for (let stripe = 0; stripe < 13; stripe++) {
        ctx.fillStyle = stripe % 2 === 0 ? '#B22234' : '#F4F1EA';
        ctx.fillRect(sx, stripe * stripeH + sliceY, 4, stripeH + 1);
      }

      if (sx < cantonW) {
        ctx.fillStyle = '#3C3B6E';
        ctx.fillRect(sx, sliceY, 4, cantonH);
      }

      if (shade > 0.34) {
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(sx, sliceY, 4, GAME_H);
      } else if (shade < -0.32) {
        ctx.fillStyle = 'rgba(0,0,0,0.10)';
        ctx.fillRect(sx, sliceY, 4, GAME_H);
      }

      if (ratio > 0.18 && ratio < 0.94 && Math.cos(frame * 0.03 + sx * 0.07) > 0.7) {
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(sx, sliceY + 1, 4, GAME_H - 4);
      }
    }

    const starRows = [6, 5, 6, 5, 6, 5, 6, 5, 6];
    for (let row = 0; row < starRows.length; row++) {
      const count = starRows[row];
      const rowY = 8 + row * 8;
      for (let i = 0; i < count; i++) {
        const starX = 12 + i * 24 + (count === 5 ? 12 : 0);
        const sy = rowY + Math.floor(Math.sin(frame * 0.05 + starX * 0.08) * 5 + Math.sin(frame * 0.025 + starX * 0.03) * 3 - Math.cos(frame * 0.035 + starX * 0.06) * 2);
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(starX, sy, 2, 2);
        ctx.fillRect(starX + 1, sy - 1, 1, 4);
        ctx.fillRect(starX - 1, sy + 1, 4, 1);
      }
    }

    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(0, 24, GAME_W, 80);
    ctx.fillRect(0, 118, GAME_W, 74);
    ctx.fillStyle = 'rgba(0,0,0,0.26)';
    ctx.fillRect(0, 194, GAME_W, 46);

    const highlight = ctx.createLinearGradient(0, 0, GAME_W, 0);
    highlight.addColorStop(0, 'rgba(255,255,255,0.08)');
    highlight.addColorStop(0.35, 'rgba(255,255,255,0.03)');
    highlight.addColorStop(0.7, 'rgba(0,0,0,0.07)');
    highlight.addColorStop(1, 'rgba(0,0,0,0.16)');
    ctx.fillStyle = highlight;
    ctx.fillRect(0, 0, GAME_W, GAME_H);

    const vignette = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, 46, GAME_W / 2, GAME_H / 2, 240);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(0.62, 'rgba(0,0,0,0.12)');
    vignette.addColorStop(1, 'rgba(5,8,14,0.46)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }

  const characterSelectBackdropScale = Math.max(2, Math.ceil(window.devicePixelRatio || 1));
  const characterSelectBackdropCanvas = document.createElement('canvas');
  characterSelectBackdropCanvas.width = GAME_W * characterSelectBackdropScale;
  characterSelectBackdropCanvas.height = GAME_H * characterSelectBackdropScale;
  const characterSelectBackdropCtx = characterSelectBackdropCanvas.getContext('2d');

  function renderCharacterSelectBackdrop(ctx, frame) {
    characterSelectBackdropCtx.setTransform(1, 0, 0, 1, 0, 0);
    characterSelectBackdropCtx.clearRect(0, 0, characterSelectBackdropCanvas.width, characterSelectBackdropCanvas.height);
    characterSelectBackdropCtx.setTransform(characterSelectBackdropScale, 0, 0, characterSelectBackdropScale, 0, 0);
    characterSelectBackdropCtx.imageSmoothingEnabled = true;
    renderCharacterSelectBackdropBase(characterSelectBackdropCtx, frame);
    ctx.save();
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(
      characterSelectBackdropCanvas,
      0,
      0,
      characterSelectBackdropCanvas.width,
      characterSelectBackdropCanvas.height,
      0,
      0,
      GAME_W,
      GAME_H
    );
    ctx.restore();
  }

  function drawCharacterSelectSlot(ctx, card, x, y, w, h, selected, frame) {
    const pulse = 0.5 + 0.5 * Math.sin(frame * 0.18);
    const lift = selected ? Math.floor(Math.sin(frame * 0.16) * 2) : 0;
    const topY = y + lift;

    ctx.fillStyle = selected ? '#F4F5F8' : '#A6ADBC';
    ctx.fillRect(x - 4, topY - 4, w + 8, h + 8);
    ctx.fillStyle = selected ? card.accent : '#666C7B';
    ctx.fillRect(x - 2, topY - 2, w + 4, h + 4);
    ctx.fillStyle = '#080A0F';
    ctx.fillRect(x, topY, w, h);
    ctx.fillStyle = '#121621';
    ctx.fillRect(x + 4, topY + 4, w - 8, h - 8);

    ctx.fillStyle = '#868D9E';
    ctx.fillRect(x + 4, topY + 4, 4, h - 8);
    ctx.fillRect(x + w - 8, topY + 4, 4, h - 8);
    ctx.fillStyle = '#C3C9D8';
    ctx.fillRect(x + 8, topY + 4, w - 16, 2);

    if (portraitCache[card.def.name]) {
      const portraitW = 50;
      const portraitH = 52;
      const portraitX = x + Math.floor((w - portraitW) / 2);
      const portraitY = topY + 4;
      ctx.fillStyle = getPortraitAccentColor(card.def.name);
      ctx.fillRect(portraitX - 1, portraitY - 1, portraitW + 2, portraitH + 2);
      ctx.fillStyle = '#09101A';
      ctx.fillRect(portraitX, portraitY, portraitW, portraitH);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(portraitX + 2, portraitY + 2, portraitW - 4, 2);
      ctx.drawImage(portraitCache[card.def.name], portraitX, portraitY, portraitW, portraitH);
    }

    if (!selected) {
      ctx.fillStyle = 'rgba(0,0,0,0.16)';
      ctx.fillRect(x + 4, topY + 4, w - 8, h - 8);
    } else {
      ctx.fillStyle = `rgba(255,255,255,${(0.12 + pulse * 0.18).toFixed(3)})`;
      ctx.fillRect(x + 4, topY + 4, w - 8, 8);
      const sweep = x + 4 + Math.floor(((frame * 2 + x) % (w + 18)) - 12);
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      ctx.fillRect(sweep, topY + 4, 8, h - 8);
      ctx.fillStyle = card.accent;
      ctx.fillRect(x + 10, topY - 8, w - 20, 4);
      ctx.fillStyle = '#00F070';
      ctx.fillRect(x + 23, topY - 15, 18, 7);
      drawTextInRect(ctx, 'P1', x + 23, topY - 15, 18, 7, '#031708', 4, '#99FFB4', 0);
    }

  }

  function drawCharacterSelectInfoChip(ctx, x, y, w, h, title, lines, accent) {
    ctx.fillStyle = '#A8AFBF';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = accent;
    ctx.fillRect(x + 2, y + 2, w - 4, 5);
    ctx.fillStyle = '#05070B';
    ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
    ctx.fillStyle = '#111724';
    ctx.fillRect(x + 4, y + 11, w - 8, h - 15);
    drawText(ctx, title, x + Math.floor(w / 2), y + 3, '#081018', 6, 'center');
    const innerTop = y + 11;
    const innerH = h - 15;
    const lineGap = 9;
    const valueFontSize = 6;
    const blockH = lines.length * lineGap - (lineGap - 6);
    const linesTop = innerTop + Math.floor((innerH - blockH) / 2) + 5;
    for (let i = 0; i < lines.length; i++) {
      drawText(ctx, lines[i], x + Math.floor(w / 2), linesTop + i * lineGap, '#FFF4CE', valueFontSize, 'center');
    }
  }

  function drawCharacterSelectStatBar(ctx, x, y, w, label, value, color) {
    const barW = 42;
    ctx.fillStyle = '#8B90A2';
    ctx.fillRect(x, y, w, 8);
    ctx.fillStyle = '#0A0D14';
    ctx.fillRect(x + 1, y + 1, w - 2, 6);
    drawText(ctx, label, x + 4, y + 1, '#C6D1E8', 4, 'left');
    ctx.fillStyle = '#1B2434';
    ctx.fillRect(x + w - barW - 4, y + 2, barW, 4);
    ctx.fillStyle = color;
    ctx.fillRect(x + w - barW - 4, y + 2, Math.max(2, Math.floor(barW * clamp(value, 0, 1))), 4);
  }

  function drawCharacterSelectPreviewPanel(ctx, card, difficulty, frame) {
    const x = 126;
    const y = 124;
    const w = 148;
    const h = 28;
    const pulse = 0.5 + 0.5 * Math.sin(frame * 0.16);
    ctx.fillStyle = '#A8AFBF';
    ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
    ctx.fillStyle = '#05070C';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = card.accent;
    ctx.fillRect(x + 3, y + 3, w - 6, 5);

    for (let i = 0; i < card.titleLines.length; i++) {
      drawText(ctx, card.titleLines[i], x + Math.floor(w / 2), y + 13 + i * 8, '#FFF6D0', 6, 'center');

  function drawCharacterSelectNameBanner(ctx, card) {
    const centerX = GAME_W / 2;
    const w = Math.max(180, measurePixelText(card.displayName, 12) + 32);
    const h = 22;
    const x = Math.floor(centerX - w / 2);
    const y = 106;
    drawSelectPanel(ctx, x, y, w, h, card.accent);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(x + 6, y + 6, w - 12, 3);
    drawText(ctx, card.displayName, centerX, y + 3, '#FFF6D6', 12, 'center');

  // ===== CHARACTER SELECT SCENE =====
  const charSelectScene = {
    _cursorPos: 0,
    _difficulty: 1,
    _confirmed: false,
    _frameCount: 0,
    _availableFighters: [],
    _inputCooldown: 0,
    enter() {
      this._cursorPos = 0;
      this._difficulty = 1;
      this._confirmed = false;
      this._frameCount = 0;
      this._inputCooldown = 0;
      this._availableFighters = CHAR_SELECT_CARDS.map(function(card) { return card.def; });
      if (Object.keys(portraitCache).length === 0) {
        initPortraitCache(ALL_FIGHTERS);
      }
    },
    update(input) {
      this._frameCount++;
      if (this._confirmed) return null;
      if (this._inputCooldown > 0) this._inputCooldown--;

      if (this._inputCooldown === 0) {
        if (input.left) {
          this._cursorPos = wrapIndex(this._cursorPos - 1, this._availableFighters.length);
          this._inputCooldown = 12;
          playSFX('menuMove');
        } else if (input.right) {
          this._cursorPos = wrapIndex(this._cursorPos + 1, this._availableFighters.length);
          this._inputCooldown = 12;
          playSFX('menuMove');
        }
        if (input.up && this._difficulty < AI_DIFFICULTIES.length - 1) {
          this._difficulty++;
          this._inputCooldown = 12;
          playSFX('menuMove');
        } else if (input.down && this._difficulty > 0) {
          this._difficulty--;
          this._inputCooldown = 12;
          playSFX('menuMove');
        }
      }

      if (input.enterPressed) {
        playSFX('menuConfirm');
        selectedP1Def = this._availableFighters[this._cursorPos];
        selectedDifficulty = this._difficulty;
        selectedGameMode = pendingGameMode;
        this._confirmed = true;
        if (selectedGameMode === 'executive-run') {
          startExecutiveRun(selectedP1Def);
          return 'fight';
        }
        const remaining = this._availableFighters.filter(function(f) { return f !== selectedP1Def; });
        selectedP2Def = remaining[Math.floor(Math.random() * remaining.length)];
        return 'stageSelect';
      }

      if (input.escapePressed) {
        playSFX('menuBack');
        return 'title';
      }

      return null;
    },
    render(ctx) {
      const centerX = GAME_W / 2;
      const selectedCard = CHAR_SELECT_CARDS[this._cursorPos];
      const difficultyLabel = AI_DIFFICULTIES[this._difficulty].name;
      const difficultyChipW = Math.max(120, measurePixelText('DIFFICULTY', 6) + 24, measurePixelText(difficultyLabel, 8) + 30);
      const difficultyChipX = Math.floor(centerX - difficultyChipW / 2);
      const playerSelectTextW = measurePixelText('PLAYER SELECT', 8);
      const playerSelectTextRectW = Math.max(144, playerSelectTextW + 16);
      const playerSelectTextRectX = Math.floor(centerX - playerSelectTextRectW / 2);

      renderCharacterSelectBackdrop(ctx, this._frameCount);
      drawCharacterSelectHeader(ctx, this._frameCount);

      for (let i = 0; i < CHAR_SELECT_CARDS.length; i++) {
        drawCharacterSelectSlot(ctx, CHAR_SELECT_CARDS[i], 12 + i * 76, 36, 72, 58, i === this._cursorPos, this._frameCount);
      }

      drawCharacterSelectNameBanner(ctx, selectedCard);
      drawCharacterSelectPreviewPanel(ctx, selectedCard, this._difficulty, this._frameCount);
      drawCharacterSelectInfoChip(ctx, difficultyChipX, 156, difficultyChipW, 30, 'DIFFICULTY', [difficultyLabel], '#4B84E0');

      ctx.fillStyle = '#A8AFBF';
      ctx.fillRect(120, 192, 160, 20);
      ctx.fillStyle = '#05070C';
      ctx.fillRect(124, 196, 152, 12);
      ctx.fillStyle = '#FFCC29';
      ctx.fillRect(128, 199, 144, 6);
      drawTextInRect(ctx, 'PLAYER SELECT', playerSelectTextRectX, 196, playerSelectTextRectW, 8, '#111111', 8, '#FFE29A', 0);

      const showPrompt = Math.floor(this._frameCount / 24) % 2 === 0;
      if (showPrompt) {
        const promptRect = getCenteredTextRect('PRESS ENTER TO FIGHT', centerX, 216, 6, 12, 1);
        ctx.fillStyle = 'rgba(7,11,18,0.80)';
        ctx.fillRect(promptRect.x, promptRect.y, promptRect.w, promptRect.h);
        drawTextInRect(ctx, 'PRESS ENTER TO FIGHT', promptRect.x, promptRect.y, promptRect.w, promptRect.h, '#FFF4C3', 6, '#070B12', 1);
      }
      const mergedHint = 'LEFT/RIGHT FIGHTER   UP/DOWN DIFFICULTY   ESC BACK';
      const hintFont = measurePixelText(mergedHint, 4) <= GAME_W - 32 ? 4 : 3;
      const fighterHintRect = getCenteredTextRect(mergedHint, centerX, 228, hintFont, 10, 0);
      ctx.fillStyle = 'rgba(7,11,18,0.72)';
      ctx.fillRect(fighterHintRect.x, fighterHintRect.y, fighterHintRect.w, fighterHintRect.h);
      drawTextInRect(ctx, mergedHint, fighterHintRect.x, fighterHintRect.y, fighterHintRect.w, fighterHintRect.h, '#C8CFDA', hintFont, '#070B12', 1);
    }
  };

  // ===== STAGE THUMBNAIL GENERATOR =====
  function generateStageThumbnail(stageDef, width, height) {
    const oc = document.createElement('canvas');
    oc.width = width;
    oc.height = height;
    const octx = oc.getContext('2d');
    octx.imageSmoothingEnabled = false;
    const full = document.createElement('canvas');
    full.width = GAME_W;
    full.height = GAME_H;
    const fullCtx = full.getContext('2d');
    fullCtx.imageSmoothingEnabled = false;
    if (stageDef.renderBackground) stageDef.renderBackground(fullCtx);
    else stageDef.draw(fullCtx);
    octx.drawImage(full, 0, 0, width, height);
    return oc;
  }

  // ===== STAGE SELECT SCENE =====
  const stageSelectScene = {
    _cursorPos: 0,
    _frameCount: 0,
    _inputCooldown: 0,
    _thumbnails: null,
    _previewKey: 'white-house',
    _prevPreviewKey: null,
    _previewBlend: 1,
    _stageKeys:  ['white-house', 'virgin-islands', 'mar-a-lago', 'camp-david'],
    _stageNames: ['Oval Office', 'Virgin Islands', 'Mar-a-Lago', 'Camp David'],
    enter() {
      this._cursorPos = 0;
      this._frameCount = 0;
      this._inputCooldown = 0;
      this._previewKey = this._stageKeys[0];
      this._prevPreviewKey = null;
      this._previewBlend = 1;
      if (!this._thumbnails) {
        this._thumbnails = {};
        for (let i = 0; i < this._stageKeys.length; i++) {
          const key = this._stageKeys[i];
          this._thumbnails[key] = generateStageExteriorThumbnail(key, 80, 48);
        }
      }
    },
    update(input) {
      this._frameCount++;
      if (this._inputCooldown > 0) this._inputCooldown--;
      if (this._inputCooldown === 0) {
        if (input.left) {
          this._cursorPos = wrapIndex(this._cursorPos - 1, this._stageKeys.length);
          this._inputCooldown = 12;
          this._prevPreviewKey = this._previewKey;
          this._previewKey = this._stageKeys[this._cursorPos];
          this._previewBlend = 0;
          playSFX('menuMove');
        } else if (input.right) {
          this._cursorPos = wrapIndex(this._cursorPos + 1, this._stageKeys.length);
          this._inputCooldown = 12;
          this._prevPreviewKey = this._previewKey;
          this._previewKey = this._stageKeys[this._cursorPos];
          this._previewBlend = 0;
          playSFX('menuMove');
        }
      }
      if (input.enterPressed) {
        playSFX('menuConfirm');
        selectedStage = this._stageKeys[this._cursorPos];
        return 'fight';
      }
      if (input.escapePressed) {
        playSFX('menuBack');
        return 'charSelect';
      }
      return null;
    },
    render(ctx) {
      const selectedKey = this._stageKeys[this._cursorPos];
      const selectedInfo = getStageSelectInfo(selectedKey);
      this._previewBlend = Math.min(1, this._previewBlend + 0.12);
      renderPatrioticSelectBackground(ctx, this._frameCount, 'SELECT STAGE');
      drawStageSelectUsaMap(ctx, this._frameCount, selectedKey);
      drawSelectPanel(ctx, 20, 52, 360, 62, '#8FCBFF');
      drawSelectPanel(ctx, 128, 134, 144, 84, '#8FCBFF');
      for (let i = 0; i < 4; i++) {
        const key = this._stageKeys[i];
        const cx = 28 + i * 86;
        const cy = 61;
        const isSelected = (i === this._cursorPos);
        if (isSelected) {
          ctx.fillStyle = 'rgba(124,226,255,0.18)';
          ctx.fillRect(cx - 5, cy - 5, 82, 58);
        }
        ctx.fillStyle = isSelected ? '#9DEEFF' : '#6E7C99';
        ctx.fillRect(cx - 2, cy - 2, 76, 54);
        ctx.fillStyle = '#111A30';
        ctx.fillRect(cx, cy, 72, 50);
        if (this._thumbnails && this._thumbnails[key]) {
          ctx.drawImage(this._thumbnails[key], cx, cy, 72, 42);
        } else {
          ctx.fillStyle = '#1A1A3A';
          ctx.fillRect(cx, cy, 72, 42);
        }
        const thumbLines = this._stageNames[i] === 'Virgin Islands'
          ? ['VIRGIN', 'ISLANDS']
          : [this._stageNames[i]];
        const labelH = thumbLines.length > 1 ? 10 : 8;
        ctx.fillStyle = isSelected ? 'rgba(117,225,255,0.16)' : 'rgba(255,255,255,0.06)';
        ctx.fillRect(cx, cy + 42, 72, labelH);
        drawTextLinesInRect(ctx, thumbLines, cx + 2, cy + 41, 68, labelH, isSelected ? '#F0FCFF' : '#E2E7EF', 4, 0, '#081018', 1);
      }
      // Large preview of selected stage
      var previewW = 136, previewH = 76;
      var previewX = Math.floor((400 - previewW) / 2);
      var previewY = 140;
      ctx.fillStyle = '#B1BED4';
      ctx.fillRect(previewX - 6, previewY - 6, previewW + 12, previewH + 20);
      ctx.fillStyle = '#07121F';
      ctx.fillRect(previewX - 3, previewY - 3, previewW + 6, previewH + 14);
      ctx.fillStyle = '#16304A';
      ctx.fillRect(previewX, previewY, previewW, previewH);
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      ctx.fillRect(previewX + 2, previewY + 2, previewW - 4, 3);
      if (this._prevPreviewKey && this._previewBlend < 1) {
        const oldPreview = generateStageArenaPreview(this._prevPreviewKey, previewW, previewH, this._frameCount);
        ctx.save();
        ctx.globalAlpha = 1 - this._previewBlend;
        ctx.drawImage(oldPreview, previewX, previewY);
        ctx.restore();
      }
      const newPreview = generateStageArenaPreview(selectedKey, previewW, previewH, this._frameCount);
      ctx.save();
      ctx.globalAlpha = this._previewBlend;
      ctx.drawImage(newPreview, previewX, previewY);
      ctx.restore();
      ctx.fillStyle = 'rgba(4,12,20,0.46)';
      ctx.fillRect(previewX, previewY + previewH - 12, previewW, 12);
      drawTextInRect(ctx, selectedInfo.desc.toUpperCase(), previewX + 4, previewY + previewH - 10, previewW - 8, 8, '#E3F8FF', 4, '#04101A', 0);
      const stageNameRect = getCenteredTextRect(selectedInfo.name, GAME_W / 2, 118, 8, 12, 4, 132);
      drawSelectPanel(ctx, stageNameRect.x, stageNameRect.y, stageNameRect.w, stageNameRect.h, '#8FCBFF');
      drawTextInRect(ctx, selectedInfo.name, stageNameRect.x + 4, stageNameRect.y + 2, stageNameRect.w - 8, stageNameRect.h - 4, '#FFFFFF', 8, '#07101B', 1);
      const showPrompt = Math.floor(this._frameCount / 30) % 2 === 0;
      if (showPrompt) {
        const promptRect = getCenteredTextRect('PRESS ENTER TO FIGHT', GAME_W / 2, 217, 6, 12, 4);
        ctx.fillStyle = 'rgba(7,16,27,0.80)';
        ctx.fillRect(promptRect.x, promptRect.y, promptRect.w, promptRect.h);
        drawTextInRect(ctx, 'PRESS ENTER TO FIGHT', promptRect.x, promptRect.y, promptRect.w, promptRect.h, '#FFFFFF', 6, '#07101B', 1);
      }
      const stageHintRect = getCenteredTextRect('A/D OR ARROWS STAGE   ESC BACK', GAME_W / 2, 229, 4, 10, 3);
      ctx.fillStyle = 'rgba(7,16,27,0.74)';
      ctx.fillRect(stageHintRect.x, stageHintRect.y, stageHintRect.w, stageHintRect.h);
      drawTextInRect(ctx, 'A/D OR ARROWS STAGE   ESC BACK', stageHintRect.x, stageHintRect.y, stageHintRect.w, stageHintRect.h, '#C8CFDA', 4, '#07101B', 1);
    }
  };

  const fightScene = {
    enter() {
      stageTier = 1;
      wallBreakActive = false;
      wallBreakTimer = 0;
      wallBreakSide = null;
      wallBreakVictim = null;
      wallBreakSlowFrame = 0;
      ultimateProjectiles.length = 0;
      initStage(STAGE_LOOKUP[selectedStage] || STAGES.whiteHouse);
      const spawns = getStageSpawnPoints();
      player = createFighter(selectedP1Def || TRUMP, spawns.player, 1);
      cpu = createFighter(selectedP2Def || BIDEN, spawns.cpu, -1);
      applyMatchModifier();
      roundTimer = 3600;
      p1Wins = 0;
      p2Wins = 0;
      currentRound = 1;
      koTriggered = false;
      koSplashTimer = 0;
      roundWinner = null;
      matchOver = false;
      winner = null;
      hitStopFramesRemaining = 0;
      matchScoreAwarded = false;
      attackHeldFrames = 0;
      prevAttack = false;
      inputBuffer.length = 0;
      initSpriteCache([selectedP1Def || TRUMP, selectedP2Def || BIDEN]);
      aiController = createAIController(selectedDifficulty);
      roundSplashTimer = 90;
      roundSplashPhase = 'round';
      updateFightCamera(true);
      startBGMusic(selectedStage);
    },
    update(input) {
      // Wall break slow-mo: run at one third speed for a heavier impact beat
      if (wallBreakActive && wallBreakTimer > 0) {
        wallBreakSlowFrame++;
        if (wallBreakSlowFrame % 3 !== 0) {
          wallBreakTimer--;
          return null; // skip this tick
        }
      }

      // Round splash: block ALL input and game updates
      if (roundSplashTimer > 0) {
        roundSplashTimer--;
        if (roundSplashTimer === 30) {
          roundSplashPhase = 'fight';
        }
        return null;
      }

      if (modifierSplashTimer > 0) modifierSplashTimer--;

      // Match fully over: wait for Enter to go to victory scene
      if (matchOver) {
        if (input.enterPressed) {
          playSFX('menuConfirm');
          return 'victory';
        }
        return null;
      }

      // KO splash: freeze fighters, count down timer, then handle round/match end
      if (koTriggered) {
        if (koSplashTimer > 0) {
          koSplashTimer--;
          return null;
        }
        // Splash done: tally win
        if (roundWinner === 'player') {
          p1Wins++;
        } else {
          p2Wins++;
        }
        // Check for match end (best-of-3: 2 wins)
        if (p1Wins >= 2 || p2Wins >= 2) {
          matchOver = true;
          winner = p1Wins >= 2 ? player.def.name.toUpperCase() : cpu.def.name.toUpperCase();
          if (selectedGameMode === 'executive-run') {
            if (p1Wins >= 2) awardExecutiveRunWin();
            else executiveRunState.streak = 0;
          }
          koTriggered = false;
          return null;
        }
        // Start next round
        currentRound++;
        resetRound();
        roundSplashTimer = 90;
        roundSplashPhase = 'round';
        return null;
      }

      // Hit stop: freeze fighters, still decrement timer
      if (hitStopFramesRemaining > 0) {
        hitStopFramesRemaining--;
        roundTimer = Math.max(0, roundTimer - 1);
        return null;
      }

      // Pause menu
      if (input.escapePressed) {
        playSFX('menuOpen');
        pauseMenuScene.enter('fight');
        return 'pause';
      }

      // Timer countdown
      roundTimer = Math.max(0, roundTimer - 1);

      // Update player state machine
      updateFighter(player, input, cpu);

      // CPU AI input
      const cpuInput = aiController.generateInput(cpu, player, frameCounter);
      updateFighter(cpu, cpuInput, player);

      // Push-back overlap resolution
      resolveFighterOverlap(player, cpu);

      // Hit detection (both directions -- allow trades)
      if (checkHit(player, cpu)) resolveHit(player, cpu);
      if (checkHit(cpu, player)) resolveHit(cpu, player);

      // Wall break detection
      checkWallBreak(player, cpu);
      checkWallBreak(cpu, player);

      updateUltimateResolution(player, cpu);
      updateUltimateResolution(cpu, player);
      updateUltimateProjectiles();

      updateFightCamera(false);

      // Wall break slow-mo and transition
      if (wallBreakActive) {
        if (wallBreakTimer > 0) {
          wallBreakTimer--;
        } else {
          wallBreakActive = false;
          stageTier = 2;
          initStageTier2(STAGE_LOOKUP[selectedStage] || STAGES.whiteHouse);
          playSFX('wallBreak');
          // Bonus 50 damage to the fighter who was knocked into the wall
          const victim = wallBreakVictim === 'cpu' ? cpu : player;
          victim.health = Math.max(0, victim.health - 50);
        }
      }

      // KO / round-end detection
      if (player.health <= 0) {
        koTriggered = true;
        koSplashTimer = 90;
        roundWinner = 'cpu';
        playSFX('ko');
        return null;
      }
      if (cpu.health <= 0) {
        koTriggered = true;
        koSplashTimer = 90;
        roundWinner = 'player';
        playSFX('ko');
        return null;
      }
      if (roundTimer <= 0) {
        // Time out: higher health percentage wins
        koTriggered = true;
        koSplashTimer = 90;
        roundWinner = (player.health / getFighterMaxHealth(player)) >= (cpu.health / getFighterMaxHealth(cpu)) ? 'player' : 'cpu';
        playSFX('ko');
        return null;
      }

      return null;
    },
    render(ctx) {
      const zoomProgress = wallBreakActive && wallBreakTimer > 0 ? (wallBreakTimer / 30) : 0;
      const zoomScale = 1 + zoomProgress * 0.5;
      const zoomX = wallBreakSide === 'right' ? GAME_W - 48 : 48;
      const zoomY = Math.floor(GAME_H * 0.52);

      if (zoomScale > 1.001) {
        ctx.save();
        ctx.translate(zoomX, zoomY);
        ctx.scale(zoomScale, zoomScale);
        ctx.translate(-zoomX, -zoomY);
      }

      renderCurrentStage(ctx);

      // Draw fighters
      if (player) renderFighter(ctx, player);
      if (cpu) renderFighter(ctx, cpu);

      // Round splash overlay
      if (roundSplashTimer > 0) {
        if (roundSplashPhase === 'round') {
          // Semi-transparent backdrop band
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(0, 85, 400, 50);
          // "ROUND N" text
          drawText(ctx, 'ROUND ' + currentRound, 200, 100, '#FFFFFF', 16, 'center');
        } else if (roundSplashPhase === 'fight') {
          // Semi-transparent backdrop band (narrower for FIGHT)
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(0, 95, 400, 30);
          // "FIGHT!" text in gold
          drawText(ctx, 'FIGHT!', 200, 108, '#FFCC00', 16, 'center');
        }
      }

      // KO splash overlay (during 90-frame countdown)
      if (koTriggered && koSplashTimer > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(0, 85, GAME_W, 50);
        // Flash K.O.! text between white and red every 5 frames
        const koColor = Math.floor((90 - koSplashTimer) / 5) % 2 === 0 ? '#FFFFFF' : '#CC0000';
        drawText(ctx, 'K.O.!', 200, 100, koColor, 16, 'center');
      }

      // Match over overlay (after KO splash, waiting for Enter)
      if (matchOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 80, GAME_W, 80);
        drawText(ctx, 'K.O.!', 200, 90, '#FFFFFF', 16, 'center');
        drawText(ctx, winner + ' WINS!', 200, 115, '#FFCC00', 8, 'center');

        const showPrompt = Math.floor(frameCounter / 30) % 2 === 0;
        if (showPrompt) {
          drawText(ctx, 'PRESS ENTER TO CONTINUE', 200, 135, '#FFFFFF', 8, 'center');
        }
      }

      // Ultimate animations
      if (player && cpu) {
        renderUltimate(ctx, player, cpu);
        renderUltimate(ctx, cpu, player);
        renderUltimateProjectiles(ctx);
        drawUltimateStunStars(ctx, player);
        drawUltimateStunStars(ctx, cpu);
      }

      // Wall break effect: flash + crack overlay
      if (wallBreakActive && wallBreakTimer > 0) {
        const flashAlpha = (wallBreakTimer / 30) * 0.8;
        ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha + ')';
        ctx.fillRect(0, 0, GAME_W, GAME_H);
        const crackX = wallBreakSide === 'right' ? GAME_W : 0;
        ctx.fillStyle = '#000000';
        for (let i = 0; i < 5; i++) {
          const angle = (Math.PI / 6) * i - Math.PI / 3;
          const len = 30 + i * 15;
          const ex = Math.floor(crackX + Math.cos(angle) * len * (wallBreakSide === 'right' ? -1 : 1));
          const ey = Math.floor(GAME_H / 2 + Math.sin(angle) * len);
          ctx.fillRect(Math.min(crackX, ex), Math.min(GAME_H / 2, ey), Math.abs(crackX - ex) + 2, 2);
        }
      }

      if (zoomScale > 1.001) {
        ctx.restore();
      }

      // HUD overlay stays at 1:1 scale during cinematic wall breaks
      if (player && cpu) {
        drawHUD(ctx, player, cpu, roundTimer, p1Wins, p2Wins);
        drawMatchContextPanel(ctx);
      }

      if (modifierSplashTimer > 0 && activeMatchModifier) {
        const alpha = Math.min(0.88, modifierSplashTimer / 105);
        ctx.fillStyle = 'rgba(6,10,18,' + (alpha * 0.72).toFixed(3) + ')';
        ctx.fillRect(56, 86, 288, 34);
        drawText(ctx, activeMatchModifier.name, 200, 92, activeMatchModifier.accent, 10, 'center');
        drawText(ctx, activeMatchModifier.desc, 200, 104, '#F5F1E8', 6, 'center');
      }
    }
  };

  // ===== VICTORY SCENE =====
  const victoryScene = {
    _frameCount: 0,
    _winner: null,
    _winnerDef: null,
    _loserDef: null,
    _playerWon: false,
    enter() {
      this._frameCount = 0;
      this._winner = winner || 'TRUMP';
      this._winnerDef = p1Wins >= 2 ? (selectedP1Def || TRUMP) : (selectedP2Def || BIDEN);
      this._loserDef = p1Wins >= 2 ? (selectedP2Def || BIDEN) : (selectedP1Def || TRUMP);
      this._playerWon = p1Wins >= 2;
      stopBGMusic();
    },
    update(input) {
      this._frameCount++;
      if (input.enterPressed && this._frameCount > 60) {
        playSFX('menuConfirm');
        if (selectedGameMode === 'executive-run' && this._playerWon) {
          if (advanceExecutiveRun()) {
            return 'fight';
          }
        }
        // Reset all match state before returning to title
        p1Wins = 0;
        p2Wins = 0;
        currentRound = 1;
        koTriggered = false;
        koSplashTimer = 0;
        roundWinner = null;
        matchOver = false;
        winner = null;
        if (selectedGameMode === 'executive-run') {
          clearExecutiveRun();
          selectedGameMode = 'exhibition';
          pendingGameMode = 'exhibition';
        }
        return 'title';
      }
      return null;
    },
    render(ctx) {
      renderVictoryBackdrop(ctx, this._frameCount);
      drawVictoryPodium(ctx, this._frameCount);
      const centerX = GAME_W / 2;

      // Actual game roster sprites anchored to podium slots.
      const winnerName = this._winnerDef ? this._winnerDef.name : 'Trump';
      const loserName = this._loserDef ? this._loserDef.name : 'Biden';
      const winFrameIdx = Math.floor(this._frameCount / 18) % 4;
      const loseFrameIdx = Math.floor(this._frameCount / 22) % 4;
      const winnerX = 210;
      const winnerBaseY = 156 + Math.floor(Math.sin(this._frameCount * 0.08) * 2);
      const winnerGlow = ctx.createRadialGradient(winnerX, winnerBaseY - 24, 8, winnerX, winnerBaseY - 24, 70);
      winnerGlow.addColorStop(0, 'rgba(255,245,190,0.18)');
      winnerGlow.addColorStop(0.55, 'rgba(255,240,160,0.06)');
      winnerGlow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = winnerGlow;
      ctx.fillRect(128, 76, 166, 122);

      const winnerStateCycle = ['idle', 'powerAttack', 'idle', 'fastAttack'];
      const winnerState = winnerStateCycle[Math.floor(this._frameCount / 24) % winnerStateCycle.length];
      const winnerFrameOffset = winnerState === 'idle' ? winFrameIdx : Math.floor(this._frameCount / 14);
      drawVictoryCharacterSprite(ctx, winnerName, winnerState, winnerFrameOffset, winnerX, winnerBaseY, 1.58, 1, 0);

      const runnerUpX = 126;
      const runnerUpBaseY = 174 + Math.floor(Math.sin(this._frameCount * 0.055 + 1.2));
      const runnerUpState = spriteCache[loserName] && spriteCache[loserName].block ? 'block' : 'idle';
      drawVictoryCharacterSprite(ctx, loserName, runnerUpState, loseFrameIdx, runnerUpX, runnerUpBaseY, 1.14, 1, 0.28);

      drawText(ctx, '1', winnerX, 152, '#FFF4B6', 8, 'center');
      drawText(ctx, '2', runnerUpX, 170, '#EAF3FF', 6, 'center');

      const victoryTitle = this._playerWon ? 'CHAMPION' : 'RUN STOPPED';
      const titleW = Math.max(measurePixelText(victoryTitle, 8) + 28, measurePixelText(this._winner, 12) + 32);
      const titleX = Math.floor(centerX - titleW / 2);
      ctx.fillStyle = 'rgba(8,18,52,0.72)';
      ctx.fillRect(titleX, 12, titleW, 34);
      ctx.strokeStyle = 'rgba(215,233,255,0.45)';
      ctx.lineWidth = 1;
      ctx.strokeRect(titleX + 0.5, 12.5, titleW - 1, 33);
      drawText(ctx, victoryTitle, centerX, 17, '#FFF4C9', 8, 'center');
      drawText(ctx, this._winner, centerX, 30, '#FFFFFF', 12, 'center');

      if (selectedGameMode === 'executive-run') {
        const nextName = executiveRunState.opponents[executiveRunState.currentMatch + 1] && executiveRunState.opponents[executiveRunState.currentMatch + 1].name.toUpperCase();
        const cleared = this._playerWon && executiveRunState.currentMatch >= executiveRunState.opponents.length - 1;
        const statusText = cleared
          ? 'GAUNTLET CLEARED'
          : (this._playerWon && nextName ? 'NEXT OPPONENT ' + nextName : 'RETURN TO TITLE TO REDEPLOY');
        const statusBoxW = Math.max(
          measurePixelText('RUN SCORE ' + executiveRunState.score, 8) + 28,
          measurePixelText('BEST COMBO ' + executiveRunState.bestCombo, 6) + 28,
          measurePixelText(statusText, cleared ? 8 : 6) + 28
        );
        const statusBoxX = Math.floor(centerX - statusBoxW / 2);
        ctx.fillStyle = 'rgba(7,19,54,0.68)';
        ctx.fillRect(statusBoxX, 184, statusBoxW, 34);
        drawText(ctx, 'RUN SCORE ' + executiveRunState.score, centerX, 190, '#FFF3C4', 8, 'center');
        drawText(ctx, 'BEST COMBO ' + executiveRunState.bestCombo, centerX, 200, '#DDE7FF', 6, 'center');
        if (cleared) {
          drawText(ctx, statusText, centerX, 210, '#FFCC00', 8, 'center');
        } else if (this._playerWon && nextName) {
          drawText(ctx, statusText, centerX, 210, '#FFCC00', 6, 'center');
        } else if (!this._playerWon) {
          drawText(ctx, statusText, centerX, 210, '#FFCC00', 6, 'center');
        }
      }

      // Blinking prompt after 60 frames
      const showPrompt = Math.floor(this._frameCount / 30) % 2 === 0;
      if (showPrompt && this._frameCount > 60) {
        const promptText = selectedGameMode === 'executive-run' && this._playerWon && executiveRunState.currentMatch < executiveRunState.opponents.length - 1
          ? 'PRESS ENTER FOR NEXT MATCH'
          : 'PRESS ENTER TO PLAY AGAIN';
        const promptRect = getCenteredTextRect(promptText, centerX, 212, 6, 12, 4);
        ctx.fillStyle = 'rgba(7,19,54,0.72)';
        ctx.fillRect(promptRect.x, promptRect.y, promptRect.w, promptRect.h);
        drawTextInRect(ctx, promptText, promptRect.x, promptRect.y, promptRect.w, promptRect.h, '#FFFFFF', 6, '#07101B', 1);
      }
    }
  };

  function resetPausedFightState() {
    stopBGMusic();
    pendingGameMode = selectedGameMode;
    p1Wins = 0;
    p2Wins = 0;
    currentRound = 1;
    koTriggered = false;
    koSplashTimer = 0;
    roundWinner = null;
    matchOver = false;
    winner = null;
    wallBreakActive = false;
    wallBreakTimer = 0;
    wallBreakSide = null;
    wallBreakVictim = null;
  }

  // ===== PAUSE MENU SCENE =====
  const pauseMenuScene = {
    _fromScene: 'fight',
    _menuItem: 0,
    _frameCount: 0,
    _inputCooldown: 0,
    getItems() {
      const items = [
        { key: 'controls', label: 'CONTROLS', kind: 'panel' },
        { key: 'combos', label: 'COMBOS', kind: 'panel' },
        { key: 'volume', label: 'VOLUME', kind: 'volume' },
        { key: 'resume', label: 'RESUME MATCH', kind: 'action', target: this._fromScene },
        { key: 'charSelect', label: 'CHARACTER SELECT', kind: 'action', target: 'charSelect' }
      ];
      if (selectedGameMode !== 'executive-run') {
        items.push({ key: 'stageSelect', label: 'STAGE SELECT', kind: 'action', target: 'stageSelect' });
      }
      return items;
    },
    enter(fromScene) {
      this._fromScene = fromScene || 'fight';
      this._menuItem = 0;
      this._frameCount = 0;
      this._inputCooldown = 8;
    },
    update(input) {
      this._frameCount++;
      const items = this.getItems();
      const activeItem = items[this._menuItem];
      if (this._inputCooldown > 0) this._inputCooldown--;

      if (input.escapePressed) {
        playSFX('menuBack');
        return this._fromScene;
      }

      if (this._inputCooldown === 0) {
        if (input.up) {
          this._menuItem = wrapIndex(this._menuItem - 1, items.length);
          this._inputCooldown = 9;
          playSFX('menuMove');
          return null;
        }
        if (input.down) {
          this._menuItem = wrapIndex(this._menuItem + 1, items.length);
          this._inputCooldown = 9;
          playSFX('menuMove');
          return null;
        }
        if (activeItem.kind === 'volume' && (input.left || input.right)) {
          setMasterVolume(masterVolume + (input.right ? 0.05 : -0.05));
          this._inputCooldown = 6;
          playSFX('menuMove');
          return null;
        }
      }

      if (!input.enterPressed) return null;
      playSFX('menuConfirm');
      if (activeItem.key === 'resume') return this._fromScene;
      if (activeItem.key === 'charSelect' || activeItem.key === 'stageSelect') {
        resetPausedFightState();
        return activeItem.target;
      }
      return null;
    },
    render(ctx) {
      const items = this.getItems();
      const activeItem = items[this._menuItem];
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(0, 0, GAME_W, GAME_H);

      const px = 28, py = 16, pw = 344, ph = 208;
      const navX = px + 12;
      const navY = py + 30;
      const navW = Math.max(120, items.reduce(function(maxW, item) {
        return Math.max(maxW, measurePixelText(item.label, 6) + 18);
      }, 0));
      const contentX = navX + navW + 14;
      const contentY = navY;
      const contentW = pw - (contentX - px) - 12;
      const contentH = 142;
      const panelGradient = ctx.createLinearGradient(px, py, px, py + ph);
      panelGradient.addColorStop(0, '#101737');
      panelGradient.addColorStop(1, '#060913');
      ctx.fillStyle = panelGradient;
      ctx.fillRect(px, py, pw, ph);
      ctx.strokeStyle = '#FFCC00';
      ctx.lineWidth = 2;
      ctx.strokeRect(px, py, pw, ph);

      const pausedRect = getCenteredTextRect('PAUSED', GAME_W / 2, py + 6, 14, 18, 4, 116);
      ctx.fillStyle = 'rgba(255,204,0,0.08)';
      ctx.fillRect(pausedRect.x, pausedRect.y, pausedRect.w, pausedRect.h);
      drawText(ctx, 'PAUSED', GAME_W / 2, py + 10, '#FFCC00', 14, 'center');

      ctx.fillStyle = 'rgba(7,12,26,0.88)';
      ctx.fillRect(navX - 4, navY - 4, navW + 8, contentH + 8);
      ctx.fillRect(contentX - 4, contentY - 4, contentW + 8, contentH + 8);
      ctx.strokeStyle = '#26304A';
      ctx.strokeRect(navX - 4, navY - 4, navW + 8, contentH + 8);
      ctx.strokeRect(contentX - 4, contentY - 4, contentW + 8, contentH + 8);

      let itemY = navY + 4;
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const active = i === this._menuItem;
        ctx.fillStyle = active ? '#FFCC00' : (item.kind === 'action' ? '#1E2942' : '#142038');
        ctx.fillRect(navX, itemY, navW, 18);
        if (!active) {
          ctx.fillStyle = item.kind === 'action' ? 'rgba(255,255,255,0.05)' : 'rgba(255,204,0,0.04)';
          ctx.fillRect(navX + 1, itemY + 1, navW - 2, 16);
        }
        drawTextInRect(ctx, item.label, navX + 2, itemY + 3, navW - 4, 12, active ? '#000000' : '#E7EDF7', 6, active ? '#FFF0A8' : '#07101B', active ? 0 : 1);
        itemY += 22;
      }

      if (activeItem.key === 'controls') {
        const rows = [
          ['MOVE', 'A/D OR LEFT/RIGHT'],
          ['JUMP', 'W OR UP'],
          ['CROUCH', 'S OR DOWN'],
          ['FAST', 'TAP J OR Z'],
          ['POWER', 'HOLD J OR Z'],
          ['BLOCK', 'K OR X'],
          ['ULTIMATE', 'L OR C AT FULL BAR'],
          ['PAUSE', 'ESC'],
          ['CONFIRM', 'ENTER']
        ];
        drawText(ctx, 'CONTROL MAP', contentX + contentW / 2, contentY + 6, '#FFCC00', 8, 'center');
        let rowY = contentY + 22;
        for (const row of rows) {
          ctx.fillStyle = 'rgba(255,255,255,0.04)';
          ctx.fillRect(contentX + 6, rowY - 2, contentW - 12, 10);
          drawText(ctx, row[0], contentX + 16, rowY, '#BFC7D8', 6, 'left');
          drawText(ctx, row[1], contentX + contentW - 14, rowY, '#FFFFFF', 6, 'right');
          rowY += 12;
        }
      } else if (activeItem.key === 'combos') {
        const rows = [
          ['FAST CHAIN', 'TAP ON RECOVERY'],
          ['POWER CANCEL', 'HOLD FOR KICK'],
          ['LAUNCHER', 'KICK POPS THEM UP'],
          ['JUGGLE', 'CHAIN FAST ATTACKS'],
          ['GUARD BREAK', 'BURN BLOCK STUN'],
          ['ULTIMATE', 'L OR C AT FULL BAR'],
          ['WALL BREAK', 'POWER HIT EDGE']

  // ===== STAGE INIT =====
  let currentStage = null;

  function ensureStageCanvas(stageDef) {
    const width = stageDef.worldWidth || DEFAULT_STAGE_WORLD_W;
    if (!stageDef.bgCanvas || stageDef.bgCanvas.width !== width || stageDef.bgCanvas.height !== GAME_H) {
      const oc = document.createElement('canvas');
      oc.width = width;
      oc.height = GAME_H;
      const octx = oc.getContext('2d');
      octx.imageSmoothingEnabled = false;
      stageDef.bgCanvas = oc;
    }
    return stageDef.bgCanvas;
  }

  function initStage(stageDef) {
    stageDef.worldWidth = stageDef.worldWidth || DEFAULT_STAGE_WORLD_W;
    stageDef.bounds = { left: ARENA_EDGE_BUFFER, right: stageDef.worldWidth - ARENA_EDGE_BUFFER };
    currentStage = stageDef;
    if (stageDef.renderBackground) {
      ensureStageCanvas(stageDef);
      initWhiteHouseStageFx();
    } else {
      const oc = ensureStageCanvas(stageDef);
      const octx = oc.getContext('2d');
      octx.imageSmoothingEnabled = false;
      stageDef.draw(octx);
    }
  }

  function initStageTier2(stageDef) {
    if (!stageDef || !stageDef.drawTier2) return;
    stageDef.worldWidth = stageDef.worldWidth || DEFAULT_STAGE_WORLD_W;
    stageDef.bounds = { left: ARENA_EDGE_BUFFER, right: stageDef.worldWidth - ARENA_EDGE_BUFFER };
    currentStage = stageDef;
    if (stageDef.renderBackground) {
      ensureStageCanvas(stageDef);
      return;
    }
    const oc = ensureStageCanvas(stageDef);
    const octx = oc.getContext('2d');
    octx.imageSmoothingEnabled = false;
    stageDef.drawTier2(octx);
    stageDef.tier2Canvas = oc;
    // Swap bgCanvas to tier2 so the stage renders the new background
    stageDef.bgCanvas = oc;
  }

  function renderCurrentStage(ctx) {
    if (!currentStage) return;
    const bg = ensureStageCanvas(currentStage);
    const bgctx = bg.getContext('2d');
    bgctx.imageSmoothingEnabled = false;
    if (currentStage.renderBackground) currentStage.renderBackground(bgctx);
    const sx = clamp(Math.floor(cameraX), 0, Math.max(0, bg.width - GAME_W));
    ctx.drawImage(bg, sx, 0, GAME_W, GAME_H, 0, 0, GAME_W, GAME_H);
    drawStageGroundEdge(ctx, currentStage);
  }
