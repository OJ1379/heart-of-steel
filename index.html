    if (name === 'Biden') return '#2244CC';
    if (name === 'Obama') return '#203A78';
    if (name === 'Bush') return '#8B5A32';
    if (name === 'Clinton') return '#2B5ECC';
    return '#A8AFBF';
  }

  function drawCharacterPortraitSprite(ctx, name) {
    if (name === 'Trump') drawTrumpBase(ctx, -1, 0, 4, 1);
    else if (name === 'Biden') drawBidenBase(ctx, -1, 0, 4, 1);
    else if (name === 'Obama') drawObamaBase(ctx, -1, 0, 4, 1);
    else if (name === 'Bush') drawBushBase(ctx, -1, 0, 0, 1);
    else if (name === 'Clinton') drawClintonBase(ctx, -1, 0, 8, 1);
  }

  function initPortraitCache(fighterDefs) {
    for (const def of fighterDefs) {
      if (portraitCache[def.name]) continue;
      const oc = document.createElement('canvas');
      oc.width = 56;
      oc.height = 64;
      const ctx = oc.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      const accent = getPortraitAccentColor(def.name);
      const glow = ctx.createLinearGradient(4, 10, 52, 50);
      glow.addColorStop(0, accent);
      glow.addColorStop(0.55, '#142746');
      glow.addColorStop(1, '#070B12');

      ctx.fillStyle = '#B8C1D0';
      ctx.fillRect(0, 0, 56, 64);
      ctx.fillStyle = '#05070B';
      ctx.fillRect(2, 2, 52, 60);
      ctx.fillStyle = accent;
      ctx.fillRect(2, 2, 52, 6);
      ctx.fillStyle = '#09111B';
      ctx.fillRect(4, 10, 48, 40);
      ctx.fillStyle = glow;
      ctx.fillRect(5, 11, 46, 38);
      ctx.fillStyle = '#101C31';
      ctx.fillRect(4, 50, 48, 12);
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      ctx.fillRect(4, 10, 48, 3);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(8, 14, 40, 1);

      for (let i = 0; i < 14; i++) {
        const px = 7 + ((i * 9 + def.name.length * 3) % 40);
        const py = 12 + ((i * 7 + def.name.length) % 20);
        ctx.fillStyle = i % 3 === 0 ? '#FFE6A0' : '#B6D8FF';
        ctx.fillRect(px, py, 1, 1);
      }

      ctx.fillStyle = '#1E355D';
      ctx.fillRect(6, 16, 10, 2);
      ctx.fillRect(38, 18, 8, 2);
      ctx.fillRect(10, 28, 8, 1);
      ctx.fillStyle = '#587DB8';
      ctx.fillRect(7, 17, 8, 1);
      ctx.fillRect(39, 19, 6, 1);

      ctx.save();
      ctx.beginPath();
      ctx.rect(5, 11, 46, 38);
      ctx.clip();
      ctx.translate(def.name === 'Clinton' ? 29 : 28, def.name === 'Bush' ? 40 : 41);
      ctx.scale(def.name === 'Obama' ? 1.52 : 1.48, def.name === 'Obama' ? 1.52 : 1.48);
      ctx.translate(-32, -18);
      drawCharacterPortraitSprite(ctx, def.name);
      ctx.restore();

      ctx.fillStyle = '#09111E';
      ctx.fillRect(4, 50, 48, 12);
      ctx.fillStyle = accent;
      ctx.fillRect(5, 51, 46, 1);
      ctx.fillStyle = '#03070F';
      ctx.fillRect(5, 60, 46, 1);

      portraitCache[def.name] = oc;
    }
  }

  // ===== FIGHTER RUNTIME FACTORY =====
  function createFighter(def, x, facing) {
    return {
      def: def,
      x: x,
      y: GROUND_Y,
      vx: 0,
      vy: 0,
      facing: facing,
      state: 'idle',
      prevState: 'idle',
      stateFrame: 0,
      currentFrame: 0,
      attackPhase: null,
      currentAttackType: null,
      comboCount: 0,
      health: def.stats.health,
      maxHealth: def.stats.health,
      isBlocking: false,
      hitThisAttack: false,
      hitstunRemaining: 0,
      knockedDown: false,
      flashFrames: 0,
      _chargeFrames: 0,     // per-fighter charge tracking
      _prevAttack: false,
      guardMeter: 100,        // 0-100
      guardBreakStun: 0,      // frames remaining frozen in guard break
      ultimateMeter: 0,       // 0-100
      ultimateActive: false,  // true while ultimate animation is playing
      ultimateFrame: 0,       // current frame of ultimate animation
      ultimateResolved: false,
      ultimateProjectileSpawned: false,
      ultimateCalloutShown: false,
      ultimateStunFx: 0,
      airHits: 0,
      juggleGravityMul: 1.0,
      isAirborne: false,
      rotation: 0,
      rotationVel: 0,
      impactTilt: 0,
      impactOffsetX: 0,
      impactOffsetY: 0,
      impactScaleX: 1,
      impactScaleY: 1,
      ragdoll: false,
      bounceCount: 0,
      guardMax: 100,
      guardRegenMul: 1,
      ultimateGainMul: 1,
      openingUltimateMeter: 0,
      speedMul: 1,
      accelMul: 1,
      jumpMul: 1,
      gravityMul: 1,
      powerMul: 1,
      reachMul: 1,
      knockbackMul: 1,
      launchMul: 1,
      comboHitsLanded: 0,
      animOffsetX: 0,
      animOffsetY: 0,
      animScaleX: 1,
      animScaleY: 1,
      animRotation: 0
    };
  }

  // ===== FIGHTER STATE MACHINE =====
  function transitionFighterState(fighter, newState, forceRestart) {
    if (fighter.state === newState && !forceRestart) return;
    const oldState = fighter.state;
    if (FIGHTER_STATES[oldState] && FIGHTER_STATES[oldState].exit) {
      FIGHTER_STATES[oldState].exit(fighter);
    }
    fighter.prevState = oldState;
    fighter.state = newState;
    fighter.stateFrame = 0;
    if (FIGHTER_STATES[newState] && FIGHTER_STATES[newState].enter) {
      FIGHTER_STATES[newState].enter(fighter);
    }
  }

  function getStateElapsedSeconds(fighter) {
    return fighter.stateFrame * TICK_RATE;
  }

  function setLoopingAnimationFrame(fighter, frameCount, framesPerStep) {
    const secondsPerStep = Math.max(TICK_RATE, framesPerStep * TICK_RATE);
    fighter.currentFrame = Math.floor(getStateElapsedSeconds(fighter) / secondsPerStep) % frameCount;
  }

  function setClampedAnimationFrame(fighter, maxFrame, framesPerStep) {
    const secondsPerStep = Math.max(TICK_RATE, framesPerStep * TICK_RATE);
    fighter.currentFrame = Math.min(maxFrame, Math.floor(getStateElapsedSeconds(fighter) / secondsPerStep));
  }

  function setSegmentAnimationFrame(fighter, startFrame, frameCount, elapsedFrames, durationFrames) {
    const segmentElapsed = Math.max(0, elapsedFrames) * TICK_RATE;
    const segmentDuration = Math.max(TICK_RATE, durationFrames * TICK_RATE);
    fighter.currentFrame = startFrame + Math.min(
      frameCount - 1,
      Math.floor((segmentElapsed / segmentDuration) * frameCount)
    );
  }

  function getUltimateFrameIndex(fighter, frameCount) {
    const frame = fighter && fighter.ultimateFrame != null ? fighter.ultimateFrame : 0;
    if (frame < 10) return 0;
    if (frame < 18) return Math.min(frameCount - 1, 1);
    if (frame < 28) return Math.min(frameCount - 1, 2);
    if (frame < 40) return Math.min(frameCount - 1, 3);
    if (frame < 52) return Math.min(frameCount - 1, 4);
    if (frame < 66) return Math.min(frameCount - 1, 5);
    if (frame < 78) return Math.min(frameCount - 1, 6);
    return Math.min(frameCount - 1, 7);
  }

  const FIGHTER_STATES = {
    idle: {
      enter(fighter) {
        fighter.currentFrame = 0;
        fighter.attackPhase = null;
        fighter.currentAttackType = null;
        fighter.isBlocking = false;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Decelerate with ground friction
        const friction = fighter.def.stats.friction || 0.80;
        fighter.vx *= friction;
        fighter.x = clampToArena(fighter.x + fighter.vx);
        setLoopingAnimationFrame(fighter, 4, 15);
        if (input.up) return 'jumpRise';
        if (input.down) return 'crouch';
        if (input.right) {
          return fighter.facing === 1 ? 'walkForward' : 'walkBack';
        }
        if (input.left) {
          return fighter.facing === -1 ? 'walkForward' : 'walkBack';
        }
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        if (input.block) return 'block';
        return null;
      },
      exit(fighter) {}
    },

    walkForward: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        const spd = getFighterStat(fighter, 'walkSpeed');
        const accel = getFighterStat(fighter, 'accel') || 0.8;
        // Accelerate toward max walk speed in facing direction
        fighter.vx += accel * fighter.facing;
        if (fighter.facing === 1) fighter.vx = Math.min(fighter.vx, spd);
        else fighter.vx = Math.max(fighter.vx, -spd);
        fighter.x = clampToArena(fighter.x + fighter.vx);
        setLoopingAnimationFrame(fighter, 4, 8);
        const movingForward = (fighter.facing === 1 && input.right) ||
                              (fighter.facing === -1 && input.left);
        if (!movingForward) return 'idle';
        if (input.up) return 'jumpRise';
        if (input.down) return 'crouch';
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        if (input.block) return 'block';
        return null;
      },
      exit(fighter) {}
    },

    walkBack: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        const spd = getFighterStat(fighter, 'walkSpeed');
        const accel = getFighterStat(fighter, 'accel') || 0.8;
        // Accelerate toward max walk speed in opposite of facing direction
        fighter.vx -= accel * fighter.facing;
        if (fighter.facing === 1) fighter.vx = Math.max(fighter.vx, -spd);
        else fighter.vx = Math.min(fighter.vx, spd);
        fighter.x = clampToArena(fighter.x + fighter.vx);
        setLoopingAnimationFrame(fighter, 4, 8);
        const movingBack = (fighter.facing === 1 && input.left) ||
                           (fighter.facing === -1 && input.right);
        if (!movingBack) return 'idle';
        if (input.up) return 'jumpRise';
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        if (input.block) return 'block';
        return null;
      },
      exit(fighter) {}
    },

    jumpRise: {
      enter(fighter) {
        fighter.vy = getFighterStat(fighter, 'jumpForce');
        fighter.currentFrame = 0;
        // vx carries from ground â€” no reset
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        fighter.vy += getFighterStat(fighter, 'gravity') * (fighter.juggleGravityMul || 1.0);
        fighter.y += fighter.vy;
        // Air steering: 40% of ground accel, very low drag
        const spd = getFighterStat(fighter, 'walkSpeed');
        const airAccel = (getFighterStat(fighter, 'accel') || 0.8) * 0.4;
        if (input.right) fighter.vx = Math.min(fighter.vx + airAccel, spd);
        else if (input.left) fighter.vx = Math.max(fighter.vx - airAccel, -spd);
        else fighter.vx *= 0.99;
        fighter.x = clampToArena(fighter.x + fighter.vx);
        setClampedAnimationFrame(fighter, 3, 4);
        if (fighter.vy >= 0) return 'jumpFall';
        return null;
      },
      exit(fighter) {}
    },

    jumpFall: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        fighter.vy += getFighterStat(fighter, 'gravity') * (fighter.juggleGravityMul || 1.0);
        fighter.y += fighter.vy;
        // Air steering
        const spd = getFighterStat(fighter, 'walkSpeed');
        const airAccel = (getFighterStat(fighter, 'accel') || 0.8) * 0.4;
        if (input.right) fighter.vx = Math.min(fighter.vx + airAccel, spd);
        else if (input.left) fighter.vx = Math.max(fighter.vx - airAccel, -spd);
        else fighter.vx *= 0.99;
        fighter.x = clampToArena(fighter.x + fighter.vx);
        setClampedAnimationFrame(fighter, 3, 4);
        if (fighter.y >= GROUND_Y) {
          fighter.y = GROUND_Y;
          fighter.vy = 0;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {}
    },

    crouch: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Animate to frame 3 and hold
        setClampedAnimationFrame(fighter, 3, 3);
        if (!input.down) return 'idle';
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        return null;
      },
      exit(fighter) {}
    },

    fastAttack: {
      enter(fighter) {
        fighter.attackPhase = 'startup';
        fighter.currentAttackType = 'fast';
        fighter.hitThisAttack = false;
        fighter.comboCount = (fighter.comboCount || 0) + 1;
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        const fd = fighter.def.attacks.fast;
        const total = fd.startup + fd.active + fd.recovery;

        if (fighter.stateFrame <= fd.startup) {
          fighter.attackPhase = 'startup';
          fighter.x = clampToArena(fighter.x - fighter.facing * 0.5);
          setSegmentAnimationFrame(fighter, 0, 2, fighter.stateFrame - 1, fd.startup);
        } else if (fighter.stateFrame <= fd.startup + fd.active) {
          fighter.attackPhase = 'active';
          const activeFrame = fighter.stateFrame - fd.startup - 1;
          fighter.x = clampToArena(fighter.x + fighter.facing * 1.55);
          setSegmentAnimationFrame(fighter, 2, 2, activeFrame, fd.active);
        } else if (fighter.stateFrame <= total) {
          fighter.attackPhase = 'recovery';
          const recoveryFrame = fighter.stateFrame - fd.startup - fd.active - 1;
          setSegmentAnimationFrame(fighter, 4, 2, recoveryFrame, fd.recovery);
          const chargeRelease = updateFighterCharge(fighter, input);
          if (chargeRelease === 'power') {
            fighter.comboCount = 0;
            return 'powerAttack';
          }
          // Check for combo chain during late recovery
          if (fighter.stateFrame >= fd.startup + fd.active + Math.ceil(fd.recovery * 0.35) &&
              input.attackBuffered && fighter.comboCount < fd.maxChain) {
            return 'fastAttack';
          }
        } else {
          fighter.attackPhase = null;
          fighter.comboCount = 0;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.attackPhase = null;
        fighter.hitThisAttack = false;
      }
    },

    powerAttack: {
      enter(fighter) {
        fighter.attackPhase = 'startup';
        fighter.currentAttackType = 'power';
        fighter.hitThisAttack = false;
        fighter.comboCount = 0;
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        const fd = fighter.def.attacks.power;
        const total = fd.startup + fd.active + fd.recovery;

        if (fighter.stateFrame <= fd.startup) {
          fighter.attackPhase = 'startup';
          fighter.x = clampToArena(fighter.x - fighter.facing * 0.7);
          setSegmentAnimationFrame(fighter, 0, 3, fighter.stateFrame - 1, fd.startup);
        } else if (fighter.stateFrame <= fd.startup + fd.active) {
          fighter.attackPhase = 'active';
          const activeFrame = fighter.stateFrame - fd.startup - 1;
          fighter.x = clampToArena(fighter.x + fighter.facing * 2.35);
          setSegmentAnimationFrame(fighter, 3, 2, activeFrame, fd.active);
        } else if (fighter.stateFrame <= total) {
          fighter.attackPhase = 'recovery';
          fighter.currentFrame = 5;
        } else {
          fighter.attackPhase = null;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.attackPhase = null;
        fighter.hitThisAttack = false;
      }
    },

    block: {
      enter(fighter) {
        fighter.isBlocking = true;
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Animate to frame 3 and hold
        setClampedAnimationFrame(fighter, 3, 2);
        if (!input.block) {
          fighter.isBlocking = false;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.isBlocking = false;
      }
    },

    hitstun: {
      enter(fighter) {
        fighter.currentFrame = 0;
        fighter.comboCount = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        setClampedAnimationFrame(fighter, 3, 3);
        // Slide: apply vx with friction so knockback feels physical
        fighter.vx *= 0.85;
        fighter.x = clampToArena(fighter.x + fighter.vx);
        fighter.rotation += (clamp(fighter.vx * 0.028, -0.18, 0.18) - fighter.rotation) * 0.34;
        if (fighter.hitstunRemaining > 0) {
          fighter.hitstunRemaining--;
          return null;
        }
        return 'idle';
      },
      exit(fighter) {
        fighter.hitstunRemaining = 0;
        fighter.rotation *= 0.35;
      }
    },

    knockdown: {
      enter(fighter) {
        fighter.currentFrame = 0;
        fighter.knockedDown = true;
        fighter.comboCount = 0;
        fighter.ragdoll = true;
        fighter.bounceCount = 0;
        // rotationVel set by resolveHit based on hit direction
        if (fighter.rotationVel === 0) fighter.rotationVel = (Math.random() > 0.5 ? 1 : -1) * 0.12;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;

        if (fighter.ragdoll) {
          // Full ragdoll: gravity + horizontal momentum + spin
          fighter.vy += getFighterStat(fighter, 'gravity') * 1.3;
          fighter.y += fighter.vy;
          fighter.x = clampToArena(fighter.x + fighter.vx);
          fighter.rotation += fighter.rotationVel;

          // Wall bounce
          if (fighter.x <= getArenaLeft() + 2 || fighter.x >= getArenaRight() - 2) {
            fighter.vx *= -0.45;
            fighter.rotationVel *= -0.7;
            fighter.x = clamp(fighter.x, getArenaLeft() + 2, getArenaRight() - 2);
          }

          // Ground bounce / landing
          if (fighter.y >= GROUND_Y) {
            fighter.y = GROUND_Y;
            fighter.bounceCount++;
            const bounceStrength = Math.abs(fighter.vy);
            if (bounceStrength > 2.5 && fighter.bounceCount < 3) {
              // Bounce: reduce energy
              fighter.vy *= -0.38;
              fighter.vx *= 0.65;
              fighter.rotationVel *= 0.55;
              playSFX('punch');
            } else {
              // Stop bouncing â€” slide to rest
              fighter.vy = 0;
              fighter.ragdoll = false;
            }
          }
        } else {
          // Grounded slide after ragdoll: decelerate with friction
          fighter.vx *= 0.80;
          fighter.x = clampToArena(fighter.x + fighter.vx);
          fighter.rotationVel *= 0.88;
          fighter.rotation += fighter.rotationVel;
        }

        // Hold last anim frame while down
        setClampedAnimationFrame(fighter, 3, 10);

        // Get up after enough time, only when stopped and alive
        const canGetUp = fighter.stateFrame >= 80 && !fighter.ragdoll && Math.abs(fighter.vx) < 0.3;
        if (canGetUp && fighter.health > 0) {
          fighter.knockedDown = false;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.knockedDown = false;
        fighter.ragdoll = false;
        fighter.rotation = 0;
        fighter.rotationVel = 0;
        fighter.vx = 0;
        fighter.bounceCount = 0;
      }
    }
  };

  // Per-fighter charge detection (each fighter has independent charge tracking)
  function updateFighterCharge(fighter, input) {
    const attackNow = input.attack;
    const wasAttack = fighter._prevAttack;
    fighter._prevAttack = attackNow;

    if (attackNow) {
      fighter._chargeFrames++;
      return null;
    } else {
      if (wasAttack) {
        // Key released
        const frames = fighter._chargeFrames;
        fighter._chargeFrames = 0;
        if (frames >= CHARGE_THRESHOLD) return 'power';
        if (frames > 0) return 'fast';
      } else {
        fighter._chargeFrames = 0;
      }
      return null;
    }
  }

  function updateFighterPresentation(fighter) {
    let targetX = 0;
    let targetY = 0;
    let targetScaleX = 1;
    let targetScaleY = 1;
    let targetRotation = 0;
    const stride = Math.sin(fighter.stateFrame * 0.75 + fighter.x * 0.03);
    const walkSpeed = Math.max(0.01, getFighterStat(fighter, 'walkSpeed'));
    const walkRatio = clamp(Math.abs(fighter.vx) / walkSpeed, 0, 1);

    if (fighter.ultimateActive) {
      const motion = getFighterMotionProfile(fighter);
      if (fighter.ultimateFrame < 18) {
        targetX = -fighter.facing * (motion.startupX + 1.2);
        targetY = motion.startupY + 1;
        targetScaleX = 0.9;
        targetScaleY = 1.12;
        targetRotation = -fighter.facing * (motion.startupRot + 0.02);
      } else if (fighter.ultimateFrame < 40) {
        targetX = fighter.facing * (motion.activeX + 1.8);
        targetY = motion.activeY - 1.4;
        targetScaleX = 1.14;
        targetScaleY = 0.86;
        targetRotation = fighter.facing * (motion.activeRot + 0.04);
      } else if (fighter.ultimateFrame < 58) {
        targetX = fighter.facing * (motion.activeX + 0.8);
        targetY = motion.activeY - 0.7;
        targetScaleX = 1.08;
        targetScaleY = 0.92;
        targetRotation = fighter.facing * (motion.activeRot + 0.02);
      } else {
        targetX = fighter.facing * motion.recoveryX;
        targetScaleX = motion.recoveryScaleX;
        targetScaleY = motion.recoveryScaleY;
      }
    } else if (fighter.state === 'idle') {
      targetY = Math.sin(frameCounter * 0.12 + fighter.x * 0.02) * 0.4;
    } else if (fighter.state === 'walkForward' || fighter.state === 'walkBack') {
      targetY = -Math.abs(stride) * (0.7 + walkRatio * 0.55);
      targetX = stride * fighter.facing * 0.75 * walkRatio;
    } else if (fighter.state === 'jumpRise') {
      targetY = -1.5;
    } else if (fighter.state === 'jumpFall') {
      targetY = 0.75;
    } else if (fighter.state === 'crouch') {
      targetY = 1;
      targetScaleY = 0.97;
    } else if (fighter.state === 'fastAttack') {
      const atk = fighter.def.attacks.fast;
      const startupEnd = atk.startup;
      const activeEnd = atk.startup + atk.active;
      if (fighter.stateFrame <= startupEnd) {
        targetX = -fighter.facing * 1.5;
        targetScaleX = 0.98;
        targetScaleY = 1.02;
      } else if (fighter.stateFrame <= activeEnd) {
        targetX = fighter.facing * 3;
        targetY = -0.5;
        targetScaleX = 1.05;
        targetScaleY = 0.95;
      } else {
        targetX = fighter.facing * 1;
        targetScaleX = 1.01;
        targetScaleY = 0.99;
      }
    } else if (fighter.state === 'powerAttack') {
      const motion = getFighterMotionProfile(fighter);
      const atk = fighter.def.attacks.power;
      const startupEnd = atk.startup;
      const activeEnd = atk.startup + atk.active;
      if (fighter.stateFrame <= startupEnd) {
        targetX = -fighter.facing * motion.startupX;
        targetY = motion.startupY;
        targetScaleX = motion.startupScaleX;
        targetScaleY = motion.startupScaleY;
        targetRotation = -fighter.facing * motion.startupRot;
      } else if (fighter.stateFrame <= activeEnd) {
        targetX = fighter.facing * motion.activeX;
        targetY = motion.activeY;
        targetScaleX = motion.activeScaleX;
        targetScaleY = motion.activeScaleY;
        targetRotation = fighter.facing * motion.activeRot;
      } else {
        targetX = fighter.facing * motion.recoveryX;
        targetScaleX = motion.recoveryScaleX;
        targetScaleY = motion.recoveryScaleY;
      }
    } else if (fighter.state === 'block') {
      targetX = -fighter.facing * 1.2;
      targetScaleY = 0.99;
    } else if (fighter.state === 'hitstun') {
      targetX = -fighter.facing * 0.8;
      targetScaleY = 0.99;
    }

    fighter.animOffsetX += (targetX - fighter.animOffsetX) * 0.4;
    fighter.animOffsetY += (targetY - fighter.animOffsetY) * 0.4;
    fighter.animScaleX += (targetScaleX - fighter.animScaleX) * 0.34;
    fighter.animScaleY += (targetScaleY - fighter.animScaleY) * 0.34;
    fighter.animRotation += (targetRotation - fighter.animRotation) * 0.3;
    if (Math.abs(fighter.animOffsetX) < 0.05) fighter.animOffsetX = 0;
    if (Math.abs(fighter.animOffsetY) < 0.05) fighter.animOffsetY = 0;
    if (Math.abs(fighter.animRotation) < 0.002) fighter.animRotation = 0;
    if (Math.abs(fighter.animScaleX - 1) < 0.003) fighter.animScaleX = 1;
    if (Math.abs(fighter.animScaleY - 1) < 0.003) fighter.animScaleY = 1;
  }

  // ===== FIGHTER UPDATE =====
  function updateFighter(fighter, input, opponent) {
    if (!fighter.ragdoll) {
      fighter.impactTilt *= 0.7;
      fighter.impactOffsetX *= 0.62;
      fighter.impactOffsetY *= 0.68;
      fighter.impactScaleX += (1 - fighter.impactScaleX) * 0.24;
      fighter.impactScaleY += (1 - fighter.impactScaleY) * 0.24;
      if (Math.abs(fighter.impactTilt) < 0.003) fighter.impactTilt = 0;
      if (Math.abs(fighter.impactOffsetX) < 0.08) fighter.impactOffsetX = 0;
      if (Math.abs(fighter.impactOffsetY) < 0.08) fighter.impactOffsetY = 0;
      if (Math.abs(fighter.impactScaleX - 1) < 0.01) fighter.impactScaleX = 1;
      if (Math.abs(fighter.impactScaleY - 1) < 0.01) fighter.impactScaleY = 1;
    }
    if (fighter.state !== 'knockdown') {
      fighter.rotationVel *= 0.72;
      fighter.rotation += fighter.rotationVel;
      if (fighter.state !== 'hitstun') fighter.rotation *= 0.76;
      if (Math.abs(fighter.rotation) < 0.002) fighter.rotation = 0;
      if (Math.abs(fighter.rotationVel) < 0.002) fighter.rotationVel = 0;
    }

    // Guard break stun: freeze fighter regardless of input
    if (fighter.guardBreakStun > 0) {
      fighter.guardBreakStun--;
      fighter.flashFrames = 2;
      updateFighterPresentation(fighter);
      return;
    }

    // Guard regeneration when not blocking
    if (!fighter.isBlocking && fighter.guardMeter < fighter.guardMax) {
      fighter.guardMeter = Math.min(fighter.guardMax, fighter.guardMeter + 0.4 * (fighter.guardRegenMul || 1));
    }
    if (fighter.ultimateStunFx > 0) fighter.ultimateStunFx--;

    // Airborne tracking
    fighter.isAirborne = (fighter.y < GROUND_Y - 2);
    // Reset juggle on landing
    if (!fighter.isAirborne) {
      fighter.airHits = 0;
      fighter.juggleGravityMul = 1.0;
    }

    // Ultimate activation
    if (input.ultimate && fighter.ultimateMeter >= 100 && !fighter.ultimateActive && fighter.guardBreakStun === 0) {
      fighter.ultimateActive = true;
      fighter.ultimateFrame = 0;
      fighter.ultimateResolved = false;
      fighter.ultimateProjectileSpawned = false;
      fighter.ultimateCalloutShown = false;
      fighter.ultimateMeter = 0;
      playSFX('ultimate');
    }
    // Ultimate animation tick
    if (fighter.ultimateActive) {
      fighter.ultimateFrame++;
      if (fighter.ultimateFrame === 18) {
        const fxProfile = getFighterFxProfile(fighter);
        queueHitFlash('#FFFFFF', 2, 0.16);
        queueScreenShake(2.4, 5);
        spawnImpactBurst(fighter.x + fighter.facing * 18, fighter.y - 32, [fxProfile.secondary, fxProfile.primary, '#FFFFFF'], false);
      }
      if (fighter.ultimateFrame >= 90) {
        fighter.ultimateActive = false;
        fighter.ultimateFrame = 0;
      }
      updateFighterPresentation(fighter);
      return;
    }

    // Superstate: hitstun check
    if (fighter.hitstunRemaining > 0 && fighter.state !== 'knockdown') {
      if (fighter.state !== 'hitstun') {
        transitionFighterState(fighter, 'hitstun');
      }
    }

    // Run current state's update
    const stateHandler = FIGHTER_STATES[fighter.state];
    if (!stateHandler) return;

    const next = stateHandler.update(fighter, input, opponent);
    if (next) {
      transitionFighterState(fighter, next, next === fighter.state);
    }

    // Auto-facing: face opponent when not attacking/hitstun/knockdown
    const noFaceLock = ['fastAttack','powerAttack','hitstun','knockdown'];
    if (!noFaceLock.includes(fighter.state)) {
      if (opponent) {
        fighter.facing = opponent.x > fighter.x ? 1 : -1;
      }
    }

    // Apply global gravity for states that don't manage their own physics
    const selfManaged = ['jumpRise', 'jumpFall', 'knockdown', 'hitstun'];
    if (fighter.y < GROUND_Y && !selfManaged.includes(fighter.state)) {
      fighter.vy += getFighterStat(fighter, 'gravity');
      fighter.y += fighter.vy;
      if (fighter.y >= GROUND_Y) {
        fighter.y = GROUND_Y;
        fighter.vy = 0;
        transitionFighterState(fighter, 'idle');
      }
    }

    updateFighterPresentation(fighter);
  }

  // ===== PUSH-BACK COLLISION (prevent overlap) =====
  function resolveFighterOverlap(f1, f2) {
    const hw1 = f1.def.stats.hurtboxWidth / 2;
    const hw2 = f2.def.stats.hurtboxWidth / 2;
    const dist = Math.abs(f1.x - f2.x);
    const minDist = hw1 + hw2 - 4; // allow slight overlap
    if (dist < minDist) {
      const push = (minDist - dist) / 2;
      if (f1.x < f2.x) {
        f1.x = clampToArena(f1.x - push);
        f2.x = clampToArena(f2.x + push);
      } else {
        f1.x = clampToArena(f1.x + push);
        f2.x = clampToArena(f2.x - push);
      }
    }
  }

  // ===== HIT DETECTION & COMBAT SYSTEM =====
  let hitStopFramesRemaining = 0;

  function applyHitStop(frames) {
    hitStopFramesRemaining = frames;
  }

  function checkHit(attacker, defender) {
    if (attacker.attackPhase !== 'active') return false;
    if (attacker.hitThisAttack) return false;

    const atk = attacker.def.attacks[attacker.currentAttackType];
    if (!atk) return false;

    // Hitbox in world space (accounting for facing and reach)
    const reachMul = getFighterStat(attacker, 'reach');
    let hbX;
    if (attacker.facing === 1) {
      hbX = attacker.x + atk.hitbox.x * reachMul;
    } else {
      hbX = attacker.x - atk.hitbox.x * reachMul - Math.floor(atk.hitbox.w * reachMul);
    }
    const hitbox = {
      x: Math.floor(hbX),
      y: Math.floor(attacker.y + atk.hitbox.y),
      w: Math.floor(atk.hitbox.w * reachMul),
      h: atk.hitbox.h
    };

    // Defender hurtbox
    const hurtH = (defender.state === 'crouch')
      ? defender.def.stats.crouchHurtboxHeight
      : defender.def.stats.hurtboxHeight;
    const hurtbox = {
      x: Math.floor(defender.x - defender.def.stats.hurtboxWidth / 2),
      y: Math.floor(defender.y - hurtH),
      w: defender.def.stats.hurtboxWidth,
      h: hurtH
    };

    return aabbOverlap(hitbox, hurtbox);
  }

  function resolveHit(attacker, defender) {
    // Mark so multi-hit doesn't fire on same attack
    attacker.hitThisAttack = true;

    const atk = attacker.def.attacks[attacker.currentAttackType];
    const continuingCombo = defender.hitstunRemaining > 0 || defender.state === 'hitstun' || defender.y < GROUND_Y - 2;
    const isPower = attacker.currentAttackType === 'power';
    const impactX = defender.x + attacker.facing * 12;
    const impactY = defender.y - (defender.state === 'crouch' ? 18 : 30);
    const fxProfile = getFighterFxProfile(attacker);

    // Base damage with attacker power multiplier
    const baseDamage = Math.floor(atk.damage * getFighterStat(attacker, 'power'));

    // Juggle scaling: diminishing returns for air combos
    const juggleScale = Math.max(0.4, 1.0 - (defender.airHits * 0.10));
    const scaledDamage = Math.floor(baseDamage * juggleScale);

    // Apply block reduction or guard break
    let damage;
    if (defender.isBlocking) {
      damage = Math.floor(scaledDamage * 0.2);
      // Drain guard meter
      const guardDrain = Math.floor(scaledDamage * 0.5);
      defender.guardMeter = Math.max(0, defender.guardMeter - guardDrain);
      if (defender.guardMeter <= 0 && defender.guardBreakStun === 0) {
        // Guard break: stun + full damage
        defender.guardBreakStun = 60;
        defender.guardMeter = defender.guardMax;
        damage = scaledDamage; // full damage on guard break
        defender.isBlocking = false;
        applyHitStop(10);
        playSFX('guardBreak');
      }
    } else {
      damage = scaledDamage;
    }

    // Play hit SFX
    playSFX(defender.isBlocking ? 'block' : (isPower ? 'powerHit' : 'punch'));

    // Apply damage
    defender.health = Math.max(0, defender.health - damage);

    // Ultimate meter gain
    attacker.ultimateMeter = Math.min(100, attacker.ultimateMeter + Math.floor(damage * (attacker.ultimateGainMul || 1)));
    defender.ultimateMeter = Math.min(100, defender.ultimateMeter + Math.floor(damage * 0.5 * (defender.ultimateGainMul || 1)));

    // Hit stop
    applyHitStop(defender.isBlocking ? (isPower ? 5 : 3) : (isPower ? 7 : 4));
    if (!defender.isBlocking) {
      queueHitFlash('#FFFFFF', isPower ? 2 : 1, isPower ? 0.16 : 0.10);
    }

    // Flash defender white
    defender.flashFrames = 2;
    queueScreenShake(defender.isBlocking ? (isPower ? 2.4 : 1.6) : (isPower ? 5.4 : 3.1), defender.isBlocking ? 6 : 10);
    spawnImpactBurst(
      impactX,
      impactY,
      defender.isBlocking ? ['#F5F6FA', '#A7C5EB', '#6D89AE'] : (isPower ? [fxProfile.tertiary, fxProfile.primary, fxProfile.secondary] : ['#FFFFFF', fxProfile.primary, fxProfile.secondary]),
      isPower || defender.isBlocking
    );
    if (isPower) {
      spawnImpactText(impactX, impactY - 18, (attacker.def.name === 'Bush' ? 'WHAM' : 'POW'), '#FFF4C8', 8, 10);
    }

    // If not blocking: hitstun + velocity-based knockback
    if (!defender.isBlocking) {
      const isFast = attacker.currentAttackType === 'fast';
      const fastDef = attacker.def.attacks.fast;
      const comboEnder = isFast && fastDef && attacker.comboCount >= fastDef.maxChain && defender.y >= GROUND_Y && defender.airHits < 4;
      const airJuggle = isFast && defender.y < GROUND_Y && defender.airHits > 0 && defender.airHits < 4;
      attacker.comboHitsLanded = continuingCombo ? attacker.comboHitsLanded + 1 : 1;
      if (attacker.comboHitsLanded >= 2) {
        showComboBanner(buildComboBannerText(attacker.comboHitsLanded), isPower ? '#FFE08A' : '#FFFFFF');
        if (executiveRunState.active) {
          executiveRunState.bestCombo = Math.max(executiveRunState.bestCombo, attacker.comboHitsLanded);
        }
      }
      attacker.impactTilt = -attacker.facing * (isPower ? 0.08 : 0.04);
      attacker.impactOffsetX = -attacker.facing * (isPower ? 2.2 : 1.2);
      attacker.impactScaleX = isPower ? 1.08 : 1.04;
      attacker.impactScaleY = isPower ? 0.9 : 0.95;
      // Velocity knockback: scales with attack type
      const knockVx = (isPower ? 9 : 5.2) * attacker.facing * (attacker.knockbackMul || 1);
      defender.vx += knockVx;
      defender.impactTilt = attacker.facing * (isPower ? 0.16 : 0.09);
      defender.impactOffsetX = attacker.facing * (isPower ? 5 : 3);
      defender.impactOffsetY = isPower ? -2 : -1;
      defender.impactScaleX = isPower ? 1.13 : 1.08;
      defender.impactScaleY = isPower ? 0.88 : 0.93;
      defender.rotationVel += attacker.facing * (isPower ? 0.018 : 0.01);

      if (defender.health <= 0) {
        // KO ragdoll: strong launch
        defender.vx = (isPower ? 14 : 10) * attacker.facing * (attacker.knockbackMul || 1);
        defender.vy = (isPower ? -12 : -9) * (attacker.launchMul || 1);
        defender.rotationVel = attacker.facing * (0.12 + Math.random() * 0.1);
        transitionFighterState(defender, 'knockdown');
      } else {
        defender.hitstunRemaining = atk.hitstun;
        transitionFighterState(defender, 'hitstun');
        // Juggle launch: power attack
        if (isPower && defender.airHits < 4) {
          defender.vy = (-6.5 - (defender.airHits * 0.6)) * (attacker.launchMul || 1);
          defender.vx = 6 * attacker.facing * (attacker.knockbackMul || 1);
          defender.airHits++;
          defender.juggleGravityMul = 1.0 + defender.airHits * 0.15;
        } else if (comboEnder) {
          defender.vy = -5.5 * (attacker.launchMul || 1);
          defender.vx = 5 * attacker.facing * (attacker.knockbackMul || 1);
          defender.airHits = 1;
          defender.juggleGravityMul = 1.15;
        } else if (airJuggle) {
          defender.vy = -3.4 * (attacker.launchMul || 1);
          defender.vx = 3.6 * attacker.facing * (attacker.knockbackMul || 1);
          defender.airHits++;
          defender.juggleGravityMul = 1.0 + defender.airHits * 0.15;
        }
      }
    } else {
      // Stronger pushback on block with a visible recoil snap
      defender.vx += (isPower ? 3.8 : 2.5) * attacker.facing;
      attacker.vx -= (isPower ? 1.6 : 0.9) * attacker.facing;
      defender.impactTilt = attacker.facing * (isPower ? 0.1 : 0.06);
      defender.impactOffsetX = attacker.facing * (isPower ? 3 : 2);
      defender.impactScaleX = isPower ? 1.08 : 1.05;
      defender.impactScaleY = isPower ? 0.91 : 0.95;
      attacker.impactTilt = -attacker.facing * (isPower ? 0.05 : 0.03);
      attacker.impactOffsetX = -attacker.facing * (isPower ? 1.5 : 1);
      attacker.impactScaleX = 1.03;
      attacker.impactScaleY = 0.97;
      defender.rotationVel += attacker.facing * (isPower ? 0.01 : 0.006);
      attacker.comboHitsLanded = 0;
    }
  }

  function applyUltimateDamage(attacker, defender) {
    const ult = attacker.def.ultimate;
    if (!ult) return;
    const damage = ult.damage;
    const fxProfile = getFighterFxProfile(attacker);
    defender.health = Math.max(0, defender.health - damage);
    attacker.ultimateMeter = Math.min(100, attacker.ultimateMeter + damage * 0.2 * (attacker.ultimateGainMul || 1));
    defender.flashFrames = 8;
    if (ult.stunFrames) {
      defender.hitstunRemaining = ult.stunFrames;
      defender.ultimateStunFx = ult.stunFrames;
      if (defender.state !== 'knockdown') transitionFighterState(defender, 'hitstun');
    }
    if (defender.health <= 0 && defender.state !== 'knockdown') {
      transitionFighterState(defender, 'knockdown');
    }
    applyHitStop(8);
    queueScreenShake(5.2, 12);
    queueHitFlash(fxProfile.primary, 3, 0.28);
    spawnImpactBurst(defender.x, defender.y - 34, [fxProfile.tertiary, fxProfile.primary, fxProfile.secondary], true);
    if (!attacker.ultimateCalloutShown) {
      showComboBanner(attacker.def.ultimate.callout || attacker.def.ultimate.name.toUpperCase(), '#FFE08A');
      attacker.ultimateCalloutShown = true;
    }
    attacker.ultimateResolved = true;
    playSFX('ultimate');
  }

  function spawnBushGolfBall(attacker, defender) {
    const launchX = attacker.x + attacker.facing * 24;
    const launchY = attacker.y - 16;
    const distance = Math.max(48, Math.abs(defender.x - launchX));
    ultimateProjectiles.push({
      type: 'bushGolfBall',
      attacker,
      defender,
      x: launchX,
      y: launchY,
      vx: attacker.facing * clamp(distance / 18, 5.8, 7.6),
      vy: -clamp(distance / 54, 2.6, 4.4),
      gravity: 0.22,
      life: 44,
      trail: []
    });
  }

  function updateUltimateResolution(attacker, defender) {
    if (!attacker || !attacker.ultimateActive || !attacker.def || !attacker.def.ultimate) return;
    const name = attacker.def.name;

    if (name === 'Bush') {
      if (!attacker.ultimateCalloutShown && attacker.ultimateFrame === 44) {
        showComboBanner(attacker.def.ultimate.name.toUpperCase(), '#FFE08A');
        attacker.ultimateCalloutShown = true;
      }
      if (!attacker.ultimateProjectileSpawned && attacker.ultimateFrame === 45) {
        spawnBushGolfBall(attacker, defender);
        attacker.ultimateProjectileSpawned = true;
        queueScreenShake(3.2, 8);
        queueHitFlash('#FFF1C8', 1, 0.12);
      }
      return;
    }

    if (name === 'Obama') {
      if (!attacker.ultimateCalloutShown && attacker.ultimateFrame === 28) {
        showComboBanner('DRONE COMMANDER', '#FF9C8A');
        attacker.ultimateCalloutShown = true;
        queueHitFlash('#FFFFFF', 1, 0.14);
      }
      if (!attacker.ultimateResolved && attacker.ultimateFrame === 58) {
        applyUltimateDamage(attacker, defender);
      }
      return;
    }

    if (name === 'Biden') {
      if (!attacker.ultimateCalloutShown && attacker.ultimateFrame === 44) {
        showComboBanner(attacker.def.ultimate.name.toUpperCase(), '#DDEEFF');
        attacker.ultimateCalloutShown = true;
      }
      if (!attacker.ultimateResolved && attacker.ultimateFrame === 52) {
        applyUltimateDamage(attacker, defender);
      }
      return;
    }

    if (!attacker.ultimateResolved && attacker.ultimateFrame === 45) {
      applyUltimateDamage(attacker, defender);
    }
  }

  function updateUltimateProjectiles() {
    for (let i = ultimateProjectiles.length - 1; i >= 0; i--) {
      const projectile = ultimateProjectiles[i];
      projectile.trail.unshift({ x: projectile.x, y: projectile.y, life: 6 });
      if (projectile.trail.length > 5) projectile.trail.pop();

      projectile.x += projectile.vx;
      projectile.y += projectile.vy;
      projectile.vy += projectile.gravity;
      projectile.life--;

      for (let t = projectile.trail.length - 1; t >= 0; t--) {
        projectile.trail[t].life--;
        if (projectile.trail[t].life <= 0) projectile.trail.splice(t, 1);
      }

      if (projectile.type === 'bushGolfBall') {
        const targetY = projectile.defender.y - (projectile.defender.state === 'crouch' ? 18 : 30);
        const nearX = Math.abs(projectile.x - projectile.defender.x) < projectile.defender.def.stats.hurtboxWidth * 0.55;
        const nearY = Math.abs(projectile.y - targetY) < 20;
        const passed = projectile.vx > 0
          ? projectile.x >= projectile.defender.x + 4
          : projectile.x <= projectile.defender.x - 4;
        if (!projectile.attacker.ultimateResolved && ((nearX && nearY) || (passed && projectile.y >= targetY - 8))) {
          applyUltimateDamage(projectile.attacker, projectile.defender);
          ultimateProjectiles.splice(i, 1);
          continue;
        }
      }

      if (projectile.life <= 0 || projectile.y > GROUND_Y + 10 ||
          projectile.x < getArenaLeft() - 20 || projectile.x > getArenaRight() + 20) {
        ultimateProjectiles.splice(i, 1);
      }
    }
  }

  function renderUltimateProjectiles(ctx) {
    for (const projectile of ultimateProjectiles) {
      if (projectile.type !== 'bushGolfBall') continue;
      for (let i = 0; i < projectile.trail.length; i++) {
        const trail = projectile.trail[i];
        const alpha = (0.16 + trail.life * 0.08) * (1 - i * 0.08);
        ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
        const tx = worldToScreenX(trail.x);
        ctx.fillRect(Math.floor(tx - 1), Math.floor(trail.y - 1), 2, 2);
      }
      const sx = worldToScreenX(projectile.x);
      const sy = Math.floor(projectile.y);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(Math.floor(sx - 1), sy - 1, 3, 3);
      ctx.fillStyle = '#D9E1F4';
      ctx.fillRect(Math.floor(sx), sy, 1, 1);
    }
  }

  function drawUltimateStunStars(ctx, fighter) {
    if (!fighter || fighter.state === 'knockdown') return;
    const stunned = fighter.hitstunRemaining > 0 || fighter.guardBreakStun > 0 || fighter.ultimateStunFx > 0;
    if (!stunned) return;
    const headX = Math.floor(worldToScreenX(fighter.x));
    const spriteHeight = fighter.state === 'crouch' ? 42 : (fighter.y < GROUND_Y - 2 ? 50 : 56);
    const headY = Math.floor(fighter.y - spriteHeight * 0.75);
    for (let i = 0; i < 5; i++) {
      const angle = frameCounter * 0.15 + i * 2.09;
      const sx = Math.floor(headX + Math.cos(angle) * 14);
      const sy = Math.floor(headY + Math.sin(angle) * 4);
      ctx.fillStyle = '#FFE04A';
      ctx.fillRect(sx - 2, sy, 5, 1);
      ctx.fillRect(sx, sy - 2, 1, 5);
      ctx.fillRect(sx - 1, sy - 1, 3, 3);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(sx - 1, sy, 3, 1);
      ctx.fillRect(sx, sy - 1, 1, 3);
    }
  }

  function checkWallBreak(attacker, defender) {
    if (stageTier !== 1) return;
    if (wallBreakActive) return;           // already breaking â€” don't re-trigger
    if (attacker.currentAttackType !== 'power') return;
    if (attacker.attackPhase !== 'active') return;
    if (attacker.hitThisAttack) return;    // only on the hit frame
    if (defender.isBlocking) return;
    const nearLeft  = defender.x <= getArenaLeft() + 8;
    const nearRight = defender.x >= getArenaRight() - 8;
    if (!nearLeft && !nearRight) return;
    wallBreakActive = true;
    wallBreakTimer = 30;
    wallBreakSide = nearLeft ? 'left' : 'right';
    wallBreakVictim = (defender === cpu) ? 'cpu' : 'player'; // track who got hit
    playSFX('wallBreak');
    applyHitStop(15);
  }

  // ===== CPU AI =====
  const AI_STATE = {
    APPROACH: 'approach',
    PRESSURE: 'pressure',
    BACK_OFF: 'backOff',
    PUNISH: 'punish'
  };

  const AI_DIFFICULTIES = [
    { name: 'EASY',   reactionFrames: 15, blockChance: 0.20, comboChance: 0.10, approachDist: 70, pressureDist: 50, retreatHealth: 0.2, jumpChance: 0.005, powerAttackChance: 0.05, ultimateChance: 0.02 },
    { name: 'NORMAL', reactionFrames: 9,  blockChance: 0.50, comboChance: 0.30, approachDist: 65, pressureDist: 45, retreatHealth: 0.3, jumpChance: 0.008, powerAttackChance: 0.10, ultimateChance: 0.05 },
    { name: 'HARD',   reactionFrames: 4,  blockChance: 0.80, comboChance: 0.60, approachDist: 55, pressureDist: 40, retreatHealth: 0.4, jumpChance: 0.012, powerAttackChance: 0.15, ultimateChance: 0.12 },
    { name: 'EXPERT', reactionFrames: 2,  blockChance: 0.94, comboChance: 0.82, approachDist: 50, pressureDist: 36, retreatHealth: 0.5, jumpChance: 0.015, powerAttackChance: 0.22, ultimateChance: 0.18 }
  ];

  function createAIController(difficulty) {
    const cfg = AI_DIFFICULTIES[difficulty];
    return {
      state: AI_STATE.APPROACH,
      decisionCooldown: 0,
      attackSequenceFrames: 0,
      attackHoldFrames: 0,
      comboHitsRemaining: 0,
      isHolding: false,
      retreatFrames: 0,

      generateInput(cpu, player, frameCount) {
        const input = {
          left: false, right: false, up: false, down: false,
          attack: false, block: false, ultimate: false, enter: false,
          attackPressed: false, attackReleased: false, attackBuffered: false
        };

        // Don't act when knocked down
        if (cpu.knockedDown || cpu.state === 'knockdown') return input;

        const dist = Math.abs(cpu.x - player.x);
        const facingPlayer = (player.x > cpu.x) ? 1 : -1;
        const playerAttacking = (player.state === 'fastAttack' || player.state === 'powerAttack');
        const playerInRecovery = (player.attackPhase === 'recovery');
        const cpuHealthPct = cpu.health / getFighterMaxHealth(cpu);

        // === ATTACK SEQUENCE HANDLING ===
        // If in an attack sequence (combo or power), handle frame-by-frame
        if (this.comboHitsRemaining > 0) {
          this.attackSequenceFrames++;
          // Pattern: 2 frames attack=true, 1 frame attack=false (triggers fast attack)
          const cyclePos = this.attackSequenceFrames % 3;
          if (cyclePos < 2) {
            input.attack = true;
            input.attackBuffered = true;
          } else {
            input.attack = false;
            this.comboHitsRemaining--;
          }
          // Edge detection for fighter charge system
          input.attackPressed = (input.attack && cyclePos === 0);
          input.attackReleased = (!input.attack && cyclePos === 2);
          return input;
        }
        if (this.isHolding) {
          this.attackHoldFrames++;
          if (this.attackHoldFrames < 14) {
            input.attack = true;  // Hold for 14 frames (> 12 threshold)
          } else {
            input.attack = false;  // Release triggers power attack
            input.attackReleased = true;
            this.isHolding = false;
            this.attackHoldFrames = 0;
          }
          return input;
        }

        // === DECISION COOLDOWN (reaction delay) ===
        this.decisionCooldown = Math.max(0, this.decisionCooldown - 1);
        if (this.decisionCooldown > 0) {
          // Between decisions: maintain movement based on current state
          if (this.state === AI_STATE.APPROACH) {
            if (facingPlayer === 1) input.right = true; else input.left = true;
          } else if (this.state === AI_STATE.BACK_OFF) {
            if (facingPlayer === 1) input.left = true; else input.right = true;
          }
          return input;
        }

        // === STATE TRANSITIONS ===
        this.decisionCooldown = cfg.reactionFrames;

        // Back-off: low health and close
        if (cpuHealthPct < cfg.retreatHealth && dist < cfg.approachDist) {
          this.state = AI_STATE.BACK_OFF;
          this.retreatFrames = 30 + Math.floor(Math.random() * 30);
        }
        // Punish: player in recovery and close enough
        else if (playerInRecovery && dist < cfg.pressureDist + 20) {
          this.state = AI_STATE.PUNISH;
        }
        // Pressure: close enough to attack
        else if (dist < cfg.pressureDist) {
          this.state = AI_STATE.PRESSURE;
        }
        // Approach: too far
        else {
          this.state = AI_STATE.APPROACH;
        }

        // === BLOCKING (reactive, independent of state) ===
        if (playerAttacking && dist < 80 && Math.random() < cfg.blockChance) {
          input.block = true;
          return input;
        }

        // === BEHAVIOR BY STATE ===
        switch (this.state) {
          case AI_STATE.APPROACH:
            if (facingPlayer === 1) input.right = true; else input.left = true;
            // Occasional jump
            if (Math.random() < cfg.jumpChance) input.up = true;
            break;

          case AI_STATE.PRESSURE:
            // Decide: combo, power attack, or single attack
            if (Math.random() < cfg.powerAttackChance) {
              // Start power attack hold
              this.isHolding = true;
              this.attackHoldFrames = 0;
              input.attack = true;
              input.attackPressed = true;
            } else if (Math.random() < cfg.comboChance) {
              // Start combo chain (2-4 hits based on difficulty)
              const maxHits = cfg === AI_DIFFICULTIES[2] ? 4 : (cfg === AI_DIFFICULTIES[1] ? 3 : 2);
              this.comboHitsRemaining = 1 + Math.floor(Math.random() * maxHits);
              this.attackSequenceFrames = 0;
              input.attack = true;
              input.attackPressed = true;
              input.attackBuffered = true;
            } else {
              // Single fast attack
              input.attack = true;
              input.attackPressed = true;
              input.attackBuffered = true;
            }
            break;

          case AI_STATE.BACK_OFF:
            if (facingPlayer === 1) input.left = true; else input.right = true;
            this.retreatFrames--;
            if (this.retreatFrames <= 0) this.state = AI_STATE.APPROACH;
            // Block while retreating if player is attacking
            if (playerAttacking) input.block = true;
            break;

          case AI_STATE.PUNISH:
            // Rush in and attack during player recovery
            if (dist > cfg.pressureDist) {
              if (facingPlayer === 1) input.right = true; else input.left = true;
            } else {
              if (Math.random() < 0.5 && cfg.comboChance > 0.2) {
                this.comboHitsRemaining = 2;
                this.attackSequenceFrames = 0;
                input.attack = true;
                input.attackPressed = true;
                input.attackBuffered = true;
              } else {
                input.attack = true;
                input.attackPressed = true;
                input.attackBuffered = true;
              }
            }
            break;
        }

        // Use ultimate when meter full and player is close
        if (cpu.ultimateMeter >= 100 && dist < 100 && Math.random() < cfg.ultimateChance) {
          input.ultimate = true;
        }

        return input;
      }
    };
  }

  // ===== HUD RENDERING =====
  function drawHealthBar(ctx, x, y, w, h, current, max, isPlayer) {
    const pct = Math.max(0, current / max);
    // Border
    ctx.fillStyle = '#000000';
    ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
    // Background (empty health)
    ctx.fillStyle = '#333333';
    ctx.fillRect(x, y, w, h);
    // Fill color
    const fillW = Math.floor(w * pct);
    let color;
    if (pct > 0.5) color = '#00CC00';
    else if (pct > 0.25) color = '#FFCC00';
    else color = '#CC0000';
    ctx.fillStyle = color;
    if (isPlayer) {
      ctx.fillRect(x, y, fillW, h);
    } else {
      ctx.fillRect(x + w - fillW, y, fillW, h);
    }
    // Highlight line (3D bevel)
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    if (isPlayer) {
      if (fillW > 0) ctx.fillRect(x, y, fillW, 1);
    } else {
      if (fillW > 0) ctx.fillRect(x + w - fillW, y, fillW, 1);
    }
  }

  function drawRoundPips(ctx, x, y, winsCount) {
    // Draw 2 round win pips (4x4 filled squares)
    ctx.fillStyle = winsCount >= 1 ? '#FFCC00' : '#555555';
    ctx.fillRect(x, y, 4, 4);
    ctx.fillStyle = winsCount >= 2 ? '#FFCC00' : '#555555';
    ctx.fillRect(x + 8, y, 4, 4);
  }

  function drawHUD(ctx, player, cpu, roundTimer, p1Wins, p2Wins) {
    const portraitW = 22;
    const portraitH = 26;

    // HUD background strip
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, GAME_W, HUD_H);

    if (portraitCache[player.def.name]) {
      ctx.fillStyle = '#A8AFBF';
      ctx.fillRect(2, 0, portraitW + 4, portraitH + 4);
      ctx.fillStyle = '#081018';
      ctx.fillRect(4, 2, portraitW, portraitH);
      ctx.drawImage(portraitCache[player.def.name], 4, 2, portraitW, portraitH);
    }
    if (portraitCache[cpu.def.name]) {
      const frameX = GAME_W - portraitW - 6;
      ctx.fillStyle = '#A8AFBF';
      ctx.fillRect(frameX, 0, portraitW + 4, portraitH + 4);
      ctx.fillStyle = '#081018';
      ctx.fillRect(frameX + 2, 2, portraitW, portraitH);
      ctx.drawImage(portraitCache[cpu.def.name], frameX + 2, 2, portraitW, portraitH);
    }

    drawText(ctx, 'P1', 38, 2, '#FFF4C9', 6, 'left');
    // P1 Name
    drawText(ctx, player.def.name.toUpperCase(), 30, 8, '#FFFFFF', 8, 'left');

    // P1 Health bar
    drawHealthBar(ctx, 48, 8, 128, 8, player.health, getFighterMaxHealth(player), true);

    // Timer label and value (centered)
    const timerColor = roundTimer < 600 ? '#CC0000' : '#FFFFFF';
    drawText(ctx, 'TIME', 200, 2, '#FFFFFF', 8, 'center');
    drawText(ctx, String(Math.ceil(roundTimer / 60)), 200, 12, timerColor, 8, 'center');

    // P2 Health bar (fills right-to-left)
    drawHealthBar(ctx, 224, 8, 128, 8, cpu.health, getFighterMaxHealth(cpu), false);

    drawText(ctx, 'P2', 362, 2, '#FFF4C9', 6, 'right');
    // P2 Name (right-aligned)
    drawText(ctx, cpu.def.name.toUpperCase(), 360, 8, '#FFFFFF', 8, 'right');

    // Round win pips
    drawRoundPips(ctx, 120, 20, p1Wins);
    drawRoundPips(ctx, 268, 20, p2Wins);

    // P1 Guard meter (blue, thin bar below health)
    const p1Guard = Math.max(0, player.guardMeter) / player.guardMax;
    ctx.fillStyle = '#333333';
    ctx.fillRect(48, 18, 128, 4);
    ctx.fillStyle = player.guardBreakStun > 0 ? '#FF4444' : '#4488FF';
    ctx.fillRect(48, 18, Math.floor(128 * p1Guard), 4);

    // P2 Guard meter (fills right-to-left)
    const p2Guard = Math.max(0, cpu.guardMeter) / cpu.guardMax;
    ctx.fillStyle = '#333333';
    ctx.fillRect(224, 18, 128, 4);
    ctx.fillStyle = cpu.guardBreakStun > 0 ? '#FF4444' : '#4488FF';
    ctx.fillRect(224 + 128 - Math.floor(128 * p2Guard), 18, Math.floor(128 * p2Guard), 4);

    // P1 Ultimate meter (gold, small bar below guard)
    const p1Ult = player.ultimateMeter / 100;
    ctx.fillStyle = '#1A1A00';
    ctx.fillRect(48, 24, 128, 3);
    ctx.fillStyle = p1Ult >= 1.0 ? '#FFDD00' : '#AA8800';
    ctx.fillRect(48, 24, Math.floor(128 * p1Ult), 3);
    if (player.ultimateMeter >= 100 && Math.floor(frameCounter / 8) % 2 === 0) {
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(48, 24, 128, 3);
    }

    // P2 Ultimate meter (right-to-left)
    const p2Ult = cpu.ultimateMeter / 100;
    ctx.fillStyle = '#1A1A00';
    ctx.fillRect(224, 24, 128, 3);
    ctx.fillStyle = p2Ult >= 1.0 ? '#FFDD00' : '#AA8800';
    ctx.fillRect(224 + 128 - Math.floor(128 * p2Ult), 24, Math.floor(128 * p2Ult), 3);
    if (cpu.ultimateMeter >= 100 && Math.floor(frameCounter / 8) % 2 === 0) {
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(224, 24, 128, 3);
    }
  }

  // Keep renderHUD as an alias for backward compatibility
  function renderHUD(ctx, player, cpu, roundTimer) {

  function drawBidenSleepingPose(ctx, x, y, scale, facing, breatheOffset) {
    const s = scale || 1;
    const headOnLeft = facing === 1;

    const skinSec = '#D4AD85';
    const hairPri = '#CCCCCC';
    const suitPri = '#1A1A3A';

    ctx.fillStyle = suitPri;
    ctx.fillRect(x + Math.floor(20 * s), blanketY - Math.floor(2 * s), Math.floor(38 * s), Math.floor(6 * s));
    ctx.fillStyle = '#3C5A8C';
    ctx.fillRect(x + Math.floor(14 * s), blanketY, Math.floor(48 * s), Math.floor(11 * s));
    ctx.fillStyle = '#2A4268';
    ctx.fillRect(x + Math.floor(14 * s), blanketY + Math.floor(8 * s), Math.floor(48 * s), Math.floor(3 * s));
    const headX = headOnLeft ? x + Math.floor(10 * s) : x + Math.floor(52 * s);

    ctx.fillRect(headX, y, Math.floor(12 * s), Math.floor(9 * s));
    ctx.fillStyle = skinSec;
    ctx.fillRect(headX + Math.floor(7 * s), y + Math.floor(2 * s), Math.floor(4 * s), Math.floor(6 * s));

    ctx.fillRect(headOnLeft ? headX + Math.floor(3 * s) : headX + Math.floor(2 * s), y + Math.floor(5 * s), 1, 1);
    ctx.fillRect(headOnLeft ? headX + Math.floor(9 * s) : headX + Math.floor(8 * s), y + Math.floor(5 * s), 1, 1);

    return { mouthX: headOnLeft ? headX + Math.floor(9 * s) : headX + Math.floor(3 * s), mouthY: y + Math.floor(6 * s), headCenterX: headX + Math.floor(6 * s), headCenterY: y + Math.floor(4 * s) };

  function drawDreamIceCreamCone(ctx, x, y, scale, scoopA, scoopB) {
    const s = scale || 1;

    ctx.fillRect(x + 2 * s, y, 6 * s, 3 * s);
    ctx.fillRect(x + 1 * s, y + 1 * s, 8 * s, 2 * s);

    ctx.fillRect(x + 3 * s, y - 2 * s, 4 * s, 2 * s);
    ctx.fillStyle = '#FFF4C3';
    ctx.fillRect(x + 5 * s, y - 1 * s, 1 * s, 1 * s);
    ctx.fillStyle = '#D9B47D';
    ctx.fillRect(x + 3 * s, y + 3 * s, 4 * s, 2 * s);
    ctx.fillRect(x + 4 * s, y + 5 * s, 2 * s, 2 * s);

    ctx.fillRect(x + 3 * s, y + 4 * s, 4 * s, 1 * s);
  }

  function drawBidenThoughtBubble(ctx, cx, cy, w, h, mouthX, mouthY) {
    const tail = [
      { x: mouthX + 4, y: mouthY - 6, r: 3 },
      { x: mouthX + 11, y: mouthY - 14, r: 4 },
      { x: mouthX + 20, y: mouthY - 22, r: 5 }
    ];
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = '#AACCDD';
    ctx.lineWidth = 2;
    for (const t of tail) {
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    const puffs = [
      [cx - Math.floor(w * 0.28), cy + 4, 14],
      [cx - Math.floor(w * 0.08), cy - 6, 16],
      [cx + Math.floor(w * 0.12), cy - 2, 15],
      [cx + Math.floor(w * 0.30), cy + 6, 13],
      [cx - Math.floor(w * 0.18), cy + 14, 13],
      [cx + Math.floor(w * 0.10), cy + 16, 14]
    ];
    for (const puff of puffs) {
      ctx.beginPath();
      ctx.arc(puff[0], puff[1], puff[2], 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    ctx.fillStyle = '#D4E8F8';
    ctx.fillRect(cx - Math.floor(w / 2) + 10, cy - Math.floor(h / 2) + 8, w - 20, 2);
    return { x: cx - Math.floor(w / 2) + 10, y: cy - Math.floor(h / 2) + 10, w: w - 20, h: h - 20 };
  }

  function renderUltimate(ctx, fighter, opponent) {
    if (!fighter.ultimateActive) return;
    const f = fighter.ultimateFrame;
    const ult = fighter.def.ultimate;
    if (!ult) return;
    const colors = ult.colors;
    const fighterX = worldToScreenX(fighter.x);
    const opponentX = worldToScreenX(opponent.x);
    const arenaLeft = worldToScreenX(getArenaLeft());
    const arenaRight = worldToScreenX(getArenaRight());
    const floorRect = function(x, y, w, h) {
      ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
    };
    const drawPixelNote = function(x, y, color) {
      const px = Math.floor(x);
      const py = Math.floor(y);
      ctx.fillStyle = color;
      ctx.fillRect(px, py + 2, 5, 4);
      ctx.fillRect(px + 1, py + 1, 3, 6);
      ctx.fillRect(px + 4, py - 6, 2, 10);
      ctx.fillRect(px + 6, py - 6, 1, 4);
      ctx.fillRect(px + 7, py - 5, 1, 2);
    };
    const drawImpactStar = function(x, y, color) {
      const px = Math.floor(x);
      const py = Math.floor(y);
      ctx.fillStyle = color;
      ctx.fillRect(px - 3, py, 7, 1);
      ctx.fillRect(px, py - 3, 1, 7);
      ctx.fillRect(px - 2, py - 2, 5, 5);
    };
    const drawWaveArc = function(x, y, radius, color, startAngle, endAngle) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(Math.floor(x), Math.floor(y), radius, startAngle, endAngle);
      ctx.stroke();
      ctx.restore();
    };

    // Screen flash at activation (first 10 frames)
    if (f < 10) {
      const alpha = (10 - f) / 10 * 0.7;
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fillRect(0, 0, GAME_W, GAME_H);
    }

    // Fighter-specific effects (frames 10-90)
    if (f >= 10 && f < 90) {
      const name = fighter.def.name;
      if (name === 'Trump') {
        const local = f - 10;
        const sit = clamp(local / 12, 0, 1) * (1 - clamp((local - 52) / 18, 0, 1));
        const point = clamp((local - 14) / 8, 0, 1) * (1 - clamp((local - 50) / 12, 0, 1));
        const rise = clamp((local - 48) / 18, 0, 1);
        const cutsceneX = Math.floor(fighterX - 32);
        const cutsceneY = Math.floor(fighter.y - 56);
        const textCenterX = clamp(Math.floor(opponentX), 92, GAME_W - 92);
        const textPop = clamp((local - 20) / 4, 0, 1) * (1 - clamp((local - 48) / 10, 0, 1));

        ctx.fillStyle = 'rgba(26,16,12,0.24)';
        floorRect(Math.min(fighterX, opponentX) - 34, GROUND_Y + 2, Math.abs(opponentX - fighterX) + 68, 10);
        ctx.fillStyle = 'rgba(76,34,24,0.28)';
        floorRect(cutsceneX - 10, GROUND_Y - 18, 88, 4);

        ctx.save();
        ctx.translate(cutsceneX, cutsceneY);
        if (fighter.facing === -1) {
          ctx.translate(64, 0);
          ctx.scale(-1, 1);
        }
        drawTrumpYoureFiredPose(ctx, { sit: sit, point: point, rise: rise });
        ctx.restore();

        if (textPop > 0) {
          const boxW = Math.floor(110 * textPop);
          const boxH = Math.floor(28 * textPop);
          const boxX = Math.floor(textCenterX - boxW / 2);
          const boxY = 34 - Math.floor(textPop * 6);
          ctx.fillStyle = 'rgba(18,12,10,0.84)';
          floorRect(boxX - 4, boxY - 4, boxW + 8, boxH + 8);
          ctx.fillStyle = colors[1];
          floorRect(boxX - 2, boxY - 2, boxW + 4, boxH + 4);
          ctx.fillStyle = '#FFF5D7';
          floorRect(boxX, boxY, boxW, boxH);
          if (textPop > 0.55) {
            drawText(ctx, "YOU'RE", textCenterX, boxY + 4, '#2B0F08', 7, 'center');
            drawText(ctx, 'FIRED!', textCenterX, boxY + 14, colors[1], 9, 'center');
          }
        }

        if (f >= 45) {
          const ring = Math.min(18, (f - 45) * 2);
          ctx.strokeStyle = 'rgba(255,214,112,0.55)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(opponentX, opponent.y - 30, 12 + (f - 45) * 3, 0, Math.PI * 2);
          ctx.stroke();
          for (let star = 0; star < 4; star++) {
            const orbit = (f - 45) * 0.25 + star * 1.57;
            const ox = opponentX + Math.cos(orbit) * 10;
            const oy = opponent.y - 38 + Math.sin(orbit) * 5;
            drawImpactStar(ox, oy, star % 2 === 0 ? colors[0] : '#FFF7C2');
          }
          for (let spark = 0; spark < 10; spark++) {
            const drift = (f - 45) * 1.4 + spark * 5;
            const px = opponentX - 28 + ((spark * 9 + f * 3) % 56);
            const py = opponent.y - 46 - (spark % 3) * 8 + Math.sin(drift * 0.12) * 3;
            ctx.fillStyle = spark % 2 === 0 ? '#FFD36A' : '#FFF4B2';
            floorRect(px, py, 3, 3);
          }
          if (f >= 48 && f <= 54) {
            drawText(ctx, 'FIRED', clamp(opponentX, 86, GAME_W - 86), opponent.y - 74, '#FFF0A6', 12, 'center');
          }
        }
      } else if (name === 'Biden') {
        const cutCenterX = clamp(fighterX + fighter.facing * 24, 136, GAME_W - 136);
        const bedW = 92;
        const bedY = GROUND_Y - 30;
        const bedStartX = fighter.facing === 1 ? GAME_W + 20 : -bedW - 20;
        const bedIn = clamp((f - 18) / 10, 0, 1);

  function clearExecutiveRun() {
    executiveRunState.active = false;
    executiveRunState.currentMatch = 0;
    executiveRunState.opponents = [];
    executiveRunState.stages = [];
    executiveRunState.score = 0;
    executiveRunState.streak = 0;
    executiveRunState.bestCombo = 0;
    executiveRunState.playerDef = null;
  }

  function startExecutiveRun(playerDef) {
    clearExecutiveRun();
    executiveRunState.active = true;
    executiveRunState.playerDef = playerDef;
    executiveRunState.opponents = shuffleArray(ALL_FIGHTERS.filter(function(fighter) {
      return fighter !== playerDef;
    }));
    executiveRunState.stages = shuffleArray(STAGE_ROTATION).concat(shuffleArray(STAGE_ROTATION));
    executiveRunState.currentMatch = 0;
    selectedGameMode = 'executive-run';
    selectedP1Def = playerDef;
    selectedP2Def = executiveRunState.opponents[0];
    selectedStage = executiveRunState.stages[0];
  }

  function advanceExecutiveRun() {
    executiveRunState.currentMatch++;
    if (executiveRunState.currentMatch >= executiveRunState.opponents.length) return false;
    selectedP1Def = executiveRunState.playerDef;
    selectedP2Def = executiveRunState.opponents[executiveRunState.currentMatch];
    selectedStage = executiveRunState.stages[executiveRunState.currentMatch % executiveRunState.stages.length];
    return true;
  }

  function getFighterMaxHealth(fighter) {
    return fighter.maxHealth || fighter.def.stats.health;
  }

  function getFighterStat(fighter, key) {
    const base = fighter.def.stats[key];
    if (key === 'walkSpeed') return base * (fighter.speedMul || 1);
    if (key === 'accel') return base * (fighter.accelMul || 1);
    if (key === 'jumpForce') return base * (fighter.jumpMul || 1);
    if (key === 'gravity') return base * (fighter.gravityMul || 1);
    if (key === 'power') return base * (fighter.powerMul || 1);
    if (key === 'reach') return base * (fighter.reachMul || 1);
    return base;
  }

  function resetFighterMatchRules(fighter) {
    fighter.maxHealth = fighter.def.stats.health;
    fighter.guardMax = 100;
    fighter.guardRegenMul = 1;
    fighter.ultimateGainMul = 1;
    fighter.openingUltimateMeter = 0;
    fighter.speedMul = 1;
    fighter.accelMul = 1;
    fighter.jumpMul = 1;
    fighter.gravityMul = 1;
    fighter.powerMul = 1;
    fighter.reachMul = 1;
    fighter.knockbackMul = 1;
    fighter.launchMul = 1;
  }

  function applyMatchModifier() {
    activeMatchModifier = pickRandom(MATCH_MODIFIERS);
    modifierSplashTimer = 105;
    if (!player || !cpu) return;
    resetFighterMatchRules(player);
    resetFighterMatchRules(cpu);
    activeMatchModifier.applyTo(player);
    activeMatchModifier.applyTo(cpu);
    player.health = getFighterMaxHealth(player);
    cpu.health = getFighterMaxHealth(cpu);
    player.guardMeter = player.guardMax;
    cpu.guardMeter = cpu.guardMax;
  }

  function buildComboBannerText(hitCount) {
    if (hitCount >= 5) return hitCount + ' HIT CABINET CRASH';
    if (hitCount >= 4) return hitCount + ' HIT HEADLINE';
    if (hitCount >= 3) return hitCount + ' HIT STRING';
    return hitCount + ' HIT';
  }

  function awardExecutiveRunWin() {
    if (!executiveRunState.active || matchScoreAwarded) return;
    const bonus = 1000 + currentRound * 200 + Math.floor(roundTimer / 2) + Math.floor(player.health * 0.6);
    executiveRunState.score += bonus;
    executiveRunState.streak++;
    matchScoreAwarded = true;
  }

  function resetRound() {
    // Reset fighters to starting positions with full health
    player.health = getFighterMaxHealth(player);
    cpu.health = getFighterMaxHealth(cpu);
    if (currentStage) initStage(STAGE_LOOKUP[selectedStage] || STAGES.whiteHouse);

  function drawSelectStarLayer(ctx, frame, count, speed, color, sizeMul, alphaMul, parallaxShift) {
    for (let i = 0; i < count; i++) {
      const sx = (i * 37 + (i % 9) * 19 + Math.floor(frame * speed) + parallaxShift) % (GAME_W + 28) - 14;
      const sy = (i * 23 + (i % 7) * 13) % 150;
      const twinkle = 0.35 + Math.max(0, Math.sin(frame * 0.03 + i * 0.9)) * 0.65;
      const size = i % 9 === 0 ? 2 * sizeMul : sizeMul;
      ctx.fillStyle = `rgba(${color[0]},${color[1]},${color[2]},${(alphaMul * twinkle).toFixed(3)})`;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), size, size);
    }
  }

  function drawStageSelectMeteor(ctx, frame, seed, x, y, len) {
    const cycle = 420 + seed * 90;
    const phase = (frame + seed * 83) % cycle;
    if (phase > 20) return;
    const progress = phase / 20;
    const mx = x + Math.floor(progress * 110);
    const my = y + Math.floor(progress * 42);
    for (let i = 0; i < len; i += 4) {
      const alpha = 0.28 * (1 - i / len);
      ctx.fillStyle = `rgba(220,246,255,${alpha.toFixed(3)})`;
      ctx.fillRect(mx - i, my - Math.floor(i * 0.35), 5, 1);
    }
    ctx.fillStyle = 'rgba(255,255,255,0.80)';
    ctx.fillRect(mx, my, 2, 2);
  }

  function drawCharacterSelectGlobe(ctx, frame) {
    const cx = 200;
    const cy = 262;
    const radius = 126;
    const t = frame * 0.45;
    const spin = Math.floor((frame * 0.65) % 168);

    function drawWrappedRect(px, py, pw, ph, color, stripW) {
      ctx.fillStyle = color;
      const offsets = [-stripW, 0, stripW];
      for (let i = 0; i < offsets.length; i++) {
        ctx.fillRect(px + offsets[i], py, pw, ph);
      }
    }

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.clip();

    for (let y = cy - radius; y < GAME_H + 6; y += 4) {
      const band = (y - (cy - radius)) / (radius * 2);
      ctx.fillStyle = band < 0.24 ? '#1B76D6' :
                      band < 0.46 ? '#175BB8' :
                      band < 0.7 ? '#113E8E' : '#0A265E';
      ctx.fillRect(cx - radius - 4, y, radius * 2 + 8, 4);
    }

    ctx.fillStyle = 'rgba(110,220,255,0.22)';
    for (let i = 0; i < 18; i++) {
      const waveY = 126 + i * 5;
      const waveX = cx - radius + ((t * (0.8 + i * 0.05) + i * 17) % (radius * 2 + 32)) - 16;
      ctx.fillRect(Math.floor(waveX), waveY, 26, 2);
      ctx.fillRect(Math.floor(waveX + 8), waveY + 2, 14, 2);
    }

    const stripW = 228;
    const landBaseX = 88 - spin;
    const greenRects = [
      [0, 150, 46, 10], [14, 162, 62, 14], [34, 178, 54, 10], [46, 190, 28, 8],
      [90, 142, 76, 12], [66, 154, 92, 14], [52, 170, 50, 10], [206, 150, 20, 10],
      [202, 162, 26, 14], [210, 178, 18, 16]
    ];
    for (const rect of greenRects) drawWrappedRect(landBaseX + rect[0], rect[1], rect[2], rect[3], '#74BB4D', stripW);

    const yellowRects = [
      [16, 180, 24, 10], [30, 192, 18, 10], [202, 180, 18, 10], [210, 194, 14, 10],
      [84, 148, 18, 8], [108, 144, 28, 8]
    ];
    for (const rect of yellowRects) drawWrappedRect(landBaseX + rect[0], rect[1], rect[2], rect[3], '#D7D96A', stripW);

    const usaRects = [
      [37, 163, 92, 13], [28, 176, 106, 15], [36, 191, 86, 10],
      [60, 156, 30, 8], [106, 168, 18, 25], [18, 176, 10, 22], [28, 201, 26, 8]
    ];
    for (const rect of usaRects) drawWrappedRect(landBaseX + rect[0], rect[1], rect[2], rect[3], '#A9E063', stripW);
    for (const rect of usaRects) drawWrappedRect(landBaseX + rect[0], rect[1], rect[2], 2, '#E9F8B4', stripW);

    ctx.strokeStyle = 'rgba(212,250,160,0.22)';
    ctx.lineWidth = 1;
    for (let lon = -2; lon <= 2; lon++) {
      const gx = cx + lon * 26 + Math.sin(frame * 0.025 + lon) * 5;
      ctx.beginPath();
      ctx.moveTo(gx, cy - radius + 12);
      ctx.quadraticCurveTo(gx + lon * 3, cy, gx, cy + radius - 14);
      ctx.stroke();
    }

    ctx.fillStyle = 'rgba(255,255,255,0.68)';
    for (let i = 0; i < 16; i++) {
      const cloudX = (i * 31 + Math.floor(frame * (0.5 + (i % 3) * 0.12))) % 430 - 20;
      const cloudY = 128 + (i * 13) % 80;
      ctx.fillRect(cloudX, cloudY, 12, 3);
      ctx.fillRect(cloudX + 6, cloudY - 2, 10, 3);
      ctx.fillRect(cloudX + 13, cloudY + 2, 8, 2);
    }

    ctx.fillStyle = 'rgba(3,10,26,0.16)';
    ctx.fillRect(cx - radius - 6, 194, radius * 2 + 12, 80);

    ctx.restore();

    ctx.strokeStyle = '#7DE0FF';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.34)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, radius - 6, 0, Math.PI * 2);
    ctx.stroke();
  }

  function generateStageArenaPreview(stageKey, width, height, frame) {
    const full = document.createElement('canvas');
    full.width = GAME_W;
    full.height = GAME_H;
    const fullCtx = full.getContext('2d');
    fullCtx.imageSmoothingEnabled = false;
    const stageDef = STAGE_LOOKUP[stageKey];
    const prevStageTime = stageTime;
    const prevStageTier = stageTier;
    stageTime = (frame || 0) / 60;
    stageTier = 1;
    if (stageDef && stageDef.renderInterior) stageDef.renderInterior(fullCtx, frame || 0);
    else if (stageDef && stageDef.renderBackground) stageDef.renderBackground(fullCtx);
    else if (stageDef && stageDef.draw) stageDef.draw(fullCtx);
    stageTime = prevStageTime;
    stageTier = prevStageTier;

    const oc = document.createElement('canvas');
    oc.width = width;
    oc.height = height;
    const octx = oc.getContext('2d');
    octx.imageSmoothingEnabled = false;
    octx.drawImage(full, 0, 0, width, height);
    octx.fillStyle = 'rgba(0,0,0,0.12)';
    octx.fillRect(0, 0, width, height);
    octx.fillStyle = 'rgba(255,255,255,0.08)';
    const sweep = Math.floor(((frame || 0) * 2.1) % (width + 18)) - 12;
    octx.fillRect(sweep, 0, 10, height);
    octx.fillStyle = 'rgba(255,255,255,0.05)';
    for (let y = 0; y < height; y += 6) octx.fillRect(0, y, width, 1);
    return oc;
  }
