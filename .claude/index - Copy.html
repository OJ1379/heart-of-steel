      name: 'PRIME TIME',
      accent: '#FFE787',
      desc: 'The cameras are live. Both sides start with super meter.',
      applyTo(fighter) {
        fighter.openingUltimateMeter = 35;
        fighter.ultimateMeter = 35;
        fighter.ultimateGainMul = 1.12;
      }
    }
  ];

  function clearExecutiveRun() {
    executiveRunState.active = false;
    executiveRunState.currentMatch = 0;
    executiveRunState.opponents = [];
    executiveRunState.stages = [];
    executiveRunState.score = 0;
    executiveRunState.streak = 0;
    executiveRunState.bestCombo = 0;
    executiveRunState.playerDef = null;
  }

  function startExecutiveRun(playerDef) {
    clearExecutiveRun();
    executiveRunState.active = true;
    executiveRunState.playerDef = playerDef;
    executiveRunState.opponents = shuffleArray(ALL_FIGHTERS.filter(function(fighter) {
      return fighter !== playerDef;
    }));
    executiveRunState.stages = shuffleArray(STAGE_ROTATION).concat(shuffleArray(STAGE_ROTATION));
    executiveRunState.currentMatch = 0;
    selectedGameMode = 'executive-run';
    selectedP1Def = playerDef;
    selectedP2Def = executiveRunState.opponents[0];
    selectedStage = executiveRunState.stages[0];
  }

  function advanceExecutiveRun() {
    executiveRunState.currentMatch++;
    if (executiveRunState.currentMatch >= executiveRunState.opponents.length) return false;
    selectedP1Def = executiveRunState.playerDef;
    selectedP2Def = executiveRunState.opponents[executiveRunState.currentMatch];
    selectedStage = executiveRunState.stages[executiveRunState.currentMatch % executiveRunState.stages.length];
    return true;
  }

  function getFighterMaxHealth(fighter) {
    return fighter.maxHealth || fighter.def.stats.health;
  }

  function getFighterStat(fighter, key) {
    const base = fighter.def.stats[key];
    if (key === 'walkSpeed') return base * (fighter.speedMul || 1);
    if (key === 'accel') return base * (fighter.accelMul || 1);
    if (key === 'jumpForce') return base * (fighter.jumpMul || 1);
    if (key === 'gravity') return base * (fighter.gravityMul || 1);
    if (key === 'power') return base * (fighter.powerMul || 1);
    if (key === 'reach') return base * (fighter.reachMul || 1);
    return base;
  }

  function resetFighterMatchRules(fighter) {
    fighter.maxHealth = fighter.def.stats.health;
    fighter.guardMax = 100;
    fighter.guardRegenMul = 1;
    fighter.ultimateGainMul = 1;
    fighter.openingUltimateMeter = 0;
    fighter.speedMul = 1;
    fighter.accelMul = 1;
    fighter.jumpMul = 1;
    fighter.gravityMul = 1;
    fighter.powerMul = 1;
    fighter.reachMul = 1;
    fighter.knockbackMul = 1;
    fighter.launchMul = 1;
  }

  function applyMatchModifier() {
    activeMatchModifier = pickRandom(MATCH_MODIFIERS);
    modifierSplashTimer = 105;
    if (!player || !cpu) return;
    resetFighterMatchRules(player);
    resetFighterMatchRules(cpu);
    activeMatchModifier.applyTo(player);
    activeMatchModifier.applyTo(cpu);
    player.health = getFighterMaxHealth(player);
    cpu.health = getFighterMaxHealth(cpu);
    player.guardMeter = player.guardMax;
    cpu.guardMeter = cpu.guardMax;
  }

  function buildComboBannerText(hitCount) {
    if (hitCount >= 5) return hitCount + ' HIT CABINET CRASH';
    if (hitCount >= 4) return hitCount + ' HIT HEADLINE';
    if (hitCount >= 3) return hitCount + ' HIT STRING';
    return hitCount + ' HIT';
  }

  function awardExecutiveRunWin() {
    if (!executiveRunState.active || matchScoreAwarded) return;
    const bonus = 1000 + currentRound * 200 + Math.floor(roundTimer / 2) + Math.floor(player.health * 0.6);
    executiveRunState.score += bonus;
    executiveRunState.streak++;
    matchScoreAwarded = true;
  }

  function resetRound() {
    // Reset fighters to starting positions with full health
    player.health = getFighterMaxHealth(player);
    cpu.health = getFighterMaxHealth(cpu);
    if (currentStage) initStage(STAGE_LOOKUP[selectedStage] || STAGES.whiteHouse);
    const spawns = getStageSpawnPoints();
    player.x = spawns.player;
    player.y = GROUND_Y;
    player.vx = 0;
    player.vy = 0;
    cpu.x = spawns.cpu;
    cpu.y = GROUND_Y;
    cpu.vx = 0;
    cpu.vy = 0;
    transitionFighterState(player, 'idle');
    transitionFighterState(cpu, 'idle');
    roundTimer = 3600;
    koTriggered = false;
    koSplashTimer = 0;
    roundWinner = null;
    hitStopFramesRemaining = 0;
    roundSplashTimer = 0;
    roundSplashPhase = '';
    // Guard meter reset
    player.guardMeter = player.guardMax;  player.guardBreakStun = 0;
    cpu.guardMeter = cpu.guardMax;     cpu.guardBreakStun = 0;
    // Ultimate reset
    player.ultimateMeter = player.openingUltimateMeter || 0;  player.ultimateActive = false;  player.ultimateFrame = 0;
    cpu.ultimateMeter = cpu.openingUltimateMeter || 0;     cpu.ultimateActive = false;     cpu.ultimateFrame = 0;
    player.comboHitsLanded = 0;
    cpu.comboHitsLanded = 0;
    // Wall break reset
    wallBreakActive = false;
    wallBreakTimer = 0;
    wallBreakSide = null;
    wallBreakVictim = null;
    wallBreakSlowFrame = 0;
    stageTier = 1;
    combatFxState.impactBursts.length = 0;
    combatFxState.comboBanner = null;
    updateFightCamera(true);
  }

  function renderPatrioticSelectBackground(ctx, frame, titleText) {
    const t = frame || 0;
    ctx.fillStyle = '#051225';
    ctx.fillRect(0, 0, GAME_W, GAME_H);

    const flagTop = 0;
    const flagBottom = 104;
    for (let y = flagTop; y < flagBottom; y += 8) {
      const wave = Math.floor(Math.sin((t * 0.06) + y * 0.12) * 7);
      const isRed = Math.floor((y - flagTop) / 8) % 2 === 0;
      ctx.fillStyle = isRed ? '#B31942' : '#F3F4F6';
      ctx.fillRect(-10 + wave, y, GAME_W + 20, 8);
    }
    for (let y = flagTop + 2; y < flagBottom; y += 16) {
      const shine = Math.floor(Math.sin((t * 0.04) + y * 0.09) * 5);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(-8 + shine, y, GAME_W + 16, 2);
    }

    const cantonWave = Math.floor(Math.sin(t * 0.05) * 5);
    ctx.fillStyle = '#0A3161';
    ctx.fillRect(0, 0, 158 + cantonWave, 58);
    ctx.fillStyle = '#FFFFFF';
    for (let sy = 8; sy < 50; sy += 10) {
      for (let sx = 10; sx < 146; sx += 16) {
        const starX = sx + (((sy / 10) % 2) * 3);
        ctx.fillRect(starX, sy, 2, 2);
        ctx.fillRect(starX + 1, sy - 1, 1, 4);
        ctx.fillRect(starX - 1, sy + 1, 4, 1);
      }
    }

    ctx.fillStyle = 'rgba(6,14,28,0.34)';
    ctx.fillRect(0, 0, GAME_W, 108);

    const horizonY = 112;
    ctx.fillStyle = '#D69E3A';
    ctx.fillRect(0, horizonY, GAME_W, 2);

  function drawCharacterSelectGlobe(ctx, frame) {
    const cx = 200;
    const cy = 262;
    const radius = 126;
    const t = frame * 0.45;
    const spin = Math.floor((frame * 0.65) % 168);

    function drawWrappedRect(px, py, pw, ph, color, stripW) {
      ctx.fillStyle = color;
      const offsets = [-stripW, 0, stripW];
      for (let i = 0; i < offsets.length; i++) {
        ctx.fillRect(px + offsets[i], py, pw, ph);
      }
    }

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.clip();

    for (let y = cy - radius; y < GAME_H + 6; y += 4) {
      const band = (y - (cy - radius)) / (radius * 2);
      ctx.fillStyle = band < 0.24 ? '#1B76D6' :
                      band < 0.46 ? '#175BB8' :
                      band < 0.7 ? '#113E8E' : '#0A265E';
      ctx.fillRect(cx - radius - 4, y, radius * 2 + 8, 4);
    }

    ctx.fillStyle = 'rgba(110,220,255,0.22)';
    for (let i = 0; i < 18; i++) {
      const waveY = 126 + i * 5;
      const waveX = cx - radius + ((t * (0.8 + i * 0.05) + i * 17) % (radius * 2 + 32)) - 16;
      ctx.fillRect(Math.floor(waveX), waveY, 26, 2);
      ctx.fillRect(Math.floor(waveX + 8), waveY + 2, 14, 2);
    }

    const stripW = 228;
    const landBaseX = 88 - spin;
    const greenRects = [
      [0, 150, 46, 10], [14, 162, 62, 14], [34, 178, 54, 10], [46, 190, 28, 8],
      [90, 142, 76, 12], [66, 154, 92, 14], [52, 170, 50, 10], [206, 150, 20, 10],
      [202, 162, 26, 14], [210, 178, 18, 16]
    ];
    for (const rect of greenRects) drawWrappedRect(landBaseX + rect[0], rect[1], rect[2], rect[3], '#74BB4D', stripW);

    const yellowRects = [
      [16, 180, 24, 10], [30, 192, 18, 10], [202, 180, 18, 10], [210, 194, 14, 10],
      [84, 148, 18, 8], [108, 144, 28, 8]
    ];
    for (const rect of yellowRects) drawWrappedRect(landBaseX + rect[0], rect[1], rect[2], rect[3], '#D7D96A', stripW);

    const usaRects = [
      [37, 163, 92, 13], [28, 176, 106, 15], [36, 191, 86, 10],
      [60, 156, 30, 8], [106, 168, 18, 25], [18, 176, 10, 22], [28, 201, 26, 8]
    ];
    for (const rect of usaRects) drawWrappedRect(landBaseX + rect[0], rect[1], rect[2], rect[3], '#A9E063', stripW);
    for (const rect of usaRects) drawWrappedRect(landBaseX + rect[0], rect[1], rect[2], 2, '#E9F8B4', stripW);

    ctx.strokeStyle = 'rgba(212,250,160,0.22)';
    ctx.lineWidth = 1;
    for (let lon = -2; lon <= 2; lon++) {
      const gx = cx + lon * 26 + Math.sin(frame * 0.025 + lon) * 5;
      ctx.beginPath();
      ctx.moveTo(gx, cy - radius + 12);
      ctx.quadraticCurveTo(gx + lon * 3, cy, gx, cy + radius - 14);
      ctx.stroke();
    }

    ctx.fillStyle = 'rgba(255,255,255,0.68)';
    for (let i = 0; i < 16; i++) {
      const cloudX = (i * 31 + Math.floor(frame * (0.5 + (i % 3) * 0.12))) % 430 - 20;
      const cloudY = 128 + (i * 13) % 80;
      ctx.fillRect(cloudX, cloudY, 12, 3);
      ctx.fillRect(cloudX + 6, cloudY - 2, 10, 3);
      ctx.fillRect(cloudX + 13, cloudY + 2, 8, 2);
    }

    ctx.fillStyle = 'rgba(3,10,26,0.16)';
    ctx.fillRect(cx - radius - 6, 194, radius * 2 + 12, 80);

    ctx.restore();

    ctx.strokeStyle = '#7DE0FF';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.34)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, radius - 6, 0, Math.PI * 2);
    ctx.stroke();
  }

  const characterSelectBackdropScale = Math.max(2, Math.ceil(window.devicePixelRatio || 1));
  const characterSelectBackdropCanvas = document.createElement('canvas');
  characterSelectBackdropCanvas.width = GAME_W * characterSelectBackdropScale;
  characterSelectBackdropCanvas.height = GAME_H * characterSelectBackdropScale;
  const characterSelectBackdropCtx = characterSelectBackdropCanvas.getContext('2d');

  function renderCharacterSelectBackdrop(ctx, frame) {
    characterSelectBackdropCtx.setTransform(1, 0, 0, 1, 0, 0);
    characterSelectBackdropCtx.clearRect(0, 0, characterSelectBackdropCanvas.width, characterSelectBackdropCanvas.height);
    characterSelectBackdropCtx.setTransform(characterSelectBackdropScale, 0, 0, characterSelectBackdropScale, 0, 0);
    characterSelectBackdropCtx.imageSmoothingEnabled = true;
    renderCharacterSelectBackdropBase(characterSelectBackdropCtx, frame);
    ctx.save();
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(
      characterSelectBackdropCanvas,
      0,
      0,
      characterSelectBackdropCanvas.width,
      characterSelectBackdropCanvas.height,
      0,
      0,
      GAME_W,
      GAME_H
    );
    ctx.restore();
  }

  function drawCharacterSelectSlot(ctx, card, x, y, w, h, selected, frame) {
    const pulse = 0.5 + 0.5 * Math.sin(frame * 0.18);
    const lift = selected ? Math.floor(Math.sin(frame * 0.16) * 2) : 0;
    const topY = y + lift;

    ctx.fillStyle = selected ? '#F4F5F8' : '#A6ADBC';
    ctx.fillRect(x - 4, topY - 4, w + 8, h + 8);
    ctx.fillStyle = selected ? card.accent : '#666C7B';
    ctx.fillRect(x - 2, topY - 2, w + 4, h + 4);
    ctx.fillStyle = '#080A0F';
    ctx.fillRect(x, topY, w, h);
    ctx.fillStyle = '#121621';
    ctx.fillRect(x + 4, topY + 4, w - 8, h - 8);

    ctx.fillStyle = '#868D9E';
    ctx.fillRect(x + 4, topY + 4, 4, h - 8);
    ctx.fillRect(x + w - 8, topY + 4, 4, h - 8);
    ctx.fillStyle = '#C3C9D8';
    ctx.fillRect(x + 8, topY + 4, w - 16, 2);

    if (portraitCache[card.def.name]) {
      ctx.drawImage(portraitCache[card.def.name], x + 8, topY + 4, w - 16, h - 12);
    }

    if (!selected) {
      ctx.fillStyle = 'rgba(0,0,0,0.16)';
      ctx.fillRect(x + 4, topY + 4, w - 8, h - 8);
    } else {
      ctx.fillStyle = `rgba(255,255,255,${(0.12 + pulse * 0.18).toFixed(3)})`;
      ctx.fillRect(x + 4, topY + 4, w - 8, 8);
      const sweep = x + 4 + Math.floor(((frame * 2 + x) % (w + 18)) - 12);
      ctx.fillStyle = 'rgba(255,255,255,0.10)';

      drawText(ctx, 'P1', x + 32, topY - 14, '#031708', 6, 'center');

  // ===== CHARACTER SELECT SCENE =====
  const charSelectScene = {
    _cursorPos: 0,
    _difficulty: 1,
    _confirmed: false,
    _frameCount: 0,
    _availableFighters: [],
    _inputCooldown: 0,
    enter() {
      this._cursorPos = 0;
      this._difficulty = 1;
      this._confirmed = false;
      this._frameCount = 0;
      this._inputCooldown = 0;
      this._availableFighters = CHAR_SELECT_CARDS.map(function(card) { return card.def; });
      if (Object.keys(portraitCache).length === 0) {
        initPortraitCache(ALL_FIGHTERS);
      }
    },
    update(input) {
      this._frameCount++;
      if (this._confirmed) return null;
      if (this._inputCooldown > 0) this._inputCooldown--;

      if (this._inputCooldown === 0) {
        if (input.left) {
          this._cursorPos = wrapIndex(this._cursorPos - 1, this._availableFighters.length);
          this._inputCooldown = 12;
          playSFX('menuMove');
        } else if (input.right) {
          this._cursorPos = wrapIndex(this._cursorPos + 1, this._availableFighters.length);
          this._inputCooldown = 12;
          playSFX('menuMove');
        }
        if (input.up && this._difficulty < AI_DIFFICULTIES.length - 1) {
          this._difficulty++;
          this._inputCooldown = 12;
          playSFX('menuMove');
        } else if (input.down && this._difficulty > 0) {
          this._difficulty--;
          this._inputCooldown = 12;
          playSFX('menuMove');
        }
      }

      if (input.enterPressed) {
        playSFX('menuConfirm');
        selectedP1Def = this._availableFighters[this._cursorPos];
        selectedDifficulty = this._difficulty;
        selectedGameMode = pendingGameMode;
        this._confirmed = true;
        if (selectedGameMode === 'executive-run') {
          startExecutiveRun(selectedP1Def);
          return 'fight';
        }
        const remaining = this._availableFighters.filter(function(f) { return f !== selectedP1Def; });
        selectedP2Def = remaining[Math.floor(Math.random() * remaining.length)];
        return 'stageSelect';
      }

      if (input.escapePressed) {
        playSFX('menuBack');
        return 'title';
      }

      return null;
    },
    render(ctx) {
      const centerX = GAME_W / 2;
      const selectedCard = CHAR_SELECT_CARDS[this._cursorPos];
      const difficultyLabel = AI_DIFFICULTIES[this._difficulty].name;

      renderCharacterSelectBackdrop(ctx, this._frameCount);
      drawCharacterSelectHeader(ctx, this._frameCount);

      for (let i = 0; i < CHAR_SELECT_CARDS.length; i++) {
        drawCharacterSelectSlot(ctx, CHAR_SELECT_CARDS[i], 12 + i * 76, 36, 72, 58, i === this._cursorPos, this._frameCount);
      }

      drawCharacterSelectNameBanner(ctx, selectedCard);
      drawCharacterSelectPreviewPanel(ctx, selectedCard, this._difficulty, this._frameCount);
      drawCharacterSelectInfoChip(ctx, 152, 172, 96, 34, 'DIFFICULTY', [difficultyLabel], '#4B84E0');

      ctx.fillStyle = '#A8AFBF';
      ctx.fillRect(120, 196, 160, 24);
      ctx.fillStyle = '#05070C';
      ctx.fillRect(124, 200, 152, 16);
      ctx.fillStyle = '#FFCC29';
      ctx.fillRect(128, 203, 144, 10);
      drawText(ctx, 'PLAYER SELECT', centerX, 204, '#111111', 10, 'center');

      const showPrompt = Math.floor(this._frameCount / 24) % 2 === 0;
      if (showPrompt) {
        drawText(ctx, 'PRESS ENTER TO FIGHT', centerX, 226, '#FFF4C3', 6, 'center');
      }
      drawText(ctx, 'LEFT/RIGHT OR DPAD FIGHTER   UP/DOWN DIFFICULTY   ESC/BACK', centerX, 234, '#C8CFDA', 5, 'center');
    }
  };

  // ===== STAGE THUMBNAIL GENERATOR =====
  function generateStageThumbnail(stageDef, width, height) {
    const oc = document.createElement('canvas');
    oc.width = width;
    oc.height = height;
    const octx = oc.getContext('2d');
    octx.imageSmoothingEnabled = false;
    octx.save();
    octx.scale(width / GAME_W, height / GAME_H);
    stageDef.draw(octx);
    octx.restore();
    return oc;
  }

  // ===== STAGE SELECT SCENE =====
  const stageSelectScene = {
    _cursorPos: 0,
    _frameCount: 0,
    _inputCooldown: 0,
    _thumbnails: null,
    _stageKeys:  ['white-house', 'virgin-islands', 'mar-a-lago', 'camp-david'],
    _stageNames: ['Oval Office', 'Virgin Islands', 'Mar-a-Lago', 'Camp David'],
    enter() {
      this._cursorPos = 0;
      this._frameCount = 0;
      this._inputCooldown = 0;
      if (!this._thumbnails) {
        this._thumbnails = {};
        for (let i = 0; i < this._stageKeys.length; i++) {
          const key = this._stageKeys[i];
          const stageDef = STAGE_LOOKUP[key];
          this._thumbnails[key] = generateStageThumbnail(stageDef, 80, 48);
        }
      }
    },
    update(input) {
      this._frameCount++;
      if (this._inputCooldown > 0) this._inputCooldown--;
      if (this._inputCooldown === 0) {
        if (input.left) {
          this._cursorPos = wrapIndex(this._cursorPos - 1, this._stageKeys.length);
          this._inputCooldown = 12;
          playSFX('menuMove');
        } else if (input.right) {
          this._cursorPos = wrapIndex(this._cursorPos + 1, this._stageKeys.length);
          this._inputCooldown = 12;
          playSFX('menuMove');
        }
      }
      if (input.enterPressed) {
        playSFX('menuConfirm');
        selectedStage = this._stageKeys[this._cursorPos];
        return 'fight';
      }
      if (input.escapePressed) {
        playSFX('menuBack');
        return 'charSelect';
      }
      return null;
    },
    render(ctx) {
      renderPatrioticSelectBackground(ctx, this._frameCount, 'SELECT STAGE');
      drawSelectPanel(ctx, 20, 54, 360, 58, '#8FA7D8');
      drawSelectPanel(ctx, 128, 134, 144, 84, '#8FA7D8');
      for (let i = 0; i < 4; i++) {
        const key = this._stageKeys[i];
        const cx = 28 + i * 86;
        const cy = 61;
        const isSelected = (i === this._cursorPos);
        if (isSelected) {
          ctx.fillStyle = 'rgba(255,204,0,0.18)';
          ctx.fillRect(cx - 4, cy - 4, 80, 50);
        }
        ctx.fillStyle = isSelected ? '#FFCC00' : '#6E7C99';
        ctx.fillRect(cx - 2, cy - 2, 76, 46);
        ctx.fillStyle = '#111A30';
        ctx.fillRect(cx, cy, 72, 42);
        if (this._thumbnails && this._thumbnails[key]) {
          ctx.drawImage(this._thumbnails[key], cx, cy, 72, 42);
        } else {
          ctx.fillStyle = '#1A1A3A';
          ctx.fillRect(cx, cy, 72, 42);
        }
        drawText(ctx, this._stageNames[i], cx + 36, 108, isSelected ? '#FFF3C4' : '#E2E7EF', 5, 'center');
      }
      // Large preview of selected stage
      var previewW = 136, previewH = 76;
      var previewX = Math.floor((400 - previewW) / 2);
      var previewY = 140;
      ctx.fillStyle = '#6E7C99';
      ctx.fillRect(previewX - 2, previewY - 2, previewW + 4, previewH + 4);
      ctx.fillStyle = '#111A30';
      ctx.fillRect(previewX, previewY, previewW, previewH);
      var selectedKey = this._stageKeys[this._cursorPos];
      var largeDef = STAGE_LOOKUP[selectedKey];
      if (largeDef) {
        var largeThumb = generateStageThumbnail(largeDef, previewW, previewH);
        ctx.drawImage(largeThumb, previewX, previewY);
      }
      drawText(ctx, this._stageNames[this._cursorPos], 200, 126, '#FFFFFF', 8, 'center');
      const showPrompt = Math.floor(this._frameCount / 30) % 2 === 0;
      if (showPrompt) drawText(ctx, 'PRESS ENTER TO FIGHT', 200, 222, '#FFFFFF', 7, 'center');
      drawText(ctx, 'A/D OR ARROWS STAGE   ESC BACK', 200, 232, '#C8CFDA', 5, 'center');
    }
  };

  const fightScene = {
    enter() {
      stageTier = 1;
      wallBreakActive = false;
      wallBreakTimer = 0;
      wallBreakSide = null;
      wallBreakVictim = null;
      wallBreakSlowFrame = 0;
      initStage(STAGE_LOOKUP[selectedStage] || STAGES.whiteHouse);
      const spawns = getStageSpawnPoints();
      player = createFighter(selectedP1Def || TRUMP, spawns.player, 1);
      cpu = createFighter(selectedP2Def || BIDEN, spawns.cpu, -1);
      applyMatchModifier();
      roundTimer = 3600;
      p1Wins = 0;
      p2Wins = 0;
      currentRound = 1;
      koTriggered = false;
      koSplashTimer = 0;
      roundWinner = null;
      matchOver = false;
      winner = null;
      hitStopFramesRemaining = 0;
      matchScoreAwarded = false;
      attackHeldFrames = 0;
      prevAttack = false;
      inputBuffer.length = 0;
      initSpriteCache([selectedP1Def || TRUMP, selectedP2Def || BIDEN]);
      aiController = createAIController(selectedDifficulty);
      roundSplashTimer = 90;
      roundSplashPhase = 'round';
      updateFightCamera(true);
      startBGMusic(selectedStage);
    },
    update(input) {
      // Wall break slow-mo: run at one third speed for a heavier impact beat
      if (wallBreakActive && wallBreakTimer > 0) {
        wallBreakSlowFrame++;
        if (wallBreakSlowFrame % 3 !== 0) {
          wallBreakTimer--;
          return null; // skip this tick
        }
      }

      // Round splash: block ALL input and game updates
      if (roundSplashTimer > 0) {
        roundSplashTimer--;
        if (roundSplashTimer === 30) {
          roundSplashPhase = 'fight';
        }
        return null;
      }

      if (modifierSplashTimer > 0) modifierSplashTimer--;

      // Match fully over: wait for Enter to go to victory scene
      if (matchOver) {
        if (input.enterPressed) {
          playSFX('menuConfirm');
          return 'victory';
        }
        return null;
      }

      // KO splash: freeze fighters, count down timer, then handle round/match end
      if (koTriggered) {
        if (koSplashTimer > 0) {
          koSplashTimer--;
          return null;
        }
        // Splash done: tally win
        if (roundWinner === 'player') {
          p1Wins++;
        } else {
          p2Wins++;
        }
        // Check for match end (best-of-3: 2 wins)
        if (p1Wins >= 2 || p2Wins >= 2) {
          matchOver = true;
          winner = p1Wins >= 2 ? player.def.name.toUpperCase() : cpu.def.name.toUpperCase();
          if (selectedGameMode === 'executive-run') {
            if (p1Wins >= 2) awardExecutiveRunWin();
            else executiveRunState.streak = 0;
          }
          koTriggered = false;
          return null;
        }
        // Start next round
        currentRound++;
        resetRound();
        roundSplashTimer = 90;
        roundSplashPhase = 'round';
        return null;
      }

      // Hit stop: freeze fighters, still decrement timer
      if (hitStopFramesRemaining > 0) {
        hitStopFramesRemaining--;
        roundTimer = Math.max(0, roundTimer - 1);
        return null;
      }

      // Pause menu
      if (input.escapePressed) {
        playSFX('menuOpen');
        pauseMenuScene.enter('fight');
        return 'pause';
      }

      // Timer countdown
      roundTimer = Math.max(0, roundTimer - 1);

      // Update player state machine
      updateFighter(player, input, cpu);

      // CPU AI input
      const cpuInput = aiController.generateInput(cpu, player, frameCounter);
      updateFighter(cpu, cpuInput, player);

      // Push-back overlap resolution
      resolveFighterOverlap(player, cpu);

      // Hit detection (both directions -- allow trades)
      if (checkHit(player, cpu)) resolveHit(player, cpu);
      if (checkHit(cpu, player)) resolveHit(cpu, player);

      // Wall break detection
      checkWallBreak(player, cpu);
      checkWallBreak(cpu, player);

      // Ultimate damage at midpoint of animation
      if (player.ultimateActive && player.ultimateFrame === 45) {
        applyUltimateDamage(player, cpu);
      }
      if (cpu.ultimateActive && cpu.ultimateFrame === 45) {
        applyUltimateDamage(cpu, player);
      }

      updateFightCamera(false);

      // Wall break slow-mo and transition
      if (wallBreakActive) {
        if (wallBreakTimer > 0) {
          wallBreakTimer--;
        } else {
          wallBreakActive = false;
          stageTier = 2;
          initStageTier2(STAGE_LOOKUP[selectedStage] || STAGES.whiteHouse);
          playSFX('wallBreak');
          // Bonus 50 damage to the fighter who was knocked into the wall
          const victim = wallBreakVictim === 'cpu' ? cpu : player;
          victim.health = Math.max(0, victim.health - 50);
        }
      }

      // KO / round-end detection
      if (player.health <= 0) {
        koTriggered = true;
        koSplashTimer = 90;
        roundWinner = 'cpu';
        playSFX('ko');
        return null;
      }
      if (cpu.health <= 0) {
        koTriggered = true;
        koSplashTimer = 90;
        roundWinner = 'player';
        playSFX('ko');
        return null;
      }
      if (roundTimer <= 0) {
        // Time out: higher health percentage wins
        koTriggered = true;
        koSplashTimer = 90;
        roundWinner = (player.health / getFighterMaxHealth(player)) >= (cpu.health / getFighterMaxHealth(cpu)) ? 'player' : 'cpu';
        playSFX('ko');
        return null;
      }

      return null;
    },
    render(ctx) {
      const zoomProgress = wallBreakActive && wallBreakTimer > 0 ? (wallBreakTimer / 30) : 0;
      const zoomScale = 1 + zoomProgress * 0.5;
      const zoomX = wallBreakSide === 'right' ? GAME_W - 48 : 48;
      const zoomY = Math.floor(GAME_H * 0.52);

      if (zoomScale > 1.001) {
        ctx.save();
        ctx.translate(zoomX, zoomY);
        ctx.scale(zoomScale, zoomScale);
        ctx.translate(-zoomX, -zoomY);
      }

      renderCurrentStage(ctx);

      // Draw fighters
      if (player) renderFighter(ctx, player);
      if (cpu) renderFighter(ctx, cpu);

      // Round splash overlay
      if (roundSplashTimer > 0) {
        if (roundSplashPhase === 'round') {
          // Semi-transparent backdrop band
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(0, 85, 400, 50);
          // "ROUND N" text
          drawText(ctx, 'ROUND ' + currentRound, 200, 100, '#FFFFFF', 16, 'center');
        } else if (roundSplashPhase === 'fight') {
          // Semi-transparent backdrop band (narrower for FIGHT)
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(0, 95, 400, 30);
          // "FIGHT!" text in gold
          drawText(ctx, 'FIGHT!', 200, 108, '#FFCC00', 16, 'center');
        }
      }

      // KO splash overlay (during 90-frame countdown)
      if (koTriggered && koSplashTimer > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(0, 85, GAME_W, 50);
        // Flash K.O.! text between white and red every 5 frames
        const koColor = Math.floor((90 - koSplashTimer) / 5) % 2 === 0 ? '#FFFFFF' : '#CC0000';
        drawText(ctx, 'K.O.!', 200, 100, koColor, 16, 'center');
      }

      // Match over overlay (after KO splash, waiting for Enter)
      if (matchOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 80, GAME_W, 80);
        drawText(ctx, 'K.O.!', 200, 90, '#FFFFFF', 16, 'center');
        drawText(ctx, winner + ' WINS!', 200, 115, '#FFCC00', 8, 'center');

        const showPrompt = Math.floor(frameCounter / 30) % 2 === 0;
        if (showPrompt) {
          drawText(ctx, 'PRESS ENTER TO CONTINUE', 200, 135, '#FFFFFF', 8, 'center');
        }
      }

      // Ultimate animations
      if (player && cpu) {
        renderUltimate(ctx, player, cpu);
        renderUltimate(ctx, cpu, player);
      }

      // Wall break effect: flash + crack overlay
      if (wallBreakActive && wallBreakTimer > 0) {
        const flashAlpha = (wallBreakTimer / 30) * 0.8;
        ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha + ')';
        ctx.fillRect(0, 0, GAME_W, GAME_H);
        const crackX = wallBreakSide === 'right' ? GAME_W : 0;
        ctx.fillStyle = '#000000';
        for (let i = 0; i < 5; i++) {
          const angle = (Math.PI / 6) * i - Math.PI / 3;
          const len = 30 + i * 15;
          const ex = Math.floor(crackX + Math.cos(angle) * len * (wallBreakSide === 'right' ? -1 : 1));
          const ey = Math.floor(GAME_H / 2 + Math.sin(angle) * len);
          ctx.fillRect(Math.min(crackX, ex), Math.min(GAME_H / 2, ey), Math.abs(crackX - ex) + 2, 2);
        }
      }

      if (zoomScale > 1.001) {
        ctx.restore();
      }

      // HUD overlay stays at 1:1 scale during cinematic wall breaks
      if (player && cpu) {
        drawHUD(ctx, player, cpu, roundTimer, p1Wins, p2Wins);
        drawMatchContextPanel(ctx);
      }

      if (modifierSplashTimer > 0 && activeMatchModifier) {
        const alpha = Math.min(0.88, modifierSplashTimer / 105);
        ctx.fillStyle = 'rgba(6,10,18,' + (alpha * 0.72).toFixed(3) + ')';
        ctx.fillRect(56, 86, 288, 34);
        drawText(ctx, activeMatchModifier.name, 200, 92, activeMatchModifier.accent, 10, 'center');
        drawText(ctx, activeMatchModifier.desc, 200, 104, '#F5F1E8', 6, 'center');
      }
    }
  };

  // ===== VICTORY SCENE =====
  const victoryScene = {

      drawVictoryCharacterSprite(ctx, loserName, runnerUpState, loseFrameIdx, runnerUpX, runnerUpBaseY, 1.14, 1, 0.28);

        drawText(ctx, 'RUN SCORE ' + executiveRunState.score, GAME_W / 2, 190, '#FFF3C4', 7, 'center');

        if (cleared) {
          drawText(ctx, 'GAUNTLET CLEARED', GAME_W / 2, 210, '#FFCC00', 7, 'center');
        } else if (this._playerWon && nextName) {
          drawText(ctx, 'NEXT OPPONENT ' + nextName, GAME_W / 2, 210, '#FFCC00', 6, 'center');
        } else if (!this._playerWon) {
          drawText(ctx, 'RETURN TO TITLE TO REDEPLOY', GAME_W / 2, 210, '#FFCC00', 6, 'center');
        }
      }

      // Blinking prompt after 60 frames
      const showPrompt = Math.floor(this._frameCount / 30) % 2 === 0;
      if (showPrompt && this._frameCount > 60) {
        const promptText = selectedGameMode === 'executive-run' && this._playerWon && executiveRunState.currentMatch < executiveRunState.opponents.length - 1
          ? 'PRESS ENTER FOR NEXT MATCH'
          : 'PRESS ENTER TO PLAY AGAIN';
        ctx.fillStyle = 'rgba(7,19,54,0.72)';
        ctx.fillRect(92, 214, 216, 16);
        drawText(ctx, promptText, GAME_W / 2, 218, '#FFFFFF', 8, 'center');
      }
    }
  };

  // ===== PAUSE MENU SCENE =====
  const pauseMenuScene = {
    _fromScene: 'fight',
    _tab: 0,
    _menuItem: 0,
    _frameCount: 0,
    _inputCooldown: 0,
    enter(fromScene) {
      this._fromScene = fromScene || 'fight';
      this._tab = 0;
      this._menuItem = 0;
      this._frameCount = 0;
      this._inputCooldown = 8;
    },
    update(input) {
      this._frameCount++;
      if (this._inputCooldown > 0) { this._inputCooldown--; return null; }
      if (input.escapePressed) {
        playSFX('menuBack');
        return this._fromScene;
      }

      if (input.left) {
        this._tab = wrapIndex(this._tab - 1, 3);
        this._inputCooldown = 10;
        playSFX('menuMove');
      }
      if (input.right) {
        this._tab = wrapIndex(this._tab + 1, 3);
        this._inputCooldown = 10;
        playSFX('menuMove');
      }

      if (this._tab === 2) {
        if (input.up) {
          setMasterVolume(masterVolume + 0.1);
          this._inputCooldown = 7;
          playSFX('menuMove');
        }
        if (input.down) {
          setMasterVolume(masterVolume - 0.1);
          this._inputCooldown = 7;
          playSFX('menuMove');
        }
      } else if (input.up || input.down) {
        this._menuItem = wrapIndex(this._menuItem + (input.up ? -1 : 1), 2);
        this._inputCooldown = 10;
        playSFX('menuMove');
      }

      if (!input.enterPressed) return null;
      playSFX('menuConfirm');
      if (this._menuItem === 0) return this._fromScene;

      stopBGMusic();
      p1Wins = 0; p2Wins = 0; currentRound = 1;
      koTriggered = false; koSplashTimer = 0;
      roundWinner = null; matchOver = false; winner = null;
      return 'charSelect';
    },
    render(ctx) {
      ctx.fillStyle = 'rgba(0,0,0,0.78)';
      ctx.fillRect(0, 0, GAME_W, GAME_H);

      const px = 40, py = 18, pw = 320, ph = 200;
      const panelGradient = ctx.createLinearGradient(px, py, px, py + ph);
      panelGradient.addColorStop(0, '#0f122b');
      panelGradient.addColorStop(1, '#060712');
      ctx.fillStyle = panelGradient;
      ctx.fillRect(px, py, pw, ph);
      ctx.strokeStyle = '#FFCC00';
      ctx.lineWidth = 2;
      ctx.strokeRect(px, py, pw, ph);

      drawText(ctx, 'PAUSED', GAME_W / 2, py + 8, '#FFCC00', 12, 'center');

      const tabW = 72;
      for (let t = 0; t < tabs.length; t++) {

        ctx.fillStyle = active ? '#FFCC00' : '#2A2A4A';

          ['ULT', 'L/C FULL BAR'],
          ['PAUSE', 'ESC'],

        drawText(ctx, 'MASTER VOLUME', GAME_W / 2, contentY, '#FFFFFF', 10, 'center');
        const sliderX = px + 38;

        const stepW = Math.floor((sliderW - stepGap * (stepCount - 1)) / stepCount);

  };
  const scenes = {

  // ===== STAGE DEFINITIONS =====
  const STAGES = {
    whiteHouse: {
      name: 'Oval Office',

  // ===== STAGE LOOKUP =====
  const STAGE_LOOKUP = {
    'white-house':  STAGES.whiteHouse,
    'virgin-islands': STAGES.virginIslands,
    'mar-a-lago':   STAGES.marALago,
    'camp-david':   STAGES.campDavid
  };

  // ===== STAGE INIT =====
  let currentStage = null;

  function ensureStageCanvas(stageDef) {
    const width = stageDef.worldWidth || DEFAULT_STAGE_WORLD_W;
    if (!stageDef.bgCanvas || stageDef.bgCanvas.width !== width || stageDef.bgCanvas.height !== GAME_H) {
      const oc = document.createElement('canvas');
      oc.width = width;
      oc.height = GAME_H;
      const octx = oc.getContext('2d');
      octx.imageSmoothingEnabled = false;
      stageDef.bgCanvas = oc;
    }
    return stageDef.bgCanvas;
  }

  function initStage(stageDef) {
    stageDef.worldWidth = stageDef.worldWidth || DEFAULT_STAGE_WORLD_W;
    stageDef.bounds = { left: ARENA_EDGE_BUFFER, right: stageDef.worldWidth - ARENA_EDGE_BUFFER };
    currentStage = stageDef;
    if (stageDef.renderBackground) {
      ensureStageCanvas(stageDef);
      initWhiteHouseStageFx();
    } else {
      const oc = ensureStageCanvas(stageDef);
      const octx = oc.getContext('2d');
      octx.imageSmoothingEnabled = false;
      stageDef.draw(octx);
    }
  }

  function initStageTier2(stageDef) {
    if (!stageDef || !stageDef.drawTier2) return;
    stageDef.worldWidth = stageDef.worldWidth || DEFAULT_STAGE_WORLD_W;
    stageDef.bounds = { left: ARENA_EDGE_BUFFER, right: stageDef.worldWidth - ARENA_EDGE_BUFFER };
    currentStage = stageDef;
    if (stageDef.renderBackground) {
      ensureStageCanvas(stageDef);
      return;
    }
    const oc = ensureStageCanvas(stageDef);
    const octx = oc.getContext('2d');
    octx.imageSmoothingEnabled = false;
    stageDef.drawTier2(octx);
    stageDef.tier2Canvas = oc;
    // Swap bgCanvas to tier2 so the stage renders the new background
    stageDef.bgCanvas = oc;
  }

  function renderCurrentStage(ctx) {
    if (!currentStage) return;
    const bg = ensureStageCanvas(currentStage);
    const bgctx = bg.getContext('2d');
    bgctx.imageSmoothingEnabled = false;
    if (currentStage.renderBackground) currentStage.renderBackground(bgctx);
    const sx = clamp(Math.floor(cameraX), 0, Math.max(0, bg.width - GAME_W));
    ctx.drawImage(bg, sx, 0, GAME_W, GAME_H, 0, 0, GAME_W, GAME_H);
  }

  // ===== INIT SEQUENCE =====
  window.addEventListener('load', () => {
    resizeCanvas();
    buildLogo();
    initSpriteCache(ALL_FIGHTERS);
    initPortraitCache(ALL_FIGHTERS);
    initStage(STAGES.whiteHouse);
    initAudio();
    scenes[currentScene].enter();
    requestAnimationFrame(gameLoop);
  });

  document.addEventListener('keydown', function resumeAudio() {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  });

  </script>
