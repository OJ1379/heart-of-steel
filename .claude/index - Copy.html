  const titleScene = {
    _frameCount: 0,
    _menuIndex: 0,
    _inputCooldown: 0,
    enter() {
      this._frameCount = 0;
      const activeMode = pendingGameMode || selectedGameMode || 'exhibition';
      this._menuIndex = Math.max(0, GAME_MODES.findIndex(function(mode) { return mode.key === activeMode; }));
      this._inputCooldown = 0;
      startTitleMusic();
    },
    update(input) {
      this._frameCount++;
      if (this._inputCooldown > 0) this._inputCooldown--;
      if (this._inputCooldown === 0) {
        if (input.up || input.left) {
          this._menuIndex = wrapIndex(this._menuIndex - 1, GAME_MODES.length);
          this._inputCooldown = 10;
          playSFX('menuMove');
        } else if (input.down || input.right) {
          this._menuIndex = wrapIndex(this._menuIndex + 1, GAME_MODES.length);
          this._inputCooldown = 10;
          playSFX('menuMove');
        }
      }
      if (input.enterPressed) {
        playSFX('menuConfirm');
        pendingGameMode = GAME_MODES[this._menuIndex].key;
        selectedGameMode = pendingGameMode;
        clearExecutiveRun();
        return 'charSelect';
      }
      return null;
    },
    render(ctx) {
      const centerX = GAME_W / 2;
      const buttonFontSize = 6;
      const buttonHeight = 18;
      const buttonGap = 16;
      const buttonPadX = 24;
      const buttonTop = 176;

      renderTitleBackdrop(ctx, this._frameCount);
      drawRushmoreSilhouettes(ctx, this._frameCount);
      drawTitlePresidentLineup(ctx, this._frameCount);
      drawHUDAccent(ctx, this._frameCount);

      // Logo
      ctx.drawImage(logoCanvas, 0, 20);

      drawText(ctx, 'STARS. STRIPES. PRESIDENTIAL THROWDOWNS.', centerX, 150, '#EBD9C2', 6, 'center');

      const activeMode = GAME_MODES[this._menuIndex];
      ctx.fillStyle = 'rgba(8,14,26,0.72)';
      ctx.fillRect(48, 158, GAME_W - 96, 14);
      drawText(ctx, activeMode.desc, centerX, 162, '#F0E3CE', 5, 'center');

      for (let i = 0; i < GAME_MODES.length; i++) {
        const mode = GAME_MODES[i];
        const selected = i === this._menuIndex;
        const bw = Math.max(176, measurePixelText(mode.name, buttonFontSize) + buttonPadX * 2);
        const bx = Math.floor(centerX - bw / 2);
        const by = buttonTop + i * (buttonHeight + buttonGap);
        const bh = buttonHeight;
        ctx.fillStyle = selected ? '#FFCC29' : '#8E96A6';
        ctx.fillRect(bx - 2, by - 2, bw + 4, bh + 4);
        ctx.fillStyle = '#090C14';
        ctx.fillRect(bx, by, bw, bh);
        ctx.fillStyle = selected ? 'rgba(255,204,41,0.20)' : 'rgba(116,128,154,0.10)';
        ctx.fillRect(bx + 3, by + 3, bw - 6, bh - 6);
        if (selected) {
          ctx.fillStyle = '#00F070';
          ctx.fillRect(Math.floor(centerX - 19), by - 8, 38, 7);
          drawText(ctx, 'SELECTED', centerX, by - 8, '#041108', 5, 'center');
        }
        drawText(ctx, mode.name, centerX, by + 4, selected ? '#111111' : '#FFFFFF', buttonFontSize, 'center');
      }

      const showPrompt = Math.floor(this._frameCount / 30) % 2 === 0;
      if (showPrompt) {
        drawText(ctx, 'ENTER DEPLOYS  A/D OR ARROWS CHANGE MODE', centerX, 228, '#FFFFFF', 5, 'center');
      }

      // Version text
      drawText(ctx, 'H.O.S v0.2', 388, 10, '#9b8f86', 7, 'right');
    }
  };

  // ===== FIGHTER SPRITE DRAW FUNCTIONS =====

  function addSuitSpriteDetails(c, opts) {
    const torsoLeft = opts.torsoLeft;
    const torsoTop = opts.torsoTop;
    const torsoWidth = opts.torsoWidth;
    const torsoH = opts.torsoH;
    const suitSec = opts.suitSec;
    const shirt = opts.shirt;
    const shirtX = opts.shirtX;
    const shirtW = opts.shirtW;
    const accent = opts.accent || suitSec;
    const tieX = opts.tieX;
    const tieW = opts.tieW || 2;

    c.fillStyle = suitSec;
    c.fillRect(torsoLeft + 2, torsoTop + 1, torsoWidth - 4, 1);
    c.fillRect(torsoLeft + Math.floor(torsoWidth / 2) - 6, torsoTop + 4, 2, Math.max(2, torsoH - 8));
    c.fillRect(torsoLeft + Math.floor(torsoWidth / 2) + 4, torsoTop + 4, 2, Math.max(2, torsoH - 8));
    c.fillRect(torsoLeft + 4, torsoTop + torsoH - 2, torsoWidth - 8, 1);

    c.fillStyle = shirt;
    c.fillRect(shirtX + 1, torsoTop + 1, Math.max(2, shirtW - 2), 1);

    c.fillStyle = accent;
    c.fillRect(torsoLeft + Math.floor(torsoWidth / 2) - 1, torsoTop + Math.max(4, torsoH - 5), 2, 3);
    if (tieX != null) {
      c.fillRect(tieX, torsoTop + 2, tieW, 2);
    }
  }

  function addFaceSpriteDetails(c, opts) {
    const headCX = opts.headCX;
    const headTop = opts.headTop;
    const headH = opts.headH;
    const browColor = opts.browColor;
    const skinSec = opts.skinSec;
    const mouthColor = opts.mouthColor;

    c.fillStyle = browColor;
    c.fillRect(headCX - 6, headTop + 3, 4, 1);
    c.fillRect(headCX + 2, headTop + 3, 4, 1);

    c.fillStyle = skinSec;
    c.fillRect(headCX - 2, headTop + Math.floor(headH * 0.55), 4, 1);
    c.fillRect(headCX - 4, headTop + headH - 2, 8, 1);

    c.fillStyle = mouthColor;
    c.fillRect(headCX - 2, headTop + headH - 4, 4, 1);
  }

  function buildAttackFrames(makeFrames, poses) {
    return poses.map(function(pose) {
      return makeFrames(pose[0], pose[1], pose[2], pose[3]);
    });
  }

  // --- TRUMP SPRITE FUNCTIONS ---
  // Canvas is 64x56. Anchor: feet at y=56, center at x=32.
  // Sprite body occupies roughly x:8-56, y:8-56 (48px tall)

  function drawTrumpBase(c, offsetY, crouchFactor, armState, legState) {
    // armState: 0=sides, 1=up, 2=guard, 3=punch, 4=windup, 5=swing, 6=recoil
    // legState: 0=stand, 1=stride-a, 2=stride-b, 3=jump-tuck, 4=land, 5=crouch, 6=kick
    // offsetY: vertical offset (for idle bob)
    const oy = offsetY || 0;
    const cf = crouchFactor || 0; // 0=stand, 1=fully crouched

    // Compressed height: feet fixed at y=56, body compresses up
    const bodyBot = 56; // feet
    const standH = 48;
    const crouchH = 30;
    const bodyH = Math.floor(standH - (standH - crouchH) * cf);
    const bodyTop = bodyBot - bodyH + oy;

    // Proportions (normalized to bodyH)
    const headH = Math.floor(bodyH * 0.29);   // ~14px at stand
    const torsoH = Math.floor(bodyH * 0.35);  // ~17px at stand
    const legH = bodyH - headH - torsoH;       // rest

    const headTop = bodyTop;
    const torsoTop = headTop + headH;
    const legTop = torsoTop + torsoH;

    // Colors
    const hairPri = '#FFD700';
    const hairSec = '#DAA520';
    const skinPri = '#FFB366';
    const skinSec = '#E8944D';
    const suitPri = '#1A1A4E';
    const suitSec = '#0D0D2B';
    const shirt = '#FFFFFF';
    const tiePri = '#CC0000';
    const tieSec = '#990000';
    const shoe = '#1A1A1A';
    const outline = '#000000';

    // === SHOES / LEGS ===
    if (legState === 0) {
      // Standing
      c.fillStyle = suitPri;
      c.fillRect(22, legTop, 8, legH - 4);   // left leg
      c.fillRect(34, legTop, 8, legH - 4);   // right leg
      c.fillStyle = shoe;
      c.fillRect(20, legTop + legH - 4, 10, 4); // left shoe
      c.fillRect(34, legTop + legH - 4, 10, 4); // right shoe
    } else if (legState === 1) {
      // Stride A: left leg forward
      c.fillStyle = suitPri;
      c.fillRect(19, legTop, 8, legH - 4);
      c.fillRect(36, legTop + 2, 8, legH - 6);
      c.fillStyle = shoe;
      c.fillRect(17, legTop + legH - 4, 10, 4);
      c.fillRect(34, legTop + legH - 6, 10, 4);
    } else if (legState === 2) {
      // Stride B: right leg forward
      c.fillStyle = suitPri;
      c.fillRect(21, legTop + 2, 8, legH - 6);
      c.fillRect(34, legTop, 8, legH - 4);
      c.fillStyle = shoe;
      c.fillRect(19, legTop + legH - 6, 10, 4);
      c.fillRect(32, legTop + legH - 4, 10, 4);
    } else if (legState === 3) {
      // Jump tuck: knees up
      const tuck = Math.floor(legH * 0.4);
      c.fillStyle = suitPri;
      c.fillRect(20, legTop + tuck, 9, legH - tuck - 2);
      c.fillRect(34, legTop + tuck, 9, legH - tuck - 2);
      c.fillStyle = shoe;
      c.fillRect(19, legTop + legH - 2, 10, 3);
      c.fillRect(34, legTop + legH - 2, 10, 3);
    } else if (legState === 4) {
      // Land: legs wide
      c.fillStyle = suitPri;
      c.fillRect(18, legTop, 9, legH - 4);
      c.fillRect(36, legTop, 9, legH - 4);
      c.fillStyle = shoe;
      c.fillRect(16, legTop + legH - 4, 11, 4);
      c.fillRect(34, legTop + legH - 4, 11, 4);
    } else if (legState === 6) {
      c.fillStyle = suitPri;
      c.fillRect(22, legTop + 3, 8, legH - 7);
      c.fillRect(33, legTop + 3, 9, 6);
      c.fillRect(41, legTop + 7, 12, 5);
      c.fillStyle = shoe;
      c.fillRect(20, legTop + legH - 4, 10, 4);
      c.fillRect(52, legTop + 7, 10, 4);
    } else if (legState === 5) {
      // Crouch: short bent legs
      c.fillStyle = suitPri;
      c.fillRect(22, legTop, 8, legH - 2);
      c.fillRect(34, legTop, 8, legH - 2);
      c.fillStyle = shoe;
      c.fillRect(20, legTop + legH - 2, 10, 3);
      c.fillRect(34, legTop + legH - 2, 10, 3);
    }

    // === TORSO (suit) ===
    c.fillStyle = suitPri;
    c.fillRect(20, torsoTop, 24, torsoH);
    // Suit lapels (darker)
    c.fillStyle = suitSec;
    c.fillRect(20, torsoTop, 4, torsoH);
    c.fillRect(40, torsoTop, 4, torsoH);
    // Shirt/tie visible in center
    c.fillStyle = shirt;
    c.fillRect(28, torsoTop, 8, 4); // collar area
    // Tie
    c.fillStyle = tiePri;
    c.fillRect(30, torsoTop + 3, 4, Math.floor(torsoH * 0.6));
    c.fillStyle = tieSec;
    c.fillRect(31, torsoTop + 3, 2, Math.floor(torsoH * 0.6));
    addSuitSpriteDetails(c, {
      torsoLeft: 20,
      torsoTop,
      torsoWidth: 24,
      torsoH,
      suitSec,
      shirt,
      shirtX: 28,
      shirtW: 8,
      accent: tiePri,
      tieX: 31
    });

    // === ARMS ===
    if (armState === 0) {
      // At sides
      c.fillStyle = suitPri;
      c.fillRect(14, torsoTop + 2, 6, torsoH - 4);  // left arm
      c.fillRect(44, torsoTop + 2, 6, torsoH - 4);  // right arm
      c.fillStyle = skinPri;
      c.fillRect(14, torsoTop + torsoH - 6, 6, 6);  // left hand
      c.fillRect(44, torsoTop + torsoH - 6, 6, 6);  // right hand
    } else if (armState === 1) {
      // Arms up (jump)
      c.fillStyle = suitPri;
      c.fillRect(12, torsoTop - 6, 6, torsoH - 2);  // left arm up
      c.fillRect(46, torsoTop - 6, 6, torsoH - 2);  // right arm up
      c.fillStyle = skinPri;
      c.fillRect(12, torsoTop - 10, 6, 6);
      c.fillRect(46, torsoTop - 10, 6, 6);
    } else if (armState === 2) {
      // Guard (block): arms crossed in front
      c.fillStyle = suitPri;
      c.fillRect(16, torsoTop + 2, 8, 6);   // left arm across
      c.fillRect(40, torsoTop + 2, 8, 6);   // right arm across
      c.fillStyle = skinPri;
      c.fillRect(24, torsoTop + 2, 8, 6);   // left fist in front
      c.fillRect(32, torsoTop + 2, 8, 6);   // right fist in front
    } else if (armState === 3) {
      // Punch: right arm extended forward (to the right)
      c.fillStyle = suitPri;
      c.fillRect(14, torsoTop + 2, 6, torsoH - 6);  // left arm
      c.fillStyle = skinPri;
      c.fillRect(14, torsoTop + torsoH - 8, 6, 6);   // left hand
      // Right arm extended
      c.fillStyle = suitPri;
      c.fillRect(44, torsoTop + 4, 14, 6);  // extended arm
      c.fillStyle = skinPri;
      c.fillRect(56, torsoTop + 4, 8, 6);   // fist (extends past body)
    } else if (armState === 4) {
      // Windup: both arms pulled back/up
      c.fillStyle = suitPri;
      c.fillRect(10, torsoTop - 4, 6, torsoH);      // left arm pulled back
      c.fillRect(10, torsoTop, 12, 6);               // horizontal pull
      c.fillStyle = skinPri;
      c.fillRect(10, torsoTop - 8, 6, 6);            // left fist
      c.fillStyle = suitPri;
      c.fillRect(44, torsoTop - 2, 6, torsoH - 2);  // right arm
      c.fillStyle = skinPri;
      c.fillRect(44, torsoTop - 6, 6, 6);            // right fist
    } else if (armState === 5) {
      // Power swing: big forward arc
      c.fillStyle = suitPri;
      c.fillRect(14, torsoTop + 2, 6, torsoH - 4);  // left arm
      c.fillStyle = skinPri;
      c.fillRect(14, torsoTop + torsoH - 6, 6, 6);
      // Right arm wide swing
      c.fillStyle = suitPri;
      c.fillRect(44, torsoTop, 16, 7);               // extended upper arm
      c.fillRect(56, torsoTop + 6, 8, 6);            // forearm angled
      c.fillStyle = skinPri;

  function drawClintonBase(c, offsetY, crouchFactor, armState, legState) {
    // armState: 0=sides, 1=up, 2=guard, 3=punch, 4=windup, 5=swing, 6=recoil
    // legState: 0=stand, 1=stride-a, 2=stride-b, 3=jump-tuck, 4=land, 5=crouch, 6=kick
    const oy = offsetY || 0;
    const cf = crouchFactor || 0;

    const bodyBot = 56;
    const standH = 48;
    const crouchH = 30;
    const bodyH = Math.floor(standH - (standH - crouchH) * cf);
    const bodyTop = bodyBot - bodyH + oy;

    const headH = Math.floor(bodyH * 0.29);
    const torsoH = Math.floor(bodyH * 0.35);
    const legH = bodyH - headH - torsoH;

    const headTop = bodyTop;
    const torsoTop = headTop + headH;
    const legTop = torsoTop + torsoH;

    // Clinton color palette
    const skinPri = '#FFB888';
    const skinSec = '#E89968';
    const suitPri = '#0D1A3A';
    const suitSec = '#060D20';
    const tiePri = '#2244AA';
    const tieSec = '#112288';
    const hairCol = '#E0E0E0';
    const shoe = '#1A1A1A';
    const outline = '#000000';

    // === SHOES / LEGS ===
    if (legState === 0) {
      c.fillStyle = suitPri;
      c.fillRect(22, legTop, 8, legH - 4);
      c.fillRect(34, legTop, 8, legH - 4);
      c.fillStyle = shoe;
      c.fillRect(20, legTop + legH - 4, 10, 4);
      c.fillRect(32, legTop + legH - 4, 10, 4);
    } else if (legState === 1) {
      c.fillStyle = suitPri;
      c.fillRect(19, legTop, 8, legH - 4);
      c.fillRect(35, legTop + 2, 8, legH - 6);
      c.fillStyle = shoe;
      c.fillRect(17, legTop + legH - 4, 10, 4);
      c.fillRect(33, legTop + legH - 6, 10, 4);
    } else if (legState === 2) {
      c.fillStyle = suitPri;
      c.fillRect(21, legTop + 2, 8, legH - 6);
      c.fillRect(35, legTop, 8, legH - 4);
      c.fillStyle = shoe;
      c.fillRect(19, legTop + legH - 6, 10, 4);
      c.fillRect(33, legTop + legH - 4, 10, 4);
    } else if (legState === 3) {
      const tuck = Math.floor(legH * 0.4);
      c.fillStyle = suitPri;
      c.fillRect(20, legTop + tuck, 9, legH - tuck - 2);
      c.fillRect(34, legTop + tuck, 9, legH - tuck - 2);
      c.fillStyle = shoe;
      c.fillRect(19, legTop + legH - 2, 10, 3);
      c.fillRect(33, legTop + legH - 2, 10, 3);
    } else if (legState === 4) {
      c.fillStyle = suitPri;
      c.fillRect(18, legTop, 9, legH - 4);
      c.fillRect(35, legTop, 9, legH - 4);
      c.fillStyle = shoe;
      c.fillRect(16, legTop + legH - 4, 11, 4);
      c.fillRect(33, legTop + legH - 4, 11, 4);
    } else if (legState === 6) {
      c.fillStyle = suitPri;
      c.fillRect(22, legTop + 3, 8, legH - 7);
      c.fillRect(33, legTop + 3, 9, 6);
      c.fillRect(41, legTop + 8, 12, 5);
      c.fillStyle = shoe;
      c.fillRect(20, legTop + legH - 4, 10, 4);
      c.fillRect(52, legTop + 8, 10, 4);
    } else if (legState === 5) {
      c.fillStyle = suitPri;
      c.fillRect(22, legTop, 8, legH - 2);
      c.fillRect(34, legTop, 8, legH - 2);
      c.fillStyle = shoe;
      c.fillRect(20, legTop + legH - 2, 10, 3);
      c.fillRect(32, legTop + legH - 2, 10, 3);
    }

    // === TORSO (suit) === (22px wide)
    c.fillStyle = suitPri;
    c.fillRect(21, torsoTop, 22, torsoH);
    // Suit lapels
    c.fillStyle = suitSec;
    c.fillRect(21, torsoTop, 4, torsoH);
    c.fillRect(39, torsoTop, 4, torsoH);
    // Shirt
    c.fillStyle = '#FFFFFF';
    c.fillRect(29, torsoTop, 6, 4);
    // Tie (blue)
    c.fillStyle = tiePri;
    c.fillRect(30, torsoTop + 3, 4, Math.floor(torsoH * 0.6));
    c.fillStyle = tieSec;
    c.fillRect(31, torsoTop + 3, 2, Math.floor(torsoH * 0.6));
    addSuitSpriteDetails(c, {
      torsoLeft: 21,
      torsoTop,
      torsoWidth: 22,
      torsoH,
      suitSec,
      shirt: '#FFFFFF',
      shirtX: 29,
      shirtW: 6,
      accent: tiePri,
      tieX: 31
    });

    // === ARMS ===
    if (armState === 0) {
      c.fillStyle = suitPri;
      c.fillRect(14, torsoTop + 2, 6, torsoH - 4);
      c.fillRect(44, torsoTop + 2, 6, torsoH - 4);
      c.fillStyle = skinPri;
      c.fillRect(14, torsoTop + torsoH - 6, 6, 6);
      c.fillRect(44, torsoTop + torsoH - 6, 6, 6);
    } else if (armState === 1) {
      c.fillStyle = suitPri;
      c.fillRect(12, torsoTop - 6, 6, torsoH - 2);
      c.fillRect(46, torsoTop - 6, 6, torsoH - 2);
      c.fillStyle = skinPri;
      c.fillRect(12, torsoTop - 10, 6, 6);
      c.fillRect(46, torsoTop - 10, 6, 6);
    } else if (armState === 2) {
      c.fillStyle = suitPri;
      c.fillRect(16, torsoTop + 2, 8, 6);
      c.fillRect(40, torsoTop + 2, 8, 6);
      c.fillStyle = skinPri;
      c.fillRect(24, torsoTop + 2, 6, 6);
      c.fillRect(34, torsoTop + 2, 6, 6);
    } else if (armState === 3) {
      c.fillStyle = suitPri;
      c.fillRect(14, torsoTop + 2, 6, torsoH - 6);
      c.fillStyle = skinPri;
      c.fillRect(14, torsoTop + torsoH - 8, 6, 6);
      c.fillStyle = suitPri;
      c.fillRect(43, torsoTop + 4, 12, 6);
      c.fillStyle = skinPri;
      c.fillRect(53, torsoTop + 4, 7, 6);
    } else if (armState === 4) {
      c.fillStyle = suitPri;
      c.fillRect(10, torsoTop - 4, 6, torsoH);
      c.fillRect(10, torsoTop, 12, 6);
      c.fillStyle = skinPri;
      c.fillRect(10, torsoTop - 8, 6, 6);
      c.fillStyle = suitPri;
      c.fillRect(44, torsoTop - 2, 6, torsoH - 2);
      c.fillStyle = skinPri;
      c.fillRect(44, torsoTop - 6, 6, 6);
    } else if (armState === 5) {
      c.fillStyle = suitPri;
      c.fillRect(14, torsoTop + 2, 6, torsoH - 4);
      c.fillStyle = skinPri;
      c.fillRect(14, torsoTop + torsoH - 6, 6, 6);
      c.fillStyle = suitPri;
      c.fillRect(43, torsoTop, 14, 7);
      c.fillRect(55, torsoTop + 6, 8, 6);
      c.fillStyle = skinPri;
      c.fillRect(57, torsoTop + 10, 7, 6);
    } else if (armState === 6) {
      c.fillStyle = suitPri;
      c.fillRect(8, torsoTop, 8, 6);
      c.fillRect(48, torsoTop, 8, 6);
      c.fillStyle = skinPri;
      c.fillRect(6, torsoTop, 6, 6);
      c.fillRect(50, torsoTop, 6, 6);
    }

    // === HEAD === (wide jaw â€” headW+2 on lower portion)
    const headCX = 32;
    const headW = 18;
    c.fillStyle = outline;
    c.fillRect(headCX - headW/2 - 1, headTop - 1, headW + 2, headH + 2);

    c.fillStyle = skinPri;
    c.fillRect(headCX - headW/2, headTop, headW, headH);
    // Wide jaw area
    c.fillRect(headCX - headW/2 - 1, headTop + Math.floor(headH * 0.5), headW + 2, Math.floor(headH * 0.5));
    c.fillStyle = skinSec;
    c.fillRect(headCX + 2, headTop, headW/2 - 1, headH);

    // HAIR: silver, swept back (wider at back of head)
    c.fillStyle = hairCol;
    c.fillRect(headCX - headW/2 - 2, headTop - 3, headW + 4, 5);
    c.fillRect(headCX - headW/2 - 3, headTop - 1, 4, 4); // swept back left
    c.fillRect(headCX + headW/2 - 1, headTop - 2, 5, 5); // swept back right
    c.fillStyle = '#B8B8B8';
    c.fillRect(headCX - headW/2, headTop - 3, headW, 2);

    // EYES
    c.fillStyle = '#FFFFFF';
    c.fillRect(headCX - 6, headTop + 4, 5, 3);
    c.fillRect(headCX + 1, headTop + 4, 5, 3);
    c.fillStyle = '#3A2000';
    c.fillRect(headCX - 5, headTop + 5, 3, 2);
    c.fillRect(headCX + 2, headTop + 5, 3, 2);

    // Nose
    c.fillStyle = skinSec;
    c.fillRect(headCX - 1, headTop + 7, 3, 3);

    // Mouth (wide charismatic smile)
    c.fillStyle = '#CC8866';
    c.fillRect(headCX - 5, headTop + headH - 4, 11, 2);
    c.fillStyle = '#FFFFFF';
    c.fillRect(headCX - 3, headTop + headH - 3, 7, 1);
    addFaceSpriteDetails(c, {
      headCX,
      headTop,
      headH,
      browColor: '#B8B8B8',
      skinSec,
      mouthColor: '#9A654C'
    });
  }

    return function(c) {

      } else if (def.name === 'Clinton') {

        ctx.fillStyle = '#E89968';

        // Eyes

        ctx.fillRect(12, 14, 5, 3);

        ctx.fillRect(22, 15, 3, 2);

      deepenSpriteContrast(oc);
      addOutlineToCanvas(oc, [20, 24, 34, 255]);
      portraitCache[def.name] = oc;
    }
  }

  // ===== FIGHTER RUNTIME FACTORY =====
  function createFighter(def, x, facing) {
    return {
      def: def,
      x: x,
      y: GROUND_Y,
      vx: 0,
      vy: 0,
      facing: facing,
      state: 'idle',
      prevState: 'idle',
      stateFrame: 0,
      currentFrame: 0,
      attackPhase: null,
      currentAttackType: null,
      comboCount: 0,
      health: def.stats.health,
      maxHealth: def.stats.health,
      isBlocking: false,
      hitThisAttack: false,
      hitstunRemaining: 0,
      knockedDown: false,
      flashFrames: 0,
      _chargeFrames: 0,     // per-fighter charge tracking
      _prevAttack: false,
      guardMeter: 100,        // 0-100
      guardBreakStun: 0,      // frames remaining frozen in guard break
      ultimateMeter: 0,       // 0-100
      ultimateActive: false,  // true while ultimate animation is playing
      ultimateFrame: 0,       // current frame of ultimate animation
      airHits: 0,
      juggleGravityMul: 1.0,
      isAirborne: false,
      rotation: 0,
      rotationVel: 0,
      impactTilt: 0,
      impactOffsetX: 0,
      impactOffsetY: 0,
      impactScaleX: 1,
      impactScaleY: 1,
      ragdoll: false,
      bounceCount: 0,
      guardMax: 100,
      guardRegenMul: 1,
      ultimateGainMul: 1,
      openingUltimateMeter: 0,
      speedMul: 1,
      accelMul: 1,
      jumpMul: 1,
      gravityMul: 1,
      powerMul: 1,
      reachMul: 1,
      knockbackMul: 1,
      launchMul: 1,
      comboHitsLanded: 0,
      animOffsetX: 0,
      animOffsetY: 0,
      animScaleX: 1,
      animScaleY: 1,
      animRotation: 0
    };
  }

  // ===== FIGHTER STATE MACHINE =====
  function transitionFighterState(fighter, newState, forceRestart) {
    if (fighter.state === newState && !forceRestart) return;
    const oldState = fighter.state;
    if (FIGHTER_STATES[oldState] && FIGHTER_STATES[oldState].exit) {
      FIGHTER_STATES[oldState].exit(fighter);
    }
    fighter.prevState = oldState;
    fighter.state = newState;
    fighter.stateFrame = 0;
    if (FIGHTER_STATES[newState] && FIGHTER_STATES[newState].enter) {
      FIGHTER_STATES[newState].enter(fighter);
    }
  }

  const FIGHTER_STATES = {
    idle: {
      enter(fighter) {
        fighter.currentFrame = 0;
        fighter.attackPhase = null;
        fighter.currentAttackType = null;
        fighter.isBlocking = false;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Decelerate with ground friction
        const friction = fighter.def.stats.friction || 0.80;
        fighter.vx *= friction;
        fighter.x = clampToArena(fighter.x + fighter.vx);
        if (fighter.stateFrame % 15 === 0) {
          fighter.currentFrame = (fighter.currentFrame + 1) % 4;
        }
        if (input.up) return 'jumpRise';
        if (input.down) return 'crouch';
        if (input.right) {
          return fighter.facing === 1 ? 'walkForward' : 'walkBack';
        }
        if (input.left) {
          return fighter.facing === -1 ? 'walkForward' : 'walkBack';
        }
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        if (input.block) return 'block';
        return null;
      },
      exit(fighter) {}
    },

    walkForward: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        const spd = getFighterStat(fighter, 'walkSpeed');
        const accel = getFighterStat(fighter, 'accel') || 0.8;
        // Accelerate toward max walk speed in facing direction
        fighter.vx += accel * fighter.facing;
        if (fighter.facing === 1) fighter.vx = Math.min(fighter.vx, spd);
        else fighter.vx = Math.max(fighter.vx, -spd);
        fighter.x = clampToArena(fighter.x + fighter.vx);
        if (fighter.stateFrame % 8 === 0) {
          fighter.currentFrame = (fighter.currentFrame + 1) % 4;
        }
        const movingForward = (fighter.facing === 1 && input.right) ||
                              (fighter.facing === -1 && input.left);
        if (!movingForward) return 'idle';
        if (input.up) return 'jumpRise';
        if (input.down) return 'crouch';
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        if (input.block) return 'block';
        return null;
      },
      exit(fighter) {}
    },

    walkBack: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        const spd = getFighterStat(fighter, 'walkSpeed');
        const accel = getFighterStat(fighter, 'accel') || 0.8;
        // Accelerate toward max walk speed in opposite of facing direction
        fighter.vx -= accel * fighter.facing;
        if (fighter.facing === 1) fighter.vx = Math.max(fighter.vx, -spd);
        else fighter.vx = Math.min(fighter.vx, spd);
        fighter.x = clampToArena(fighter.x + fighter.vx);
        if (fighter.stateFrame % 8 === 0) {
          fighter.currentFrame = (fighter.currentFrame + 1) % 4;
        }
        const movingBack = (fighter.facing === 1 && input.left) ||
                           (fighter.facing === -1 && input.right);
        if (!movingBack) return 'idle';
        if (input.up) return 'jumpRise';
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        if (input.block) return 'block';
        return null;
      },
      exit(fighter) {}
    },

    jumpRise: {
      enter(fighter) {
        fighter.vy = getFighterStat(fighter, 'jumpForce');
        fighter.currentFrame = 0;
        // vx carries from ground â€” no reset
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        fighter.vy += getFighterStat(fighter, 'gravity') * (fighter.juggleGravityMul || 1.0);
        fighter.y += fighter.vy;
        // Air steering: 40% of ground accel, very low drag
        const spd = getFighterStat(fighter, 'walkSpeed');
        const airAccel = (getFighterStat(fighter, 'accel') || 0.8) * 0.4;
        if (input.right) fighter.vx = Math.min(fighter.vx + airAccel, spd);
        else if (input.left) fighter.vx = Math.max(fighter.vx - airAccel, -spd);
        else fighter.vx *= 0.99;
        fighter.x = clampToArena(fighter.x + fighter.vx);
        fighter.currentFrame = Math.min(3, Math.floor(fighter.stateFrame / 4));
        if (fighter.vy >= 0) return 'jumpFall';
        return null;
      },
      exit(fighter) {}
    },

    jumpFall: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        fighter.vy += getFighterStat(fighter, 'gravity') * (fighter.juggleGravityMul || 1.0);
        fighter.y += fighter.vy;
        // Air steering
        const spd = getFighterStat(fighter, 'walkSpeed');
        const airAccel = (getFighterStat(fighter, 'accel') || 0.8) * 0.4;
        if (input.right) fighter.vx = Math.min(fighter.vx + airAccel, spd);
        else if (input.left) fighter.vx = Math.max(fighter.vx - airAccel, -spd);
        else fighter.vx *= 0.99;
        fighter.x = clampToArena(fighter.x + fighter.vx);
        fighter.currentFrame = Math.min(3, Math.floor(fighter.stateFrame / 4));
        if (fighter.y >= GROUND_Y) {
          fighter.y = GROUND_Y;
          fighter.vy = 0;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {}
    },

    crouch: {
      enter(fighter) {
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Animate to frame 3 and hold
        if (fighter.currentFrame < 3 && fighter.stateFrame % 3 === 0) {
          fighter.currentFrame++;
        }
        if (!input.down) return 'idle';
        const attackType = updateFighterCharge(fighter, input);
        if (attackType === 'fast') return 'fastAttack';
        if (attackType === 'power') return 'powerAttack';
        return null;
      },
      exit(fighter) {}
    },

    fastAttack: {
      enter(fighter) {
        fighter.attackPhase = 'startup';
        fighter.currentAttackType = 'fast';
        fighter.hitThisAttack = false;
        fighter.comboCount = (fighter.comboCount || 0) + 1;
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        const fd = fighter.def.attacks.fast;
        const total = fd.startup + fd.active + fd.recovery;

        if (fighter.stateFrame <= fd.startup) {
          fighter.attackPhase = 'startup';
          fighter.x = clampToArena(fighter.x - fighter.facing * 0.5);
          fighter.currentFrame = Math.min(
            1,
            Math.floor(((fighter.stateFrame - 1) / Math.max(1, fd.startup)) * 2)
          );
        } else if (fighter.stateFrame <= fd.startup + fd.active) {
          fighter.attackPhase = 'active';
          const activeFrame = fighter.stateFrame - fd.startup - 1;
          fighter.x = clampToArena(fighter.x + fighter.facing * 1.55);
          fighter.currentFrame = 2 + Math.min(
            1,
            Math.floor((activeFrame / Math.max(1, fd.active)) * 2)
          );
        } else if (fighter.stateFrame <= total) {
          fighter.attackPhase = 'recovery';
          const recoveryFrame = fighter.stateFrame - fd.startup - fd.active - 1;
          fighter.currentFrame = 4 + Math.min(
            1,
            Math.floor((recoveryFrame / Math.max(1, fd.recovery)) * 2)
          );
          const chargeRelease = updateFighterCharge(fighter, input);
          if (chargeRelease === 'power') {
            fighter.comboCount = 0;
            return 'powerAttack';
          }
          // Check for combo chain during late recovery
          if (fighter.stateFrame >= fd.startup + fd.active + Math.ceil(fd.recovery * 0.35) &&
              input.attackBuffered && fighter.comboCount < fd.maxChain) {
            return 'fastAttack';
          }
        } else {
          fighter.attackPhase = null;
          fighter.comboCount = 0;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.attackPhase = null;
        fighter.hitThisAttack = false;
      }
    },

    powerAttack: {
      enter(fighter) {
        fighter.attackPhase = 'startup';
        fighter.currentAttackType = 'power';
        fighter.hitThisAttack = false;
        fighter.comboCount = 0;
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        const fd = fighter.def.attacks.power;
        const total = fd.startup + fd.active + fd.recovery;

        if (fighter.stateFrame <= fd.startup) {
          fighter.attackPhase = 'startup';
          fighter.x = clampToArena(fighter.x - fighter.facing * 0.7);
          fighter.currentFrame = Math.min(
            2,
            Math.floor(((fighter.stateFrame - 1) / Math.max(1, fd.startup)) * 3)
          );
        } else if (fighter.stateFrame <= fd.startup + fd.active) {
          fighter.attackPhase = 'active';
          const activeFrame = fighter.stateFrame - fd.startup - 1;
          fighter.x = clampToArena(fighter.x + fighter.facing * 2.35);
          fighter.currentFrame = 3 + Math.min(
            1,
            Math.floor((activeFrame / Math.max(1, fd.active)) * 2)
          );
        } else if (fighter.stateFrame <= total) {
          fighter.attackPhase = 'recovery';
          fighter.currentFrame = 5;
        } else {
          fighter.attackPhase = null;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.attackPhase = null;
        fighter.hitThisAttack = false;
      }
    },

    block: {
      enter(fighter) {
        fighter.isBlocking = true;
        fighter.currentFrame = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        // Animate to frame 3 and hold
        if (fighter.currentFrame < 3 && fighter.stateFrame % 2 === 0) {
          fighter.currentFrame++;
        }
        if (!input.block) {
          fighter.isBlocking = false;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.isBlocking = false;
      }
    },

    hitstun: {
      enter(fighter) {
        fighter.currentFrame = 0;
        fighter.comboCount = 0;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;
        fighter.currentFrame = Math.min(3, Math.floor(fighter.stateFrame / 3));
        // Slide: apply vx with friction so knockback feels physical
        fighter.vx *= 0.85;
        fighter.x = clampToArena(fighter.x + fighter.vx);
        fighter.rotation += (clamp(fighter.vx * 0.028, -0.18, 0.18) - fighter.rotation) * 0.34;
        if (fighter.hitstunRemaining > 0) {
          fighter.hitstunRemaining--;
          return null;
        }
        return 'idle';
      },
      exit(fighter) {
        fighter.hitstunRemaining = 0;
        fighter.rotation *= 0.35;
      }
    },

    knockdown: {
      enter(fighter) {
        fighter.currentFrame = 0;
        fighter.knockedDown = true;
        fighter.comboCount = 0;
        fighter.ragdoll = true;
        fighter.bounceCount = 0;
        // rotationVel set by resolveHit based on hit direction
        if (fighter.rotationVel === 0) fighter.rotationVel = (Math.random() > 0.5 ? 1 : -1) * 0.12;
      },
      update(fighter, input, opponent) {
        fighter.stateFrame++;

        if (fighter.ragdoll) {
          // Full ragdoll: gravity + horizontal momentum + spin
          fighter.vy += getFighterStat(fighter, 'gravity') * 1.3;
          fighter.y += fighter.vy;
          fighter.x = clampToArena(fighter.x + fighter.vx);
          fighter.rotation += fighter.rotationVel;

          // Wall bounce
          if (fighter.x <= getArenaLeft() + 2 || fighter.x >= getArenaRight() - 2) {
            fighter.vx *= -0.45;
            fighter.rotationVel *= -0.7;
            fighter.x = clamp(fighter.x, getArenaLeft() + 2, getArenaRight() - 2);
          }

          // Ground bounce / landing
          if (fighter.y >= GROUND_Y) {
            fighter.y = GROUND_Y;
            fighter.bounceCount++;
            const bounceStrength = Math.abs(fighter.vy);
            if (bounceStrength > 2.5 && fighter.bounceCount < 3) {
              // Bounce: reduce energy
              fighter.vy *= -0.38;
              fighter.vx *= 0.65;
              fighter.rotationVel *= 0.55;
              playSFX('punch');
            } else {
              // Stop bouncing â€” slide to rest
              fighter.vy = 0;
              fighter.ragdoll = false;
            }
          }
        } else {
          // Grounded slide after ragdoll: decelerate with friction
          fighter.vx *= 0.80;
          fighter.x = clampToArena(fighter.x + fighter.vx);
          fighter.rotationVel *= 0.88;
          fighter.rotation += fighter.rotationVel;
        }

        // Hold last anim frame while down
        if (fighter.currentFrame < 3 && fighter.stateFrame % 10 === 0) {
          fighter.currentFrame++;
        }

        // Get up after enough time, only when stopped and alive
        const canGetUp = fighter.stateFrame >= 80 && !fighter.ragdoll && Math.abs(fighter.vx) < 0.3;
        if (canGetUp && fighter.health > 0) {
          fighter.knockedDown = false;
          return 'idle';
        }
        return null;
      },
      exit(fighter) {
        fighter.knockedDown = false;
        fighter.ragdoll = false;
        fighter.rotation = 0;
        fighter.rotationVel = 0;
        fighter.vx = 0;
        fighter.bounceCount = 0;
      }
    }
  };

  // Per-fighter charge detection (each fighter has independent charge tracking)
  function updateFighterCharge(fighter, input) {
    const attackNow = input.attack;
    const wasAttack = fighter._prevAttack;
    fighter._prevAttack = attackNow;

    if (attackNow) {
      fighter._chargeFrames++;
      return null;
    } else {
      if (wasAttack) {
        // Key released
        const frames = fighter._chargeFrames;
        fighter._chargeFrames = 0;
        if (frames >= CHARGE_THRESHOLD) return 'power';
        if (frames > 0) return 'fast';
      } else {
        fighter._chargeFrames = 0;
      }
      return null;
    }
  }

  function updateFighterPresentation(fighter) {
    let targetX = 0;
    let targetY = 0;
    let targetScaleX = 1;
    let targetScaleY = 1;
    let targetRotation = 0;
    const stride = Math.sin(fighter.stateFrame * 0.75 + fighter.x * 0.03);
    const walkSpeed = Math.max(0.01, getFighterStat(fighter, 'walkSpeed'));
    const walkRatio = clamp(Math.abs(fighter.vx) / walkSpeed, 0, 1);

    if (fighter.state === 'idle') {
      targetY = Math.sin(frameCounter * 0.12 + fighter.x * 0.02) * 1.2;
      targetScaleX = 1.01;
      targetScaleY = 0.99;
    } else if (fighter.state === 'walkForward' || fighter.state === 'walkBack') {
      targetY = -Math.abs(stride) * (1.6 + walkRatio * 1.4);
      targetX = stride * fighter.facing * 1.4 * walkRatio;
      targetRotation = clamp(fighter.vx * 0.028, -0.1, 0.1);
      targetScaleX = 1 + walkRatio * 0.04;
      targetScaleY = 1 - walkRatio * 0.05;
    } else if (fighter.state === 'jumpRise') {
      targetY = -2.5;
      targetScaleX = 0.95;
      targetScaleY = 1.08;
      targetRotation = clamp(fighter.vx * 0.014, -0.08, 0.08);
    } else if (fighter.state === 'jumpFall') {
      targetY = 1.5;
      targetScaleX = 1.06;
      targetScaleY = 0.92;
      targetRotation = clamp(fighter.vx * 0.01, -0.07, 0.07);
    } else if (fighter.state === 'crouch') {
      targetY = 2;
      targetScaleX = 1.04;
      targetScaleY = 0.9;
    } else if (fighter.state === 'fastAttack') {
      const atk = fighter.def.attacks.fast;
      const startupEnd = atk.startup;
      const activeEnd = atk.startup + atk.active;
      if (fighter.stateFrame <= startupEnd) {
        targetX = -fighter.facing * 2.5;
        targetRotation = -fighter.facing * 0.05;
        targetScaleX = 0.98;
        targetScaleY = 1.04;
      } else if (fighter.stateFrame <= activeEnd) {
        targetX = fighter.facing * 5.5;
        targetY = -1;
        targetRotation = fighter.facing * 0.1;
        targetScaleX = 1.08;
        targetScaleY = 0.92;
      } else {
        targetX = fighter.facing * 1.5;
        targetRotation = fighter.facing * 0.03;
        targetScaleX = 1.02;
        targetScaleY = 0.98;
      }
    } else if (fighter.state === 'powerAttack') {
      const atk = fighter.def.attacks.power;
      const startupEnd = atk.startup;
      const activeEnd = atk.startup + atk.active;
      if (fighter.stateFrame <= startupEnd) {
        targetX = -fighter.facing * 4;
        targetRotation = -fighter.facing * 0.08;
        targetScaleX = 0.96;
        targetScaleY = 1.08;
      } else if (fighter.stateFrame <= activeEnd) {
        targetX = fighter.facing * 8;
        targetY = -2;
        targetRotation = fighter.facing * 0.16;
        targetScaleX = 1.14;
        targetScaleY = 0.86;
      } else {
        targetX = fighter.facing * 2.4;
        targetRotation = fighter.facing * 0.05;
        targetScaleX = 1.04;
        targetScaleY = 0.96;
      }
    } else if (fighter.state === 'block') {
      targetX = -fighter.facing * 1.8;
      targetRotation = -fighter.facing * 0.04;
      targetScaleX = 1.02;
      targetScaleY = 0.97;
    } else if (fighter.state === 'hitstun') {
      targetX = -fighter.facing * 1.2;
      targetRotation = clamp(fighter.vx * 0.02, -0.12, 0.12);
      targetScaleX = 1.03;
      targetScaleY = 0.96;
    }

    fighter.animOffsetX += (targetX - fighter.animOffsetX) * 0.28;
    fighter.animOffsetY += (targetY - fighter.animOffsetY) * 0.28;
    fighter.animScaleX += (targetScaleX - fighter.animScaleX) * 0.24;
    fighter.animScaleY += (targetScaleY - fighter.animScaleY) * 0.24;
    fighter.animRotation += (targetRotation - fighter.animRotation) * 0.22;
    if (Math.abs(fighter.animOffsetX) < 0.05) fighter.animOffsetX = 0;
    if (Math.abs(fighter.animOffsetY) < 0.05) fighter.animOffsetY = 0;
    if (Math.abs(fighter.animRotation) < 0.002) fighter.animRotation = 0;
    if (Math.abs(fighter.animScaleX - 1) < 0.003) fighter.animScaleX = 1;
    if (Math.abs(fighter.animScaleY - 1) < 0.003) fighter.animScaleY = 1;
  }

  // ===== FIGHTER UPDATE =====
  function updateFighter(fighter, input, opponent) {
    if (!fighter.ragdoll) {
      fighter.impactTilt *= 0.7;
      fighter.impactOffsetX *= 0.62;
      fighter.impactOffsetY *= 0.68;
      fighter.impactScaleX += (1 - fighter.impactScaleX) * 0.24;
      fighter.impactScaleY += (1 - fighter.impactScaleY) * 0.24;
      if (Math.abs(fighter.impactTilt) < 0.003) fighter.impactTilt = 0;
      if (Math.abs(fighter.impactOffsetX) < 0.08) fighter.impactOffsetX = 0;
      if (Math.abs(fighter.impactOffsetY) < 0.08) fighter.impactOffsetY = 0;
      if (Math.abs(fighter.impactScaleX - 1) < 0.01) fighter.impactScaleX = 1;
      if (Math.abs(fighter.impactScaleY - 1) < 0.01) fighter.impactScaleY = 1;
    }
    if (fighter.state !== 'knockdown') {
      fighter.rotationVel *= 0.72;
      fighter.rotation += fighter.rotationVel;
      if (fighter.state !== 'hitstun') fighter.rotation *= 0.76;
      if (Math.abs(fighter.rotation) < 0.002) fighter.rotation = 0;
      if (Math.abs(fighter.rotationVel) < 0.002) fighter.rotationVel = 0;
    }

    // Guard break stun: freeze fighter regardless of input
    if (fighter.guardBreakStun > 0) {
      fighter.guardBreakStun--;
      fighter.flashFrames = 2;
      updateFighterPresentation(fighter);
      return;
    }

    // Guard regeneration when not blocking
    if (!fighter.isBlocking && fighter.guardMeter < fighter.guardMax) {
      fighter.guardMeter = Math.min(fighter.guardMax, fighter.guardMeter + 0.4 * (fighter.guardRegenMul || 1));
    }

    // Airborne tracking
    fighter.isAirborne = (fighter.y < GROUND_Y - 2);
    // Reset juggle on landing
    if (!fighter.isAirborne) {
      fighter.airHits = 0;
      fighter.juggleGravityMul = 1.0;
    }

    // Ultimate activation
    if (input.ultimate && fighter.ultimateMeter >= 100 && !fighter.ultimateActive && fighter.guardBreakStun === 0) {
      fighter.ultimateActive = true;
      fighter.ultimateFrame = 0;
      fighter.ultimateMeter = 0;
      playSFX('ultimate');
    }
    // Ultimate animation tick
    if (fighter.ultimateActive) {
      fighter.ultimateFrame++;
      if (fighter.ultimateFrame >= 90) {
        fighter.ultimateActive = false;
        fighter.ultimateFrame = 0;
      }
      updateFighterPresentation(fighter);
      return;
    }

    // Superstate: hitstun check
    if (fighter.hitstunRemaining > 0 && fighter.state !== 'knockdown') {
      if (fighter.state !== 'hitstun') {
        transitionFighterState(fighter, 'hitstun');
      }
    }

    // Run current state's update
    const stateHandler = FIGHTER_STATES[fighter.state];
    if (!stateHandler) return;

    const next = stateHandler.update(fighter, input, opponent);
    if (next) {
      transitionFighterState(fighter, next, next === fighter.state);
    }

    // Auto-facing: face opponent when not attacking/hitstun/knockdown
    const noFaceLock = ['fastAttack','powerAttack','hitstun','knockdown'];
    if (!noFaceLock.includes(fighter.state)) {
      if (opponent) {
        fighter.facing = opponent.x > fighter.x ? 1 : -1;
      }
    }

    // Apply global gravity for states that don't manage their own physics
    const selfManaged = ['jumpRise', 'jumpFall', 'knockdown', 'hitstun'];
    if (fighter.y < GROUND_Y && !selfManaged.includes(fighter.state)) {
      fighter.vy += getFighterStat(fighter, 'gravity');
      fighter.y += fighter.vy;
      if (fighter.y >= GROUND_Y) {
        fighter.y = GROUND_Y;
        fighter.vy = 0;
        transitionFighterState(fighter, 'idle');
      }
    }

    updateFighterPresentation(fighter);
  }

  // ===== PUSH-BACK COLLISION (prevent overlap) =====
  function resolveFighterOverlap(f1, f2) {
    const hw1 = f1.def.stats.hurtboxWidth / 2;
    const hw2 = f2.def.stats.hurtboxWidth / 2;
    const dist = Math.abs(f1.x - f2.x);
    const minDist = hw1 + hw2 - 4; // allow slight overlap
    if (dist < minDist) {
      const push = (minDist - dist) / 2;
      if (f1.x < f2.x) {
        f1.x = clampToArena(f1.x - push);
        f2.x = clampToArena(f2.x + push);
      } else {
        f1.x = clampToArena(f1.x + push);
        f2.x = clampToArena(f2.x - push);
      }
    }
  }

  // ===== HIT DETECTION & COMBAT SYSTEM =====
  let hitStopFramesRemaining = 0;

  function applyHitStop(frames) {
    hitStopFramesRemaining = frames;
  }

  function checkHit(attacker, defender) {
    if (attacker.attackPhase !== 'active') return false;
    if (attacker.hitThisAttack) return false;

    const atk = attacker.def.attacks[attacker.currentAttackType];
    if (!atk) return false;

    // Hitbox in world space (accounting for facing and reach)
    const reachMul = getFighterStat(attacker, 'reach');
    let hbX;
    if (attacker.facing === 1) {
      hbX = attacker.x + atk.hitbox.x * reachMul;
    } else {
      hbX = attacker.x - atk.hitbox.x * reachMul - Math.floor(atk.hitbox.w * reachMul);
    }
    const hitbox = {
      x: Math.floor(hbX),
      y: Math.floor(attacker.y + atk.hitbox.y),
      w: Math.floor(atk.hitbox.w * reachMul),
      h: atk.hitbox.h
    };

    // Defender hurtbox
    const hurtH = (defender.state === 'crouch')
      ? defender.def.stats.crouchHurtboxHeight
      : defender.def.stats.hurtboxHeight;
    const hurtbox = {
      x: Math.floor(defender.x - defender.def.stats.hurtboxWidth / 2),
      y: Math.floor(defender.y - hurtH),
      w: defender.def.stats.hurtboxWidth,
      h: hurtH
    };

    return aabbOverlap(hitbox, hurtbox);
  }

  function resolveHit(attacker, defender) {
    // Mark so multi-hit doesn't fire on same attack
    attacker.hitThisAttack = true;

    const atk = attacker.def.attacks[attacker.currentAttackType];
    const continuingCombo = defender.hitstunRemaining > 0 || defender.state === 'hitstun' || defender.y < GROUND_Y - 2;
    const isPower = attacker.currentAttackType === 'power';
    const impactX = defender.x + attacker.facing * 12;
    const impactY = defender.y - (defender.state === 'crouch' ? 18 : 30);

    // Base damage with attacker power multiplier
    const baseDamage = Math.floor(atk.damage * getFighterStat(attacker, 'power'));

    // Juggle scaling: diminishing returns for air combos
    const juggleScale = Math.max(0.4, 1.0 - (defender.airHits * 0.10));
    const scaledDamage = Math.floor(baseDamage * juggleScale);

    // Apply block reduction or guard break
    let damage;
    if (defender.isBlocking) {
      damage = Math.floor(scaledDamage * 0.2);
      // Drain guard meter
      const guardDrain = Math.floor(scaledDamage * 0.5);
      defender.guardMeter = Math.max(0, defender.guardMeter - guardDrain);
      if (defender.guardMeter <= 0 && defender.guardBreakStun === 0) {
        // Guard break: stun + full damage
        defender.guardBreakStun = 60;
        defender.guardMeter = defender.guardMax;
        damage = scaledDamage; // full damage on guard break
        defender.isBlocking = false;
        applyHitStop(10);
        playSFX('guardBreak');
      }
    } else {
      damage = scaledDamage;
    }

    // Play hit SFX
    playSFX(defender.isBlocking ? 'block' : (isPower ? 'powerHit' : 'punch'));

    // Apply damage
    defender.health = Math.max(0, defender.health - damage);

    // Ultimate meter gain
    attacker.ultimateMeter = Math.min(100, attacker.ultimateMeter + Math.floor(damage * (attacker.ultimateGainMul || 1)));
    defender.ultimateMeter = Math.min(100, defender.ultimateMeter + Math.floor(damage * 0.5 * (defender.ultimateGainMul || 1)));

    // Hit stop
    applyHitStop(defender.isBlocking ? (isPower ? 5 : 3) : (isPower ? 7 : 4));

    // Flash defender white
    defender.flashFrames = 2;
    queueScreenShake(defender.isBlocking ? (isPower ? 2.4 : 1.6) : (isPower ? 5.4 : 3.1), defender.isBlocking ? 6 : 10);
    spawnImpactBurst(
      impactX,
      impactY,
      defender.isBlocking ? ['#F5F6FA', '#A7C5EB', '#6D89AE'] : (isPower ? ['#FFF3B0', '#FF9F5A', '#E4472D'] : ['#FFFFFF', '#FFD166', '#FF5D3D']),
      isPower || defender.isBlocking
    );

    // If not blocking: hitstun + velocity-based knockback
    if (!defender.isBlocking) {
      const isFast = attacker.currentAttackType === 'fast';
      const fastDef = attacker.def.attacks.fast;
      const comboEnder = isFast && fastDef && attacker.comboCount >= fastDef.maxChain && defender.y >= GROUND_Y && defender.airHits < 4;
      const airJuggle = isFast && defender.y < GROUND_Y && defender.airHits > 0 && defender.airHits < 4;
      attacker.comboHitsLanded = continuingCombo ? attacker.comboHitsLanded + 1 : 1;
      if (attacker.comboHitsLanded >= 2) {
        showComboBanner(buildComboBannerText(attacker.comboHitsLanded), isPower ? '#FFE08A' : '#FFFFFF');
        if (executiveRunState.active) {
          executiveRunState.bestCombo = Math.max(executiveRunState.bestCombo, attacker.comboHitsLanded);
        }
      }
      attacker.impactTilt = -attacker.facing * (isPower ? 0.08 : 0.04);
      attacker.impactOffsetX = -attacker.facing * (isPower ? 2.2 : 1.2);
      attacker.impactScaleX = isPower ? 1.08 : 1.04;
      attacker.impactScaleY = isPower ? 0.9 : 0.95;
      // Velocity knockback: scales with attack type
      const knockVx = (isPower ? 9 : 5.2) * attacker.facing * (attacker.knockbackMul || 1);
      defender.vx += knockVx;
      defender.impactTilt = attacker.facing * (isPower ? 0.16 : 0.09);
      defender.impactOffsetX = attacker.facing * (isPower ? 5 : 3);
      defender.impactOffsetY = isPower ? -2 : -1;
      defender.impactScaleX = isPower ? 1.13 : 1.08;
      defender.impactScaleY = isPower ? 0.88 : 0.93;
      defender.rotationVel += attacker.facing * (isPower ? 0.018 : 0.01);

      if (defender.health <= 0) {
        // KO ragdoll: strong launch
        defender.vx = (isPower ? 14 : 10) * attacker.facing * (attacker.knockbackMul || 1);
        defender.vy = (isPower ? -12 : -9) * (attacker.launchMul || 1);
        defender.rotationVel = attacker.facing * (0.12 + Math.random() * 0.1);
        transitionFighterState(defender, 'knockdown');
      } else {
        defender.hitstunRemaining = atk.hitstun;
        transitionFighterState(defender, 'hitstun');
        // Juggle launch: power attack
        if (isPower && defender.airHits < 4) {
          defender.vy = (-6.5 - (defender.airHits * 0.6)) * (attacker.launchMul || 1);
          defender.vx = 6 * attacker.facing * (attacker.knockbackMul || 1);
          defender.airHits++;
          defender.juggleGravityMul = 1.0 + defender.airHits * 0.15;
        } else if (comboEnder) {
          defender.vy = -5.5 * (attacker.launchMul || 1);
          defender.vx = 5 * attacker.facing * (attacker.knockbackMul || 1);
          defender.airHits = 1;
          defender.juggleGravityMul = 1.15;
        } else if (airJuggle) {
          defender.vy = -3.4 * (attacker.launchMul || 1);
          defender.vx = 3.6 * attacker.facing * (attacker.knockbackMul || 1);
          defender.airHits++;
          defender.juggleGravityMul = 1.0 + defender.airHits * 0.15;
        }
      }
    } else {
      // Stronger pushback on block with a visible recoil snap
      defender.vx += (isPower ? 3.8 : 2.5) * attacker.facing;
      attacker.vx -= (isPower ? 1.6 : 0.9) * attacker.facing;
      defender.impactTilt = attacker.facing * (isPower ? 0.1 : 0.06);
      defender.impactOffsetX = attacker.facing * (isPower ? 3 : 2);
      defender.impactScaleX = isPower ? 1.08 : 1.05;
      defender.impactScaleY = isPower ? 0.91 : 0.95;
      attacker.impactTilt = -attacker.facing * (isPower ? 0.05 : 0.03);
      attacker.impactOffsetX = -attacker.facing * (isPower ? 1.5 : 1);
      attacker.impactScaleX = 1.03;
      attacker.impactScaleY = 0.97;
      defender.rotationVel += attacker.facing * (isPower ? 0.01 : 0.006);
      attacker.comboHitsLanded = 0;
    }
  }

  function applyUltimateDamage(attacker, defender) {
    const ult = attacker.def.ultimate;
    if (!ult) return;
    const damage = ult.damage;
    defender.health = Math.max(0, defender.health - damage);
    attacker.ultimateMeter = Math.min(100, attacker.ultimateMeter + damage * 0.2 * (attacker.ultimateGainMul || 1));
    defender.flashFrames = 8;
    if (ult.stunFrames) {
      defender.hitstunRemaining = ult.stunFrames;
      if (defender.state !== 'knockdown') transitionFighterState(defender, 'hitstun');
    }
    if (defender.health <= 0 && defender.state !== 'knockdown') {
      transitionFighterState(defender, 'knockdown');
    }
    applyHitStop(8);
    queueScreenShake(5.2, 12);
    spawnImpactBurst(defender.x, defender.y - 34, ['#FFF7C2', '#89D0FF', '#FF6584'], true);
    showComboBanner(attacker.def.ultimate.name.toUpperCase(), '#FFE08A');
    playSFX('ultimate');
  }

  function checkWallBreak(attacker, defender) {
    if (stageTier !== 1) return;
    if (wallBreakActive) return;           // already breaking â€” don't re-trigger
    if (attacker.currentAttackType !== 'power') return;
    if (attacker.attackPhase !== 'active') return;
    if (attacker.hitThisAttack) return;    // only on the hit frame
    if (defender.isBlocking) return;
    const nearLeft  = defender.x <= getArenaLeft() + 8;
    const nearRight = defender.x >= getArenaRight() - 8;
    if (!nearLeft && !nearRight) return;
    wallBreakActive = true;
    wallBreakTimer = 30;
    wallBreakSide = nearLeft ? 'left' : 'right';
    wallBreakVictim = (defender === cpu) ? 'cpu' : 'player'; // track who got hit
    playSFX('wallBreak');
    applyHitStop(15);
  }

  // ===== CPU AI =====
  const AI_STATE = {
    APPROACH: 'approach',
    PRESSURE: 'pressure',
    BACK_OFF: 'backOff',
    PUNISH: 'punish'
  };

  const AI_DIFFICULTIES = [
    { name: 'EASY',   reactionFrames: 15, blockChance: 0.20, comboChance: 0.10, approachDist: 70, pressureDist: 50, retreatHealth: 0.2, jumpChance: 0.005, powerAttackChance: 0.05, ultimateChance: 0.02 },
    { name: 'NORMAL', reactionFrames: 9,  blockChance: 0.50, comboChance: 0.30, approachDist: 65, pressureDist: 45, retreatHealth: 0.3, jumpChance: 0.008, powerAttackChance: 0.10, ultimateChance: 0.05 },
    { name: 'HARD',   reactionFrames: 4,  blockChance: 0.80, comboChance: 0.60, approachDist: 55, pressureDist: 40, retreatHealth: 0.4, jumpChance: 0.012, powerAttackChance: 0.15, ultimateChance: 0.12 },
    { name: 'EXPERT', reactionFrames: 2,  blockChance: 0.94, comboChance: 0.82, approachDist: 50, pressureDist: 36, retreatHealth: 0.5, jumpChance: 0.015, powerAttackChance: 0.22, ultimateChance: 0.18 }
  ];

  function createAIController(difficulty) {
    const cfg = AI_DIFFICULTIES[difficulty];
    return {
      state: AI_STATE.APPROACH,
      decisionCooldown: 0,
      attackSequenceFrames: 0,
      attackHoldFrames: 0,
      comboHitsRemaining: 0,
      isHolding: false,
      retreatFrames: 0,

      generateInput(cpu, player, frameCount) {
        const input = {
          left: false, right: false, up: false, down: false,
          attack: false, block: false, ultimate: false, enter: false,
          attackPressed: false, attackReleased: false, attackBuffered: false
        };

        // Don't act when knocked down
        if (cpu.knockedDown || cpu.state === 'knockdown') return input;

        const dist = Math.abs(cpu.x - player.x);
        const facingPlayer = (player.x > cpu.x) ? 1 : -1;
        const playerAttacking = (player.state === 'fastAttack' || player.state === 'powerAttack');
        const playerInRecovery = (player.attackPhase === 'recovery');
        const cpuHealthPct = cpu.health / getFighterMaxHealth(cpu);

        // === ATTACK SEQUENCE HANDLING ===
        // If in an attack sequence (combo or power), handle frame-by-frame
        if (this.comboHitsRemaining > 0) {
          this.attackSequenceFrames++;
          // Pattern: 2 frames attack=true, 1 frame attack=false (triggers fast attack)
          const cyclePos = this.attackSequenceFrames % 3;
          if (cyclePos < 2) {
            input.attack = true;
            input.attackBuffered = true;
          } else {
            input.attack = false;
            this.comboHitsRemaining--;
          }
          // Edge detection for fighter charge system
          input.attackPressed = (input.attack && cyclePos === 0);
          input.attackReleased = (!input.attack && cyclePos === 2);
          return input;
        }
        if (this.isHolding) {
          this.attackHoldFrames++;
          if (this.attackHoldFrames < 14) {
            input.attack = true;  // Hold for 14 frames (> 12 threshold)
          } else {
            input.attack = false;  // Release triggers power attack
            input.attackReleased = true;
            this.isHolding = false;
            this.attackHoldFrames = 0;
          }
          return input;
        }

        // === DECISION COOLDOWN (reaction delay) ===
        this.decisionCooldown = Math.max(0, this.decisionCooldown - 1);
        if (this.decisionCooldown > 0) {
          // Between decisions: maintain movement based on current state
          if (this.state === AI_STATE.APPROACH) {
            if (facingPlayer === 1) input.right = true; else input.left = true;
          } else if (this.state === AI_STATE.BACK_OFF) {
            if (facingPlayer === 1) input.left = true; else input.right = true;
          }
          return input;
        }

        // === STATE TRANSITIONS ===
        this.decisionCooldown = cfg.reactionFrames;

        // Back-off: low health and close
        if (cpuHealthPct < cfg.retreatHealth && dist < cfg.approachDist) {
          this.state = AI_STATE.BACK_OFF;
          this.retreatFrames = 30 + Math.floor(Math.random() * 30);
        }
        // Punish: player in recovery and close enough
        else if (playerInRecovery && dist < cfg.pressureDist + 20) {
          this.state = AI_STATE.PUNISH;
        }
        // Pressure: close enough to attack
        else if (dist < cfg.pressureDist) {
          this.state = AI_STATE.PRESSURE;
        }
        // Approach: too far
        else {
          this.state = AI_STATE.APPROACH;
        }

        // === BLOCKING (reactive, independent of state) ===
        if (playerAttacking && dist < 80 && Math.random() < cfg.blockChance) {
          input.block = true;
          return input;
        }

        // === BEHAVIOR BY STATE ===
        switch (this.state) {
          case AI_STATE.APPROACH:
            if (facingPlayer === 1) input.right = true; else input.left = true;
            // Occasional jump
            if (Math.random() < cfg.jumpChance) input.up = true;
            break;

          case AI_STATE.PRESSURE:
            // Decide: combo, power attack, or single attack
            if (Math.random() < cfg.powerAttackChance) {
              // Start power attack hold
              this.isHolding = true;
              this.attackHoldFrames = 0;
              input.attack = true;
              input.attackPressed = true;
            } else if (Math.random() < cfg.comboChance) {
              // Start combo chain (2-4 hits based on difficulty)
              const maxHits = cfg === AI_DIFFICULTIES[2] ? 4 : (cfg === AI_DIFFICULTIES[1] ? 3 : 2);
              this.comboHitsRemaining = 1 + Math.floor(Math.random() * maxHits);
              this.attackSequenceFrames = 0;
              input.attack = true;
              input.attackPressed = true;
              input.attackBuffered = true;
            } else {
              // Single fast attack
              input.attack = true;
              input.attackPressed = true;
              input.attackBuffered = true;
            }
            break;

          case AI_STATE.BACK_OFF:
            if (facingPlayer === 1) input.left = true; else input.right = true;
            this.retreatFrames--;
            if (this.retreatFrames <= 0) this.state = AI_STATE.APPROACH;
            // Block while retreating if player is attacking
            if (playerAttacking) input.block = true;
            break;

          case AI_STATE.PUNISH:
            // Rush in and attack during player recovery
            if (dist > cfg.pressureDist) {
              if (facingPlayer === 1) input.right = true; else input.left = true;
            } else {
              if (Math.random() < 0.5 && cfg.comboChance > 0.2) {
                this.comboHitsRemaining = 2;
                this.attackSequenceFrames = 0;
                input.attack = true;
                input.attackPressed = true;
                input.attackBuffered = true;
              } else {
                input.attack = true;
                input.attackPressed = true;
                input.attackBuffered = true;
              }
            }
            break;
        }

        // Use ultimate when meter full and player is close
        if (cpu.ultimateMeter >= 100 && dist < 100 && Math.random() < cfg.ultimateChance) {
          input.ultimate = true;
        }

        return input;
      }
    };
  }

  // ===== HUD RENDERING =====
  function drawHealthBar(ctx, x, y, w, h, current, max, isPlayer) {
    const pct = Math.max(0, current / max);
    // Border
    ctx.fillStyle = '#000000';
    ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
    // Background (empty health)
    ctx.fillStyle = '#333333';
    ctx.fillRect(x, y, w, h);
    // Fill color
    const fillW = Math.floor(w * pct);
    let color;
    if (pct > 0.5) color = '#00CC00';
    else if (pct > 0.25) color = '#FFCC00';
    else color = '#CC0000';
    ctx.fillStyle = color;
    if (isPlayer) {
      ctx.fillRect(x, y, fillW, h);
    } else {
      ctx.fillRect(x + w - fillW, y, fillW, h);
    }
    // Highlight line (3D bevel)
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    if (isPlayer) {
      if (fillW > 0) ctx.fillRect(x, y, fillW, 1);
    } else {
      if (fillW > 0) ctx.fillRect(x + w - fillW, y, fillW, 1);
    }
  }

  function drawRoundPips(ctx, x, y, winsCount) {
    // Draw 2 round win pips (4x4 filled squares)
    ctx.fillStyle = winsCount >= 1 ? '#FFCC00' : '#555555';
    ctx.fillRect(x, y, 4, 4);
    ctx.fillStyle = winsCount >= 2 ? '#FFCC00' : '#555555';
    ctx.fillRect(x + 8, y, 4, 4);
  }

  function drawHUD(ctx, player, cpu, roundTimer, p1Wins, p2Wins) {
    // HUD background strip
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, GAME_W, HUD_H);

    // P1 Name
    drawText(ctx, player.def.name.toUpperCase(), 16, 8, '#FFFFFF', 8, 'left');

    // P1 Health bar
    drawHealthBar(ctx, 48, 8, 128, 8, player.health, getFighterMaxHealth(player), true);

    // Timer label and value (centered)
    const timerColor = roundTimer < 600 ? '#CC0000' : '#FFFFFF';
    drawText(ctx, 'TIME', 200, 2, '#FFFFFF', 8, 'center');
    drawText(ctx, String(Math.ceil(roundTimer / 60)), 200, 12, timerColor, 8, 'center');

    // P2 Health bar (fills right-to-left)
    drawHealthBar(ctx, 224, 8, 128, 8, cpu.health, getFighterMaxHealth(cpu), false);

    // P2 Name (right-aligned)
    drawText(ctx, cpu.def.name.toUpperCase(), 360, 8, '#FFFFFF', 8, 'right');

    // Round win pips
    drawRoundPips(ctx, 120, 20, p1Wins);
    drawRoundPips(ctx, 268, 20, p2Wins);

    // P1 Guard meter (blue, thin bar below health)
    const p1Guard = Math.max(0, player.guardMeter) / player.guardMax;
    ctx.fillStyle = '#333333';
    ctx.fillRect(48, 18, 128, 4);
    ctx.fillStyle = player.guardBreakStun > 0 ? '#FF4444' : '#4488FF';
    ctx.fillRect(48, 18, Math.floor(128 * p1Guard), 4);

    // P2 Guard meter (fills right-to-left)
    const p2Guard = Math.max(0, cpu.guardMeter) / cpu.guardMax;
    ctx.fillStyle = '#333333';
    ctx.fillRect(224, 18, 128, 4);
    ctx.fillStyle = cpu.guardBreakStun > 0 ? '#FF4444' : '#4488FF';
    ctx.fillRect(224 + 128 - Math.floor(128 * p2Guard), 18, Math.floor(128 * p2Guard), 4);

    // P1 Ultimate meter (gold, small bar below guard)
    const p1Ult = player.ultimateMeter / 100;
    ctx.fillStyle = '#1A1A00';
    ctx.fillRect(48, 24, 128, 3);
    ctx.fillStyle = p1Ult >= 1.0 ? '#FFDD00' : '#AA8800';
    ctx.fillRect(48, 24, Math.floor(128 * p1Ult), 3);
    if (player.ultimateMeter >= 100 && Math.floor(frameCounter / 8) % 2 === 0) {
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(48, 24, 128, 3);
    }

    // P2 Ultimate meter (right-to-left)
    const p2Ult = cpu.ultimateMeter / 100;
    ctx.fillStyle = '#1A1A00';
    ctx.fillRect(224, 24, 128, 3);
    ctx.fillStyle = p2Ult >= 1.0 ? '#FFDD00' : '#AA8800';
    ctx.fillRect(224 + 128 - Math.floor(128 * p2Ult), 24, Math.floor(128 * p2Ult), 3);
    if (cpu.ultimateMeter >= 100 && Math.floor(frameCounter / 8) % 2 === 0) {
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(224, 24, 128, 3);
    }
  }

  // Keep renderHUD as an alias for backward compatibility
  function renderHUD(ctx, player, cpu, roundTimer) {
    drawHUD(ctx, player, cpu, roundTimer, p1Wins, p2Wins);
  }

  function drawMatchContextPanel(ctx) {
    if (!activeMatchModifier && !executiveRunState.active) return;
    ctx.fillStyle = 'rgba(4,8,16,0.72)';
    ctx.fillRect(106, 32, 188, executiveRunState.active ? 22 : 12);
    if (activeMatchModifier) {
      drawText(ctx, activeMatchModifier.name, 200, 34, activeMatchModifier.accent, 6, 'center');
    }
    if (executiveRunState.active) {
      const progress = (executiveRunState.currentMatch + 1) + '/' + executiveRunState.opponents.length;
      drawText(ctx, 'RUN ' + progress + '  SCORE ' + executiveRunState.score, 200, 44, '#FFF3C4', 5, 'center');
    }
  }

  function renderUltimate(ctx, fighter, opponent) {
    if (!fighter.ultimateActive) return;
    const f = fighter.ultimateFrame;
    const ult = fighter.def.ultimate;
    if (!ult) return;
    const colors = ult.colors;
    const fighterX = worldToScreenX(fighter.x);
    const opponentX = worldToScreenX(opponent.x);
    const arenaLeft = worldToScreenX(getArenaLeft());
    const arenaRight = worldToScreenX(getArenaRight());
    const floorRect = function(x, y, w, h) {
      ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
    };
    const drawPixelNote = function(x, y, color) {
      const px = Math.floor(x);
      const py = Math.floor(y);
      ctx.fillStyle = color;
      ctx.fillRect(px, py + 2, 5, 4);
      ctx.fillRect(px + 1, py + 1, 3, 6);
      ctx.fillRect(px + 4, py - 6, 2, 10);
      ctx.fillRect(px + 6, py - 6, 1, 4);
      ctx.fillRect(px + 7, py - 5, 1, 2);
    };
    const drawImpactStar = function(x, y, color) {
      const px = Math.floor(x);
      const py = Math.floor(y);
      ctx.fillStyle = color;
      ctx.fillRect(px - 3, py, 7, 1);
      ctx.fillRect(px, py - 3, 1, 7);
      ctx.fillRect(px - 2, py - 2, 5, 5);
    };

    // Screen flash at activation (first 10 frames)
    if (f < 10) {
      const alpha = (10 - f) / 10 * 0.7;
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fillRect(0, 0, GAME_W, GAME_H);
    }

    // Fighter-specific effects (frames 10-80)
    if (f >= 10 && f < 80) {
      const name = fighter.def.name;
      if (name === 'Trump') {
        const progress = (f - 10) / 70;
        const startX = fighter.facing === 1 ? -70 : GAME_W + 10;
        const wallX = Math.floor(startX + (fighter.facing === 1 ? progress * (GAME_W + 100) : -progress * (GAME_W + 100)));
        for (let trail = 3; trail >= 1; trail--) {
          const alpha = 0.12 * trail;
          ctx.fillStyle = 'rgba(255,215,0,' + alpha + ')';
          floorRect(wallX - fighter.facing * trail * 18, 28, 34, GAME_H - 56);
        }
        for (let row = 0; row < 4; row++) {
          const brickY = 34 + row * 44;
          const rowOffset = row % 2 === 0 ? 0 : 6;
          for (let col = 0; col < 5; col++) {
            const brickX = wallX - 30 + rowOffset + col * 12;
            ctx.fillStyle = colors[0];
            floorRect(brickX, brickY, 11, 8);
            ctx.fillStyle = '#D8B14A';
            floorRect(brickX + 1, brickY + 1, 9, 2);
            ctx.fillStyle = '#8C6518';
            floorRect(brickX, brickY + 7, 11, 1);
          }
        }
        for (let spark = 0; spark < 12; spark++) {
          const sx = wallX + fighter.facing * (14 + spark * 3);
          const sy = 34 + ((f * 7 + spark * 19) % (GAME_H - 70));
          ctx.fillStyle = spark % 3 === 0 ? '#FFFFFF' : colors[1];
          floorRect(sx, sy, 2, 2);
          floorRect(sx + fighter.facing * 2, sy + 2, 1, 3);
        }
      } else if (name === 'Biden') {
        const progress = (f - 10) / 70;
        const waveX = Math.floor((fighter.facing === 1 ? -36 : GAME_W + 36) + (fighter.facing === 1 ? progress * (GAME_W + 72) : -progress * (GAME_W + 72)));
        for (let i = 0; i < 8; i++) {
          const bob = Math.sin((f + i * 7) * 0.22) * 6;
          const coneX = waveX + fighter.facing * (i * 14 - 12);
          const coneY = 52 + (i % 4) * 34 + bob;
          ctx.fillStyle = '#D9B47D';
          floorRect(coneX, coneY + 8, 2, 10);
          floorRect(coneX - 2, coneY + 10, 6, 2);
          floorRect(coneX - 4, coneY + 12, 10, 2);
          floorRect(coneX - 2, coneY + 14, 6, 2);
          ctx.fillStyle = colors[0];
          floorRect(coneX - 4, coneY + 2, 10, 6);
          ctx.fillStyle = colors[1];
          floorRect(coneX - 2, coneY, 6, 4);
          ctx.fillStyle = '#FFFFFF';
          floorRect(coneX, coneY + 1, 2, 2);
        }
        for (let s = 0; s < 14; s++) {
          const snowX = (waveX + s * 21 + f * 3) % GAME_W;
          const snowY = 28 + (f * 4 + s * 17) % (GAME_H - 44);
          ctx.fillStyle = 'rgba(220,240,255,0.72)';
          floorRect(snowX, snowY, 3, 1);
          floorRect(snowX + 1, snowY - 1, 1, 3);
        }
        if (f > 45) {
          ctx.fillStyle = 'rgba(100,180,255,0.3)';
          floorRect(opponentX - 22, opponent.y - 54, 44, 54);
          for (let flake = 0; flake < 8; flake++) {
            const fx = opponentX - 16 + (flake * 5 + f * 2) % 32;
            const fy = opponent.y - 48 + (flake * 9 + f) % 32;
            ctx.fillStyle = '#EAF6FF';
            floorRect(fx, fy, 3, 1);
            floorRect(fx + 1, fy - 1, 1, 3);
          }
        }
      } else if (name === 'Obama') {
        if (f < 40) {
          const rx = Math.floor(opponentX);
          const ry = Math.floor(opponent.y - 25);
          const bs = Math.max(10, 60 - Math.floor((f - 10) * 1.6));
          ctx.fillStyle = colors[1];
          floorRect(rx - bs, ry - bs, 12, 2);
          floorRect(rx - bs, ry - bs, 2, 12);
          floorRect(rx + bs - 12, ry - bs, 12, 2);
          floorRect(rx + bs - 2, ry - bs, 2, 12);
          floorRect(rx - bs, ry + bs - 2, 12, 2);
          floorRect(rx - bs, ry + bs - 12, 2, 12);
          floorRect(rx + bs - 12, ry + bs - 2, 12, 2);
          floorRect(rx + bs - 2, ry + bs - 12, 2, 12);
          if (f >= 35) {
            ctx.fillStyle = '#FF3344';
            floorRect(rx - 1, ry - 1, 3, 3);
          }
        } else {
          for (let m = 0; m < 5; m++) {
            const localFrame = f - 40 - m * 6;
            if (localFrame >= 0) {
              const mx = Math.floor(opponentX - 24 + m * 12);
              const my = Math.floor(-14 + localFrame * 4);
              if (my > -12 && my < GAME_H) {
                ctx.fillStyle = '#556677';
                floorRect(mx, my, 4, 10);
                ctx.fillStyle = colors[0];
                floorRect(mx + 1, my + 1, 2, 7);
                ctx.fillStyle = '#FFCC66';
                floorRect(mx + 1, my + 10, 2, 3);
                ctx.fillStyle = '#FF5500';
                floorRect(mx, my + 13, 4, 4);
              }
              if (localFrame >= 16 && localFrame < 24) {
                const blast = localFrame - 16;
                const blastSize = 10 + blast * 2;
                const bx = mx - Math.floor(blastSize / 2) + 2;
                const by = opponent.y - 28 - Math.floor(blastSize / 2);
                ctx.fillStyle = 'rgba(255,80,20,0.55)';
                floorRect(bx, by, blastSize, blastSize);
                ctx.fillStyle = 'rgba(255,200,80,0.7)';
                floorRect(bx + 3, by + 3, Math.max(2, blastSize - 6), Math.max(2, blastSize - 6));
              }
            }
          }
        }
      } else if (name === 'Bush') {
        const local = f - 10;
        const ballProgress = local / 70;
        const bx = arenaLeft + ballProgress * (arenaRight - arenaLeft);
        const bouncePhase = (ballProgress * 3) % 1;
        const by = GROUND_Y - 22 - Math.abs(Math.sin(bouncePhase * Math.PI)) * 60;
        for (let ft = 4; ft >= 1; ft--) {
          const t = Math.max(0, local - ft * 3);
          const trailProgress = t / 70;
          const tx = arenaLeft + trailProgress * (arenaRight - arenaLeft);
          const trailBounce = (trailProgress * 3) % 1;
          const ty = GROUND_Y - 22 - Math.abs(Math.sin(trailBounce * Math.PI)) * 60;
          const size = 7 - ft;
          const alpha = 0.68 - ft * 0.12;
          const fire = ['255,220,80', '255,150,40', '255,70,20', '140,30,10'][ft - 1];
          ctx.fillStyle = 'rgba(' + fire + ',' + alpha + ')';
          floorRect(tx - size, ty - size, size * 2, size * 2);
        }
        const bounceIndex = Math.floor(ballProgress * 3);
        for (let b = 1; b <= Math.min(3, bounceIndex); b++) {
          const starX = arenaLeft + (arenaRight - arenaLeft) * (b / 3);
          const starY = GROUND_Y - 22;
          const fade = Math.max(0.18, 1 - (local - b * 23) / 15);
          ctx.fillStyle = 'rgba(255,240,150,' + fade + ')';
          floorRect(starX - 4, starY, 9, 1);
          floorRect(starX, starY - 4, 1, 9);
          floorRect(starX - 2, starY - 2, 5, 5);
        }
        ctx.fillStyle = '#FFFFFF';
        floorRect(bx - 3, by - 3, 6, 6);
        ctx.fillStyle = '#D9E1F4';
        const dimplePhase = local % 4;
        floorRect(bx - 2 + (dimplePhase % 2), by - 2, 1, 1);
        floorRect(bx + 1, by - 1 + Math.floor(dimplePhase / 2), 1, 1);
        floorRect(bx - 1, by + 1, 1, 1);
        floorRect(bx + 2 - (dimplePhase % 2), by + 2, 1, 1);
      } else if (name === 'Clinton') {
        const sx = Math.floor(fighterX - 8);
        const sy = Math.floor(fighter.y - 42);
        ctx.fillStyle = colors[0];
        floorRect(sx + 6, sy + 6, 4, 16);
        floorRect(sx + 4, sy + 14, 8, 8);
        floorRect(sx + 2, sy + 18, 12, 6);
        floorRect(sx, sy + 20, 16, 6);
        floorRect(sx + 11, sy + 3, 6, 4);
        floorRect(sx + 15, sy + 1, 4, 2);
        ctx.fillStyle = colors[1];
        floorRect(sx + 2, sy + 21, 12, 3);
        floorRect(sx + 7, sy + 8, 2, 12);
        const noteColors = [colors[1], '#FFF6CC', '#E8B94B'];
        for (let n = 0; n < 7; n++) {
          const spiral = f * 0.18 + n * 0.9;
          const radius = 10 + n * 4;
          const nx = sx + 12 + Math.cos(spiral) * radius;
          const ny = sy + 8 - n * 8 - (f - 10) * 0.4 + Math.sin(spiral) * 5;
          if (ny > 18) {
            drawPixelNote(nx, ny, noteColors[n % noteColors.length]);
          }
        }
        if (f > 30) {
          for (let ring = 0; ring < 3; ring++) {
            const w = 18 + ring * 18 + (f % 8) * 2;
            const h = 10 + ring * 10 + (f % 6) * 2;
            const rx = sx + 18 + ring * 3;
            const ry = sy + 8 - Math.floor(h / 2);
            ctx.fillStyle = 'rgba(255,210,110,' + (0.34 - ring * 0.08) + ')';
            floorRect(rx, ry, w, 2);
            floorRect(rx, ry + h - 2, w, 2);
            floorRect(rx, ry, 2, h);
            floorRect(rx + w - 2, ry, 2, h);
          }
          for (let star = 0; star < 4; star++) {
            const orbit = f * 0.2 + star * 1.57;
            const ox = opponentX + Math.cos(orbit) * 9;
            const oy = opponent.y - 42 + Math.sin(orbit) * 4;
            drawImpactStar(ox, oy, '#FFF0A0');
          }
        }
      }
    }
  }

  // ===== FIGHT SCENE =====
  let player = null;
  let cpu = null;
  let roundTimer = 3600;   // 60 seconds * 60 ticks per second
  let p1Wins = 0;
  let p2Wins = 0;
  let currentRound = 1;
  let koSplashTimer = 0;   // counts down from 90 when KO occurs
  let koTriggered = false;
  let roundWinner = null;  // 'player' or 'cpu'
  let matchOver = false;
  let winner = null;
  let aiController = null;
  let roundSplashTimer = 0;    // Total frames remaining in splash (90 = start, 0 = fighting)
  let roundSplashPhase = '';   // 'round' or 'fight'

  // Wall break state
  let wallBreakActive = false;
  let wallBreakTimer = 0;
  let wallBreakSide = null;       // 'left' or 'right'
  let wallBreakVictim = null;     // 'player' or 'cpu'
  let wallBreakSlowFrame = 0;     // frame counter for slow-mo cadence
  let stageTier = 1;

  // Selection state (set by charSelectScene)
  let selectedP1Def = null;
  let selectedP2Def = null;
  let selectedDifficulty = 1;  // 0=Easy, 1=Normal, 2=Hard, 3=Expert
  let selectedStage = 'white-house';
  let pendingGameMode = 'exhibition';
  let selectedGameMode = 'exhibition';
  let activeMatchModifier = null;
  let modifierSplashTimer = 0;
  let matchScoreAwarded = false;
  const GAME_MODES = [
    { key: 'exhibition', name: 'EXHIBITION', desc: 'Pick a rival and stage for a one-off best-of-three.' },
    { key: 'executive-run', name: 'EXECUTIVE RUN', desc: 'Fight the full presidential gauntlet with rotating rules and score.' }
  ];
  const executiveRunState = {
    active: false,
    currentMatch: 0,
    opponents: [],
    stages: [],
    score: 0,
    streak: 0,
    bestCombo: 0,
    playerDef: null
  };
  const MATCH_MODIFIERS = [
    {
      key: 'turbo-press',
      name: 'TURBO PRESS',
      accent: '#8EE6FF',
      desc: 'Movement, jumps, and pressure all accelerate.',
      applyTo(fighter) {
        fighter.speedMul = 1.18;
        fighter.accelMul = 1.16;
        fighter.jumpMul = 1.08;
      }
    },
    {
      key: 'hardball',
      name: 'HARD BALL',
      accent: '#FFAE57',
      desc: 'Heavier hits, richer meter gain, louder momentum swings.',
      applyTo(fighter) {
        fighter.powerMul = 1.22;
        fighter.knockbackMul = 1.15;
        fighter.ultimateGainMul = 1.25;
      }
    },
    {
      key: 'ironclad',
      name: 'IRONCLAD',
      accent: '#B8F28A',
      desc: 'Extra health and guard for longer, bruising rounds.',
      applyTo(fighter) {
        fighter.maxHealth = Math.floor(fighter.maxHealth * 1.18);
        fighter.health = fighter.maxHealth;
        fighter.guardMax = 120;
        fighter.guardMeter = 120;
        fighter.speedMul = 0.94;
      }
    },
    {
      key: 'air-show',

      desc: 'Higher jumps and nastier launches keep fighters airborne.',
      applyTo(fighter) {
        fighter.jumpMul = 1.14;
        fighter.gravityMul = 0.95;
        fighter.launchMul = 1.22;
      }
    },
    {
